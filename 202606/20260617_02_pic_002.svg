<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="ph1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff0e0"/>
      <stop offset="1" stop-color="#ffd6a0"/>
    </linearGradient>
    <linearGradient id="ph2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e0f0ff"/>
      <stop offset="1" stop-color="#a0d0ff"/>
    </linearGradient>
    <linearGradient id="ph3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8e0ff"/>
      <stop offset="1" stop-color="#b0a0ff"/>
    </linearGradient>
    <marker id="arr2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
  </defs>

  <rect width="900" height="600" fill="#fafafa"/>

  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#222">Agent 时代内容平台的三段式演化</text>
  <text x="450" y="62" text-anchor="middle" font-size="13" fill="#666">头条现在做的事, 是在从阶段 1 向阶段 2 过渡时提前卡位</text>

  <!-- 阶段 1 -->
  <g transform="translate(150,150)">
    <rect x="-110" y="0" width="220" height="280" rx="14" fill="url(#ph1)" stroke="#cc6600" stroke-width="2"/>
    <text x="0" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#663300">阶段 1: 2014-2024</text>
    <text x="0" y="46" text-anchor="middle" font-size="12" fill="#663300">平台 → 用户(人)</text>
    <line x1="-90" y1="58" x2="90" y2="58" stroke="#cc6600" stroke-width="0.6" opacity="0.5"/>

    <text x="0" y="86" text-anchor="middle" font-size="11" font-weight="600" fill="#663300">内容生产</text>
    <text x="0" y="106" text-anchor="middle" font-size="11" fill="#663300">↓</text>
    <text x="0" y="126" text-anchor="middle" font-size="11" font-weight="600" fill="#663300">平台分发</text>
    <text x="0" y="146" text-anchor="middle" font-size="11" fill="#663300">↓</text>
    <text x="0" y="166" text-anchor="middle" font-size="11" font-weight="600" fill="#663300">用户停留换广告</text>

    <line x1="-90" y1="190" x2="90" y2="190" stroke="#cc6600" stroke-width="0.6" opacity="0.5"/>
    <text x="0" y="212" text-anchor="middle" font-size="11" font-weight="600" fill="#663300">价值评估:</text>
    <text x="0" y="232" text-anchor="middle" font-size="11" fill="#663300">DAU × 停留时长</text>
    <text x="0" y="252" text-anchor="middle" font-size="11" fill="#663300">× 广告 CPM</text>
  </g>

  <!-- 箭头 1 → 2 -->
  <g>
    <line x1="280" y1="290" x2="370" y2="290" stroke="#333" stroke-width="2" marker-end="url(#arr2)"/>
    <text x="325" y="282" text-anchor="middle" font-size="10" fill="#666">内容 API 化</text>
    <text x="325" y="306" text-anchor="middle" font-size="10" fill="#666">2024-2028</text>
  </g>

  <!-- 阶段 2 -->
  <g transform="translate(450,150)">
    <rect x="-110" y="0" width="220" height="280" rx="14" fill="url(#ph2)" stroke="#0066cc" stroke-width="2"/>
    <text x="0" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#003366">阶段 2: 2024-2028</text>
    <text x="0" y="46" text-anchor="middle" font-size="12" fill="#003366">平台 → Agent → 用户</text>
    <line x1="-90" y1="58" x2="90" y2="58" stroke="#0066cc" stroke-width="0.6" opacity="0.5"/>

    <text x="0" y="86" text-anchor="middle" font-size="11" font-weight="600" fill="#003366">内容 API 化</text>
    <text x="0" y="106" text-anchor="middle" font-size="11" fill="#003366">↓</text>
    <text x="0" y="126" text-anchor="middle" font-size="11" font-weight="600" fill="#003366">Agent 调用</text>
    <text x="0" y="146" text-anchor="middle" font-size="11" fill="#003366">↓</text>
    <text x="0" y="166" text-anchor="middle" font-size="11" font-weight="600" fill="#003366">Agent 加工后给用户</text>

    <line x1="-90" y1="190" x2="90" y2="190" stroke="#0066cc" stroke-width="0.6" opacity="0.5"/>
    <text x="0" y="212" text-anchor="middle" font-size="11" font-weight="600" fill="#003366">价值评估:</text>
    <text x="0" y="232" text-anchor="middle" font-size="11" fill="#003366">调用频次 × 调用质量</text>
    <text x="0" y="252" text-anchor="middle" font-size="11" fill="#003366">× Agent 付费能力</text>
  </g>

  <!-- 箭头 2 → 3 -->
  <g>
    <line x1="580" y1="290" x2="670" y2="290" stroke="#333" stroke-width="2" marker-end="url(#arr2)"/>
    <text x="625" y="282" text-anchor="middle" font-size="10" fill="#666">直接交易</text>
    <text x="625" y="306" text-anchor="middle" font-size="10" fill="#666">2028+</text>
  </g>

  <!-- 阶段 3 -->
  <g transform="translate(750,150)">
    <rect x="-110" y="0" width="220" height="280" rx="14" fill="url(#ph3)" stroke="#6633cc" stroke-width="2"/>
    <text x="0" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#330099">阶段 3: 2028+</text>
    <text x="0" y="46" text-anchor="middle" font-size="12" fill="#330099">Agent → 平台(交易)</text>
    <line x1="-90" y1="58" x2="90" y2="58" stroke="#6633cc" stroke-width="0.6" opacity="0.5"/>

    <text x="0" y="86" text-anchor="middle" font-size="11" font-weight="600" fill="#330099">Agent 绕过平台</text>
    <text x="0" y="106" text-anchor="middle" font-size="11" fill="#330099">↓</text>
    <text x="0" y="126" text-anchor="middle" font-size="11" font-weight="600" fill="#330099">直接对接创作者</text>
    <text x="0" y="146" text-anchor="middle" font-size="11" fill="#330099">↓</text>
    <text x="0" y="166" text-anchor="middle" font-size="11" font-weight="600" fill="#330099">平台变"内容交易所"</text>

    <line x1="-90" y1="190" x2="90" y2="190" stroke="#6633cc" stroke-width="0.6" opacity="0.5"/>
    <text x="0" y="212" text-anchor="middle" font-size="11" font-weight="600" fill="#330099">价值评估:</text>
    <text x="0" y="232" text-anchor="middle" font-size="11" fill="#330099">内容交易抽佣</text>
    <text x="0" y="252" text-anchor="middle" font-size="11" fill="#330099">平台抽成</text>
  </g>

  <!-- 头条位置标注 -->
  <g transform="translate(450,490)">
    <rect x="-260" y="-30" width="520" height="80" rx="12" fill="#fff" stroke="#0066cc" stroke-width="2"/>
    <text x="0" y="-6" text-anchor="middle" font-size="13" font-weight="700" fill="#003366">头条 2025-2026 在做什么?</text>
    <text x="0" y="16" text-anchor="middle" font-size="11" fill="#003366">用三大扶持计划(深一度 / 薪火 / 专项基金)提前卡位</text>
    <text x="0" y="34" text-anchor="middle" font-size="11" fill="#003366">"结构化、可被 MCP 解析、优质" 的中文内容池</text>
  </g>

  <!-- 抓取成本数据 -->
  <g transform="translate(450,565)">
    <text x="0" y="0" text-anchor="middle" font-size="11" font-style="italic" fill="#666">规模化调用成本: 服务 1000 万用户 × 10 次/日 = 日成本 5000 万-5 亿元, 年成本 180-1800 亿元</text>
  </g>
</svg>
