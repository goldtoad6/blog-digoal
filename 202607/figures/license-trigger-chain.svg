<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#37474F"/>
    </marker>
    <linearGradient id="bsd" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#90CAF9"/>
    </linearGradient>
    <linearGradient id="agpl" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#FFF3E0"/>
      <stop offset="100%" stop-color="#FFB74D"/>
    </linearGradient>
    <linearGradient id="sspl" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#FFEBEE"/>
      <stop offset="100%" stop-color="#E57373"/>
    </linearGradient>
  </defs>

  <rect width="900" height="620" fill="#FAFAFA"/>
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#263238">开源数据库协议"传染性"对比 — PostgreSQL 为何不变</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#546E7A">by 开源协议律师视角</text>

  <!-- BSD box -->
  <rect x="40" y="90" width="240" height="180" rx="10" fill="url(#bsd)" stroke="#1976D2" stroke-width="1.5"/>
  <text x="160" y="118" text-anchor="middle" font-size="16" font-weight="700" fill="#0D47A1">BSD / MIT 类</text>
  <text x="160" y="142" text-anchor="middle" font-size="13" fill="#0D47A1">PostgreSQL 当前协议</text>
  <line x1="60" y1="155" x2="260" y2="155" stroke="#1976D2" stroke-width="0.8" opacity="0.4"/>
  <text x="60" y="180" font-size="12" fill="#263238">允许: 商用 / 修改 / 闭源 / 再分发</text>
  <text x="60" y="200" font-size="12" fill="#263238">唯一义务: 保留版权声明</text>
  <text x="60" y="220" font-size="12" fill="#263238">触发条件: 无</text>
  <text x="60" y="240" font-size="12" fill="#263238">→ "白嫖" 行为: 法律允许</text>
  <text x="60" y="258" font-size="11" fill="#0D47A1" font-style="italic">OSI 认证, 著作权人放弃大部分权利</text>

  <!-- AGPL box -->
  <rect x="330" y="90" width="240" height="180" rx="10" fill="url(#agpl)" stroke="#EF6C00" stroke-width="1.5"/>
  <text x="450" y="118" text-anchor="middle" font-size="16" font-weight="700" fill="#E65100">AGPLv3</text>
  <text x="450" y="142" text-anchor="middle" font-size="13" fill="#E65100">MongoDB 2018 前 / MariaDB</text>
  <line x1="350" y1="155" x2="550" y2="155" stroke="#EF6C00" stroke-width="0.8" opacity="0.4"/>
  <text x="350" y="180" font-size="12" fill="#263238">允许: 商用 / 修改</text>
  <text x="350" y="200" font-size="12" fill="#263238">触发条件: <tspan font-weight="700">网络提供服务</tspan></text>
  <text x="350" y="220" font-size="12" fill="#263238">义务: 公开全部"对应修改"</text>
  <text x="350" y="240" font-size="12" fill="#263238">→ 云厂商被迫开放服务代码</text>
  <text x="350" y="258" font-size="11" fill="#E65100" font-style="italic">OSI 认证, "网络分发即传染"</text>

  <!-- SSPL box -->
  <rect x="620" y="90" width="240" height="180" rx="10" fill="url(#sspl)" stroke="#C62828" stroke-width="1.5"/>
  <text x="740" y="118" text-anchor="middle" font-size="16" font-weight="700" fill="#B71C1C">SSPL v1</text>
  <text x="740" y="142" text-anchor="middle" font-size="13" fill="#B71C1C">MongoDB 2018+ / Redis 2024+</text>
  <line x1="640" y1="155" x2="840" y2="155" stroke="#C62828" stroke-width="0.8" opacity="0.4"/>
  <text x="640" y="180" font-size="12" fill="#263238">允许: 自用 / 修改</text>
  <text x="640" y="200" font-size="12" fill="#263238">触发条件: <tspan font-weight="700">提供 SaaS 服务</tspan></text>
  <text x="640" y="220" font-size="12" fill="#263238">义务: <tspan font-weight="700">开源整套服务栈</tspan></text>
  <text x="640" y="240" font-size="12" fill="#263238">→ 服务化部署几乎不可能</text>
  <text x="640" y="258" font-size="11" fill="#B71C1C" font-style="italic">OSI <tspan font-weight="700">拒绝</tspan>认证, 争议极大</text>

  <!-- Arrow connecting the three -->
  <line x1="280" y1="180" x2="330" y2="180" stroke="#37474F" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="570" y1="180" x2="620" y2="180" stroke="#37474F" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="305" y="172" text-anchor="middle" font-size="10" fill="#37474F">约束升级</text>
  <text x="595" y="172" text-anchor="middle" font-size="10" fill="#37474F">约束再升级</text>

  <!-- Bottom: chain of legal triggers -->
  <text x="450" y="310" text-anchor="middle" font-size="14" font-weight="700" fill="#37474F">协议义务触发链(对比)</text>

  <!-- Node 1 -->
  <rect x="40" y="330" width="180" height="60" rx="8" fill="#FFFFFF" stroke="#37474F" stroke-width="1"/>
  <text x="130" y="355" text-anchor="middle" font-size="12" font-weight="700">国产厂商使用 PG 内核</text>
  <text x="130" y="375" text-anchor="middle" font-size="11" fill="#546E7A">(openGauss / PolarDB / 瀚高)</text>

  <!-- Arrow down to BSD -->
  <line x1="130" y1="390" x2="130" y2="425" stroke="#1976D2" stroke-width="2" marker-end="url(#arr)"/>
  <text x="135" y="412" font-size="10" fill="#1976D2" font-weight="700">BSD 路径</text>

  <rect x="40" y="430" width="180" height="60" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="1"/>
  <text x="130" y="455" text-anchor="middle" font-size="12" font-weight="700" fill="#0D47A1">无传染义务</text>
  <text x="130" y="475" text-anchor="middle" font-size="11" fill="#0D47A1">闭源商用合法</text>

  <!-- Arrow from use to AGPL -->
  <line x1="450" y1="390" x2="450" y2="425" stroke="#EF6C00" stroke-width="2" marker-end="url(#arr)"/>
  <text x="455" y="412" font-size="10" fill="#EF6C00" font-weight="700">AGPLv3 路径(假设改)</text>

  <rect x="360" y="330" width="180" height="60" rx="8" fill="#FFFFFF" stroke="#37474F" stroke-width="1"/>
  <text x="450" y="355" text-anchor="middle" font-size="12" font-weight="700">若云厂商提供 PG 服务</text>
  <text x="450" y="375" text-anchor="middle" font-size="11" fill="#546E7A">(RDS / PolarDB-PG 公有云)</text>

  <rect x="360" y="430" width="180" height="60" rx="8" fill="#FFF3E0" stroke="#EF6C00" stroke-width="1"/>
  <text x="450" y="455" text-anchor="middle" font-size="12" font-weight="700" fill="#E65100">触发网络分发条款</text>
  <text x="450" y="475" text-anchor="middle" font-size="11" fill="#E65100">须公开所有修改</text>

  <!-- SSPL -->
  <rect x="680" y="330" width="180" height="60" rx="8" fill="#FFFFFF" stroke="#37474F" stroke-width="1"/>
  <text x="770" y="355" text-anchor="middle" font-size="12" font-weight="700">若对外提供 PG 服务</text>
  <text x="770" y="375" text-anchor="middle" font-size="11" fill="#546E7A">含周边运维工具栈</text>

  <line x1="770" y1="390" x2="770" y2="425" stroke="#C62828" stroke-width="2" marker-end="url(#arr)"/>
  <text x="775" y="412" font-size="10" fill="#C62828" font-weight="700">SSPL 路径(假设改)</text>

  <rect x="680" y="430" width="180" height="60" rx="8" fill="#FFEBEE" stroke="#C62828" stroke-width="1"/>
  <text x="770" y="455" text-anchor="middle" font-size="12" font-weight="700" fill="#B71C1C">整套服务栈强制开源</text>
  <text x="770" y="475" text-anchor="middle" font-size="11" fill="#B71C1C">商业 SaaS 模式崩溃</text>

  <!-- Conclusion -->
  <rect x="40" y="520" width="820" height="80" rx="8" fill="#263238"/>
  <text x="450" y="548" text-anchor="middle" font-size="14" font-weight="700" fill="#FFFFFF">PG 不改协议的法律根因</text>
  <text x="450" y="572" text-anchor="middle" font-size="12" fill="#ECEFF1">1. BSD 已合法授权 — 改 AGPL/SSPL 只会伤害贡献者社区,不会"挽回"已失去的版权费</text>
  <text x="450" y="590" text-anchor="middle" font-size="12" fill="#ECEFF1">2. 全球贡献者 CLA 分散 — 法律上无法单方面重新授权;3. OSI 不认 SSPL — 改后即非"开源",自损品牌</text>
</svg>