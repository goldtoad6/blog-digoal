<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#333"/>
    </marker>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c0392b"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#27ae60"/>
    </marker>
  </defs>

  <rect width="1100" height="720" fill="#fafafa"/>

  <!-- Title -->
  <text x="550" y="30" text-anchor="middle" font-size="20" font-weight="bold" fill="#1a1a1a">
    PG 协议变更的三方博弈树  PG Community × 国产厂商 × 云厂商
  </text>
  <text x="550" y="52" text-anchor="middle" font-size="12" fill="#666">
    平台经济学视角:许可证作为承诺机制 (License-as-Commitment-Device)
  </text>

  <!-- Root node: PG core decision -->
  <rect x="460" y="80" width="180" height="50" rx="8" fill="#34495e" stroke="#1a1a1a"/>
  <text x="550" y="103" text-anchor="middle" fill="white" font-size="13" font-weight="bold">PG 核心社区</text>
  <text x="550" y="121" text-anchor="middle" fill="white" font-size="11">(PostgreSQL Global Dev Group)</text>

  <!-- Decision branches -->
  <line x1="550" y1="130" x2="280" y2="200" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="550" y1="130" x2="820" y2="200" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Branch A: 维持 PostgreSQL License -->
  <rect x="120" y="200" width="320" height="50" rx="8" fill="#27ae60" stroke="#1a1a1a"/>
  <text x="280" y="225" text-anchor="middle" fill="white" font-size="13" font-weight="bold">A. 维持 BSD-style 许可证</text>
  <text x="280" y="243" text-anchor="middle" fill="white" font-size="11">(PostgreSQL License, 1996-至今)</text>

  <!-- Branch B: 改 SSPL/AGPL 等强著佐权 -->
  <rect x="660" y="200" width="320" height="50" rx="8" fill="#c0392b" stroke="#1a1a1a"/>
  <text x="820" y="225" text-anchor="middle" fill="white" font-size="13" font-weight="bold">B. 改 SSPL / AGPL</text>
  <text x="820" y="243" text-anchor="middle" fill="white" font-size="11">(参考 MongoDB/Elastic/Redis)</text>

  <!-- ===== Branch A sub-tree ===== -->
  <!-- A: response from 国产厂商 -->
  <rect x="60" y="310" width="180" height="44" rx="6" fill="#ecf0f1" stroke="#7f8c8d"/>
  <text x="150" y="328" text-anchor="middle" font-size="11" font-weight="bold">A1. 国产厂商继续 fork</text>
  <text x="150" y="345" text-anchor="middle" font-size="10" fill="#555">(openGauss, KingbaseES, TDSQL-PG...)</text>

  <rect x="260" y="310" width="200" height="44" rx="6" fill="#ecf0f1" stroke="#7f8c8d"/>
  <text x="360" y="328" text-anchor="middle" font-size="11" font-weight="bold">A2. 云厂商继续 DBaaS</text>
  <text x="360" y="345" text-anchor="middle" font-size="10" fill="#555">(AWS, Aliyun, Tencent, GCP)</text>

  <!-- A: PG core payoff -->
  <rect x="130" y="400" width="260" height="50" rx="8" fill="#27ae60" fill-opacity="0.18" stroke="#27ae60" stroke-width="2"/>
  <text x="260" y="422" text-anchor="middle" font-size="12" font-weight="bold" fill="#1e6036">PG 收益: +Network Effect</text>
  <text x="260" y="440" text-anchor="middle" font-size="11" fill="#1e6036">采纳广、生态大、贡献多(2017-2023 四度 DB-Engines 年度冠军)</text>

  <!-- A: 国产厂商 payoff -->
  <rect x="40" y="475" width="200" height="50" rx="6" fill="#fff" stroke="#7f8c8d"/>
  <text x="140" y="495" text-anchor="middle" font-size="11" font-weight="bold">A 国产厂商收益: 0</text>
  <text x="140" y="513" text-anchor="middle" font-size="10" fill="#555">无协议费,搭便车 (Free-ride)</text>

  <!-- A: 云厂商 payoff -->
  <rect x="260" y="475" width="200" height="50" rx="6" fill="#fff" stroke="#7f8c8d"/>
  <text x="360" y="495" text-anchor="middle" font-size="11" font-weight="bold">A 云厂商收益: 0</text>
  <text x="360" y="513" text-anchor="middle" font-size="10" fill="#555">无协议费,搭便车 (Free-ride)</text>

  <line x1="280" y1="250" x2="150" y2="310" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <line x1="280" y1="250" x2="360" y2="310" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <line x1="150" y1="354" x2="200" y2="475" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <line x1="360" y1="354" x2="380" y2="475" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrowG)"/>
  <line x1="280" y1="354" x2="260" y2="400" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrowG)"/>

  <!-- A summary box -->
  <rect x="60" y="560" width="400" height="110" rx="8" fill="#e8f6ee" stroke="#27ae60" stroke-width="1.5"/>
  <text x="80" y="585" font-size="12" font-weight="bold" fill="#1e6036">纳什均衡 (A 分支): 帕累托次优</text>
  <text x="80" y="608" font-size="11" fill="#1a1a1a">· 社区: 用"被搭便车"换取网络效应最大化</text>
  <text x="80" y="628" font-size="11" fill="#1a1a1a">· 国产厂商/云厂商: 零成本搭便车(对 PG 是负外部性)</text>
  <text x="80" y="648" font-size="11" fill="#1a1a1a">· 关键: 贡献者动机来自"声望+采用广度",不来自协议费</text>
  <text x="80" y="665" font-size="10" fill="#555" font-style="italic">历史检验: PG 自 1996 采用 PostgreSQL License 至今未改</text>

  <!-- ===== Branch B sub-tree ===== -->
  <rect x="600" y="310" width="180" height="44" rx="6" fill="#fde8e7" stroke="#c0392b"/>
  <text x="690" y="328" text-anchor="middle" font-size="11" font-weight="bold">B1. 国产厂商反应</text>
  <text x="690" y="345" text-anchor="middle" font-size="10" fill="#555">a) 弃用改用兼容协议</text>

  <rect x="800" y="310" width="200" height="44" rx="6" fill="#fde8e7" stroke="#c0392b"/>
  <text x="900" y="328" text-anchor="middle" font-size="11" font-weight="bold">B2. 云厂商反应</text>
  <text x="900" y="345" text-anchor="middle" font-size="10" fill="#555">b) Fork 走 Apache 2.0 路线</text>

  <!-- B: PG core payoff -->
  <rect x="670" y="400" width="280" height="50" rx="8" fill="#fde8e7" stroke="#c0392b" stroke-width="2"/>
  <text x="810" y="422" text-anchor="middle" font-size="12" font-weight="bold" fill="#a82418">PG 损失: -Network Effect</text>
  <text x="810" y="440" text-anchor="middle" font-size="11" fill="#a82418">社区分裂、贡献者流失、生态萎缩</text>

  <!-- B: 国产厂商 payoff -->
  <rect x="580" y="475" width="220" height="50" rx="6" fill="#fff" stroke="#7f8c8d"/>
  <text x="690" y="495" text-anchor="middle" font-size="11" font-weight="bold">B 国产厂商反应: 弃用</text>
  <text x="690" y="513" text-anchor="middle" font-size="10" fill="#555">转 MySQL/自研→PG 损失中国市场份额</text>

  <!-- B: 云厂商 payoff -->
  <rect x="820" y="475" width="220" height="50" rx="6" fill="#fff" stroke="#7f8c8d"/>
  <text x="930" y="495" text-anchor="middle" font-size="11" font-weight="bold">B 云厂商反应: Fork</text>
  <text x="930" y="513" text-anchor="middle" font-size="10" fill="#555">→ "OpenPostgres" 类似 OpenSearch/Valkey</text>

  <line x1="820" y1="250" x2="690" y2="310" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <line x1="820" y1="250" x2="900" y2="310" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <line x1="690" y1="354" x2="690" y2="475" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <line x1="900" y1="354" x2="930" y2="475" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arrowR)"/>
  <line x1="820" y1="354" x2="810" y2="400" stroke="#c0392b" stroke-width="1.5" marker-end="url(#arrowR)"/>

  <!-- B summary box -->
  <rect x="620" y="560" width="420" height="110" rx="8" fill="#fdedec" stroke="#c0392b" stroke-width="1.5"/>
  <text x="640" y="585" font-size="12" font-weight="bold" fill="#a82418">反事实路径 (B 分支): 囚徒困境触发</text>
  <text x="640" y="608" font-size="11" fill="#1a1a1a">· 社区: 短期回收"租",长期失去生态(参考 Elastic 2021)</text>
  <text x="640" y="628" font-size="11" fill="#1a1a1a">· 厂商: 转向无搭便车机会(转向 MySQL/自研)</text>
  <text x="640" y="648" font-size="11" fill="#1a1a1a">· 三方: 净福利下降(零和博弈,无合作剩余)</text>
  <text x="640" y="665" font-size="10" fill="#555" font-style="italic">历史检验: Elastic 2024-08 又加回 AGPL-3.0(MongoDB 路径失败)</text>

  <!-- Bottom legend -->
  <line x1="40" y1="700" x2="1060" y2="700" stroke="#999" stroke-dasharray="3,3"/>
  <text x="50" y="715" font-size="10" fill="#666">说明:绿线=A(现状路径),红线=B(反事实路径)。本图只画博弈结构,具体收益数值见正文 §3.4 数据表。</text>
</svg>
