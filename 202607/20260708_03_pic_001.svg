<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 600" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#fafbfc"/>
      <stop offset="100%" stop-color="#eef1f5"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="600" fill="url(#bg)"/>

  <!-- Title -->
  <text x="360" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1f2937">
    QoderWork vs WorkBuddy · 六维能力雷达
  </text>
  <text x="360" y="62" text-anchor="middle" font-size="12" fill="#6b7280">
    数据综合自雷科技、smzdm、pingan8787(CSDN)、万少(InfoQ)等 2026 年 3-7 月公开测评
  </text>

  <!-- Center point: 360, 320 -->
  <g transform="translate(360,320)">
    <!-- Concentric grid (5 levels, 5 axes, radius 220) -->
    <!-- Axis directions at: 0°, 60°, 120°, 180°, 240°, 300° (top, top-right, bottom-right, bottom, bottom-left, top-left) -->
    <!-- Compute vertices for radius r:
         axis 1 (top): (0, -r)
         axis 2 (top-right): (r*sin60, -r*cos60) = (0.866r, -0.5r)
         axis 3 (bottom-right): (0.866r, 0.5r)
         axis 4 (bottom): (0, r)
         axis 5 (bottom-left): (-0.866r, 0.5r)
         axis 6 (top-left): (-0.866r, -0.5r)
    -->

    <!-- Level 1 (r=44) -->
    <polygon points="0,-44 38.1,-22 38.1,22 0,44 -38.1,22 -38.1,-22" fill="#ffffff" stroke="#d1d5db" stroke-width="0.6"/>
    <!-- Level 2 (r=88) -->
    <polygon points="0,-88 76.2,-44 76.2,44 0,88 -76.2,44 -76.2,-44" fill="#ffffff" stroke="#d1d5db" stroke-width="0.6"/>
    <!-- Level 3 (r=132) -->
    <polygon points="0,-132 114.3,-66 114.3,66 0,132 -114.3,66 -114.3,-66" fill="#ffffff" stroke="#d1d5db" stroke-width="0.6"/>
    <!-- Level 4 (r=176) -->
    <polygon points="0,-176 152.4,-88 152.4,88 0,176 -152.4,88 -152.4,-88" fill="#ffffff" stroke="#d1d5db" stroke-width="0.6"/>
    <!-- Level 5 (r=220) -->
    <polygon points="0,-220 190.5,-110 190.5,110 0,220 -190.5,110 -190.5,-110" fill="#ffffff" stroke="#9ca3af" stroke-width="0.9"/>

    <!-- Axes -->
    <line x1="0" y1="0" x2="0" y2="-220" stroke="#9ca3af" stroke-width="0.6"/>
    <line x1="0" y1="0" x2="190.5" y2="-110" stroke="#9ca3af" stroke-width="0.6"/>
    <line x1="0" y1="0" x2="190.5" y2="110" stroke="#9ca3af" stroke-width="0.6"/>
    <line x1="0" y1="0" x2="0" y2="220" stroke="#9ca3af" stroke-width="0.6"/>
    <line x1="0" y1="0" x2="-190.5" y2="110" stroke="#9ca3af" stroke-width="0.6"/>
    <line x1="0" y1="0" x2="-190.5" y2="-110" stroke="#9ca3af" stroke-width="0.6"/>

    <!-- Scale labels (left of axis 5) -->
    <text x="-8" y="-44" text-anchor="end" font-size="10" fill="#9ca3af">1</text>
    <text x="-8" y="-88" text-anchor="end" font-size="10" fill="#9ca3af">2</text>
    <text x="-8" y="-132" text-anchor="end" font-size="10" fill="#9ca3af">3</text>
    <text x="-8" y="-176" text-anchor="end" font-size="10" fill="#9ca3af">4</text>
    <text x="-8" y="-220" text-anchor="end" font-size="10" fill="#9ca3af">5</text>

    <!-- Axis labels -->
    <!-- axis 1 (top): 上手门槛 -->
    <text x="0" y="-238" text-anchor="middle" font-size="13" font-weight="600" fill="#374151">上手门槛</text>
    <!-- axis 2 (top-right): 远程操控 -->
    <text x="205" y="-115" text-anchor="start" font-size="13" font-weight="600" fill="#374151">远程操控</text>
    <!-- axis 3 (bottom-right): 任务完成度 -->
    <text x="205" y="115" text-anchor="start" font-size="13" font-weight="600" fill="#374151">任务完成度</text>
    <!-- axis 4 (bottom): 错误处理 -->
    <text x="0" y="248" text-anchor="middle" font-size="13" font-weight="600" fill="#374151">错误处理透明度</text>
    <!-- axis 5 (bottom-left): 代码能力 -->
    <text x="-205" y="115" text-anchor="end" font-size="13" font-weight="600" fill="#374151">代码能力</text>
    <!-- axis 6 (top-left): 生态打通 -->
    <text x="-205" y="-115" text-anchor="end" font-size="13" font-weight="600" fill="#374151">生态打通(微信/企微)</text>

    <!-- QoderWork values: 上手=4, 远程=3, 完成=5, 错误=5, 代码=5, 生态=3 -->
    <!-- r = value * 44 -->
    <!-- Vertices:
         v1 (top): (0, -4*44) = (0, -176)
         v2 (top-right): (3*44*0.866, -3*44*0.5) = (114.3, -66)
         v3 (bottom-right): (5*44*0.866, 5*44*0.5) = (190.5, 110)
         v4 (bottom): (0, 5*44) = (0, 220)
         v5 (bottom-left): (-5*44*0.866, 5*44*0.5) = (-190.5, 110)
         v6 (top-left): (-3*44*0.866, -3*44*0.5) = (-114.3, -66)
    -->
    <polygon points="0,-176 114.3,-66 190.5,110 0,220 -190.5,110 -114.3,-66"
             fill="#ff6a00" fill-opacity="0.22" stroke="#ff6a00" stroke-width="2.2"/>

    <!-- WorkBuddy values: 上手=5, 远程=5, 完成=3, 错误=2, 代码=2, 生态=5 -->
    <!-- v1: (0, -5*44) = (0, -220)
         v2: (5*44*0.866, -5*44*0.5) = (190.5, -110)
         v3: (3*44*0.866, 3*44*0.5) = (114.3, 66)
         v4: (0, 2*44) = (0, 88)
         v5: (-2*44*0.866, 2*44*0.5) = (-76.2, 44)
         v6: (-5*44*0.866, -5*44*0.5) = (-190.5, -110)
    -->
    <polygon points="0,-220 190.5,-110 114.3,66 0,88 -76.2,44 -190.5,-110"
             fill="#1976ff" fill-opacity="0.18" stroke="#1976ff" stroke-width="2.2"/>

    <!-- Vertex dots for QoderWork -->
    <circle cx="0" cy="-176" r="4" fill="#ff6a00"/>
    <circle cx="114.3" cy="-66" r="4" fill="#ff6a00"/>
    <circle cx="190.5" cy="110" r="4" fill="#ff6a00"/>
    <circle cx="0" cy="220" r="4" fill="#ff6a00"/>
    <circle cx="-190.5" cy="110" r="4" fill="#ff6a00"/>
    <circle cx="-114.3" cy="-66" r="4" fill="#ff6a00"/>

    <!-- Vertex dots for WorkBuddy -->
    <circle cx="0" cy="-220" r="4" fill="#1976ff"/>
    <circle cx="190.5" cy="-110" r="4" fill="#1976ff"/>
    <circle cx="114.3" cy="66" r="4" fill="#1976ff"/>
    <circle cx="0" cy="88" r="4" fill="#1976ff"/>
    <circle cx="-76.2" cy="44" r="4" fill="#1976ff"/>
    <circle cx="-190.5" cy="-110" r="4" fill="#1976ff"/>
  </g>

  <!-- Legend -->
  <g transform="translate(40,540)">
    <rect x="0" y="0" width="22" height="14" fill="#ff6a00" fill-opacity="0.4" stroke="#ff6a00" stroke-width="1.6"/>
    <text x="30" y="12" font-size="14" fill="#374151">QoderWork(阿里)</text>

    <rect x="200" y="0" width="22" height="14" fill="#1976ff" fill-opacity="0.3" stroke="#1976ff" stroke-width="1.6"/>
    <text x="230" y="12" font-size="14" fill="#374151">WorkBuddy(腾讯)</text>
  </g>

  <!-- Footer note -->
  <text x="360" y="582" text-anchor="middle" font-size="11" fill="#6b7280">
    评分 1–5（5 = 优秀）。仅基于公开测评与官方文档,不代表厂商内部数据
  </text>
</svg>