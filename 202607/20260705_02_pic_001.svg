<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Microsoft YaHei',sans-serif">
  <rect width="900" height="560" fill="#FAFAF8"/>
  <text x="450" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#1A1A1A">同一个赛道，两种土壤</text>
  <text x="450" y="68" text-anchor="middle" font-size="14" fill="#666">Supabase 生长的环境 vs LeanCloud/Bmob 面对的环境</text>

  <!-- column headers -->
  <rect x="60" y="95" width="360" height="42" rx="6" fill="#2563EB"/>
  <text x="240" y="122" text-anchor="middle" font-size="17" font-weight="700" fill="#fff">美国 · Supabase 的土壤</text>

  <rect x="480" y="95" width="360" height="42" rx="6" fill="#DC2626"/>
  <text x="660" y="122" text-anchor="middle" font-size="17" font-weight="700" fill="#fff">中国 · LeanCloud/Bmob 的土壤</text>

  <!-- rows -->
  <!-- row template function inline -->
  <g font-size="13.5" fill="#222">
    <!-- row1 label -->
    <rect x="20" y="150" width="860" height="72" fill="#F1F5F9"/>
    <text x="30" y="172" font-size="13" font-weight="700" fill="#475569">资本供给</text>
    <text x="70" y="196" width="330">Accel/Peak XV/GIC/Stripe 愿为"叙事+增长曲线"</text>
    <text x="70" y="213">买单，18个月估值从7.65亿冲到105亿美元</text>
    <text x="490" y="196">LP 多为国资/政府引导基金，偏好确定性回报</text>
    <text x="490" y="213">与政策对齐项目，独立基础设施层融资稀薄</text>

    <rect x="20" y="222" width="860" height="72" fill="#fff"/>
    <text x="30" y="244" font-size="13" font-weight="700" fill="#475569">云巨头姿态</text>
    <text x="70" y="268">AWS/GCP 把 BaaS 当"別人的生意"，不主动下场</text>
    <text x="70" y="285">碾压创业公司（Parse 之死是巨头内部取舍）</text>
    <text x="490" y="268">阿里云/腾讯云/华为云直接把 BaaS 做成免费门槛</text>
    <text x="490" y="285">功能，价格战年年降价，独立层无生存空间</text>

    <rect x="20" y="294" width="860" height="72" fill="#F1F5F9"/>
    <text x="30" y="316" font-size="13" font-weight="700" fill="#475569">全球化窗口</text>
    <text x="70" y="340">37个国家远程团队，250万开发者用美元付费</text>
    <text x="70" y="357">同一套产品面向全球市场，边际成本递减</text>
    <text x="490" y="340">几乎只能做内销，人民币定价、内卷价格战</text>
    <text x="490" y="357">出海面临合规、网络、地缘政治多重摩擦</text>

    <rect x="20" y="366" width="860" height="72" fill="#fff"/>
    <text x="30" y="388" font-size="13" font-weight="700" fill="#475569">技术杠杆</text>
    <text x="70" y="412">直接站在 Postgres 生态肩膀上，复用全球积累</text>
    <text x="70" y="429">的工具链、人才库与信任，专注做体验层</text>
    <text x="490" y="412">自建协议/数据结构，用户被平台锁死</text>
    <text x="490" y="429">一旦公司战略转向，用户数据无处迁移</text>

    <rect x="20" y="438" width="860" height="72" fill="#F1F5F9"/>
    <text x="30" y="460" font-size="13" font-weight="700" fill="#475569">退出路径</text>
    <text x="70" y="484">IPO/并购市场成熟，估值可以对赌未来现金流</text>
    <text x="70" y="501">员工每轮可卖25%老股，早期人才愿意长留</text>
    <text x="490" y="484">退出渠道窄，投资人要求更短周期回本</text>
    <text x="490" y="501">工具型公司常年打平即被视为"失败"</text>
  </g>

  <text x="450" y="540" text-anchor="middle" font-size="12" fill="#888">数据来源：TechCrunch / Sacra / 知乎公开资料整理，2026年7月</text>
</svg>
