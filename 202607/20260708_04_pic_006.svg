<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bgYes" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ecfdf5"/>
      <stop offset="1" stop-color="#d1fae5"/>
    </linearGradient>
    <linearGradient id="bgNo" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fef2f2"/>
      <stop offset="1" stop-color="#fee2e2"/>
    </linearGradient>
    <linearGradient id="bgMid" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fffbeb"/>
      <stop offset="1" stop-color="#fef3c7"/>
    </linearGradient>
  </defs>

  <rect width="1100" height="720" fill="#ffffff"/>

  <text x="550" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">
    跨假设对冲矩阵：AI Agent 主导 vs 破裂 vs 中间态
  </text>
  <text x="550" y="58" text-anchor="middle" font-size="13" fill="#475569">
    6 大资产类别 × 3 种情景下的方向性指引（多 / 空 / 中性 / 持有）
  </text>

  <!-- 列头 -->
  <g font-size="13" font-weight="700" fill="#0f172a" text-anchor="middle">
    <rect x="220" y="80" width="200" height="44" rx="8" fill="url(#bgYes)" stroke="#059669" stroke-width="1.5"/>
    <text x="320" y="100">假设成立（概率 55–65%）</text>
    <text x="320" y="116" font-size="10" font-weight="400" fill="#065f46">Agent 主导生产</text>

    <rect x="450" y="80" width="200" height="44" rx="8" fill="url(#bgMid)" stroke="#d97706" stroke-width="1.5"/>
    <text x="550" y="100">中间态（概率 20–30%）</text>
    <text x="550" y="116" font-size="10" font-weight="400" fill="#92400e">混合叙事</text>

    <rect x="680" y="80" width="200" height="44" rx="8" fill="url(#bgNo)" stroke="#b91c1c" stroke-width="1.5"/>
    <text x="780" y="100">假设破裂（概率 ≈15%）</text>
    <text x="780" y="116" font-size="10" font-weight="400" fill="#7f1d1d">AI 泡沫破灭</text>
  </g>

  <!-- 行头 -->
  <g font-size="12" font-weight="700" fill="#0f172a">
    <rect x="40" y="140" width="160" height="60" rx="8" fill="#f1f5f9" stroke="#94a3b8"/>
    <text x="120" y="165" text-anchor="middle">上游硬件</text>
    <text x="120" y="183" text-anchor="middle" font-size="10" font-weight="400">NVDA / TSM / AVGO</text>

    <rect x="40" y="210" width="160" height="60" rx="8" fill="#f1f5f9" stroke="#94a3b8"/>
    <text x="120" y="235" text-anchor="middle">AI 原生云</text>
    <text x="120" y="253" text-anchor="middle" font-size="10" font-weight="400">CRWV / NBIS / IREN</text>

    <rect x="40" y="280" width="160" height="60" rx="8" fill="#f1f5f9" stroke="#94a3b8"/>
    <text x="120" y="305" text-anchor="middle">通用云</text>
    <text x="120" y="323" text-anchor="middle" font-size="10" font-weight="400">MSFT / GOOGL / AMZN</text>

    <rect x="40" y="350" width="160" height="60" rx="8" fill="#f1f5f9" stroke="#94a3b8"/>
    <text x="120" y="375" text-anchor="middle">Oracle</text>
    <text x="120" y="393" text-anchor="middle" font-size="10" font-weight="400">裸泳标的</text>

    <rect x="40" y="420" width="160" height="60" rx="8" fill="#f1f5f9" stroke="#94a3b8"/>
    <text x="120" y="445" text-anchor="middle">Sovereign / 自建</text>
    <text x="120" y="463" text-anchor="middle" font-size="10" font-weight="400">DELL / HPE / 主权云</text>

    <rect x="40" y="490" width="160" height="60" rx="8" fill="#f1f5f9" stroke="#94a3b8"/>
    <text x="120" y="515" text-anchor="middle">电力 / 液冷</text>
    <text x="120" y="533" text-anchor="middle" font-size="10" font-weight="400">VRT / CEG / ETN</text>

    <rect x="40" y="560" width="160" height="60" rx="8" fill="#f1f5f9" stroke="#94a3b8"/>
    <text x="120" y="585" text-anchor="middle">反向 hedge</text>
    <text x="120" y="603" text-anchor="middle" font-size="10" font-weight="400">NVDA put / SH / 现金</text>
  </g>

  <!-- 内容单元格 -->
  <g font-size="11" text-anchor="middle">
    <!-- 上游硬件 -->
    <rect x="220" y="140" width="200" height="60" fill="url(#bgYes)" stroke="#059669" stroke-width="1"/>
    <text x="320" y="163" fill="#065f46" font-weight="700">多（核心仓位 25%）</text>
    <text x="320" y="183" fill="#065f46">避不开的卖铲人；HBM / CoWoS 硬瓶颈</text>

    <rect x="450" y="140" width="200" height="60" fill="url(#bgMid)" stroke="#d97706" stroke-width="1"/>
    <text x="550" y="163" fill="#92400e" font-weight="700">持有</text>
    <text x="550" y="183" fill="#92400e">不增不减，估值已经反映</text>

    <rect x="680" y="140" width="200" height="60" fill="url(#bgNo)" stroke="#b91c1c" stroke-width="1"/>
    <text x="780" y="163" fill="#7f1d1d" font-weight="700">减仓 / put</text>
    <text x="780" y="183" fill="#7f1d1d">NVDA put；半导体 Capex/销售比回落</text>

    <!-- AI 原生云 -->
    <rect x="220" y="210" width="200" height="60" fill="url(#bgYes)" stroke="#059669" stroke-width="1"/>
    <text x="320" y="233" fill="#065f46" font-weight="700">多（卫星 20%）</text>
    <text x="320" y="253" fill="#065f46">CRWV 长约 + NBIS 现货</text>

    <rect x="450" y="210" width="200" height="60" fill="url(#bgMid)" stroke="#d97706" stroke-width="1"/>
    <text x="550" y="233" fill="#92400e" font-weight="700">分散</text>
    <text x="550" y="253" fill="#92400e">CoreWeave 多 > Nebius 多</text>

    <rect x="680" y="210" width="200" height="60" fill="url(#bgNo)" stroke="#b91c1c" stroke-width="1"/>
    <text x="780" y="233" fill="#7f1d1d" font-weight="700">空（高 beta）</text>
    <text x="780" y="253" fill="#7f1d1d">HUT / APLD / IREN 风险最大</text>

    <!-- 通用云 -->
    <rect x="220" y="280" width="200" height="60" fill="url(#bgYes)" stroke="#059669" stroke-width="1"/>
    <text x="320" y="303" fill="#065f46" font-weight="700">中性偏防御</text>
    <text x="320" y="323" fill="#065f46">AI 部分毛利下行；非 AI 受益</text>

    <rect x="450" y="280" width="200" height="60" fill="url(#bgMid)" stroke="#d97706" stroke-width="1"/>
    <text x="550" y="303" fill="#92400e" font-weight="700">持有</text>
    <text x="550" y="323" fill="#92400e">MSFT 生态 + GOOGL TPU</text>

    <rect x="680" y="280" width="200" height="60" fill="url(#bgNo)" stroke="#b91c1c" stroke-width="1"/>
    <text x="780" y="303" fill="#7f1d1d" font-weight="700">多（成熟业务）</text>
    <text x="780" y="323" fill="#7f1d1d">资金回流 ORCL 数据库 / Azure 企业</text>

    <!-- Oracle -->
    <rect x="220" y="350" width="200" height="60" fill="url(#bgYes)" stroke="#059669" stroke-width="1"/>
    <text x="320" y="373" fill="#065f46" font-weight="700">空 / 减仓</text>
    <text x="320" y="393" fill="#065f46">14% 毛利 + 单一客户集中</text>

    <rect x="450" y="350" width="200" height="60" fill="url(#bgMid)" stroke="#d97706" stroke-width="1"/>
    <text x="550" y="373" fill="#92400e" font-weight="700">对冲持有</text>
    <text x="550" y="393" fill="#92400e">传统数据库稳 + AI 云赌</text>

    <rect x="680" y="350" width="200" height="60" fill="url(#bgNo)" stroke="#b91c1c" stroke-width="1"/>
    <text x="780" y="373" fill="#7f1d1d" font-weight="700">空 put</text>
    <text x="780" y="393" fill="#7f1d1d">最脆弱的 AI 概念股</text>

    <!-- Sovereign / 自建 -->
    <rect x="220" y="420" width="200" height="60" fill="url(#bgYes)" stroke="#059669" stroke-width="1"/>
    <text x="320" y="443" fill="#065f46" font-weight="700">多（防御 15%）</text>
    <text x="320" y="463" fill="#065f46">DELL/HPE/欧洲主权云</text>

    <rect x="450" y="420" width="200" height="60" fill="url(#bgMid)" stroke="#d97706" stroke-width="1"/>
    <text x="550" y="443" fill="#92400e" font-weight="700">多（增量）</text>
    <text x="550" y="463" fill="#92400e">Sovereign AI 2026 $80B</text>

    <rect x="680" y="420" width="200" height="60" fill="url(#bgNo)" stroke="#b91c1c" stroke-width="1"/>
    <text x="780" y="443" fill="#7f1d1d" font-weight="700">中性</text>
    <text x="780" y="463" fill="#7f1d1d">慢牛但企业 IT 周期拖累</text>

    <!-- 电力 / 液冷 -->
    <rect x="220" y="490" width="200" height="60" fill="url(#bgYes)" stroke="#059669" stroke-width="1"/>
    <text x="320" y="513" fill="#065f46" font-weight="700">多（防御 10%）</text>
    <text x="320" y="533" fill="#065f46">物理上限 = 终极定价权</text>

    <rect x="450" y="490" width="200" height="60" fill="url(#bgMid)" stroke="#d97706" stroke-width="1"/>
    <text x="550" y="513" fill="#92400e" font-weight="700">多</text>
    <text x="550" y="533" fill="#92400e">慢牛但确定（VRT/CEG）</text>

    <rect x="680" y="490" width="200" height="60" fill="url(#bgNo)" stroke="#b91c1c" stroke-width="1"/>
    <text x="780" y="513" fill="#7f1d1d" font-weight="700">持有</text>
    <text x="780" y="513" fill="#7f1d1d"></text>
    <text x="780" y="533" fill="#7f1d1d">基础设施仍要建，只是节奏变慢</text>

    <!-- 反向 hedge -->
    <rect x="220" y="560" width="200" height="60" fill="url(#bgYes)" stroke="#059669" stroke-width="1"/>
    <text x="320" y="583" fill="#065f46" font-weight="700">20% 反向</text>
    <text x="320" y="603" fill="#065f46">put / 短债 / 黄金</text>

    <rect x="450" y="560" width="200" height="60" fill="url(#bgMid)" stroke="#d97706" stroke-width="1"/>
    <text x="550" y="583" fill="#92400e" font-weight="700">15% 反向</text>
    <text x="550" y="603" fill="#92400e">滚动 put / 部分反向 ETF</text>

    <rect x="680" y="560" width="200" height="60" fill="url(#bgNo)" stroke="#b91c1c" stroke-width="1"/>
    <text x="780" y="583" fill="#7f1d1d" font-weight="700">反向全开</text>
    <text x="780" y="603" fill="#7f1d1d">SH / SDS / 现金 / 黄金</text>
  </g>

  <!-- 底部推荐组合 -->
  <g>
    <rect x="40" y="640" width="1020" height="60" rx="8" fill="#0f172a"/>
    <text x="60" y="660" font-size="13" font-weight="700" fill="#fbbf24">推荐组合（假设部分成立，主导方案）：</text>
    <text x="60" y="682" font-size="11" fill="#e2e8f0">
      核心 40%（NVDA/TSM/AVGO + MSFT/GOOGL） + 卫星 25%（CRWV/NBIS） + 防御 15%（DELL/VRT/CEG） + 反向 hedge 20%（NVDA put / SH / 现金）
    </text>
  </g>
</svg>