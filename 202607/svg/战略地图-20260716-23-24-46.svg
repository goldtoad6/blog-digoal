<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">中国 AI Infra 势力地图：行业垂直度与技术自研深度</title>
  <desc id="desc">横轴为行业垂直度，纵轴为技术自研深度。阿里灵骏、华为昇思、百度千帆和火山方舟位于右上方；OpenAI 与 Anthropic 位于左上方；潞晨、SiliconFlow 与 Lepton 位于左下方；谐云当前位置位于右下方。橙色箭头指向建议落点：行业级国产多云 AI 生产控制平面。</desc>
  <defs>
    <pattern id="targetHatch" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#eb6834" stroke-width="2" opacity="0.18"/>
    </pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 Z" fill="#eb6834"/>
    </marker>
  </defs>
  <rect width="1400" height="900" fill="#fcfcfb"/>
  <text x="70" y="48" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="25" font-weight="700" fill="#0b0b0b">中国 AI Infra 势力地图</text>
  <text x="70" y="78" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#52514e">定位不是市场份额测量：坐标是基于公开产品边界、交付对象与技术栈的战略判断（2026-07）</text>

  <!-- plot -->
  <rect x="105" y="115" width="1040" height="650" fill="#ffffff" stroke="#c3c2b7" stroke-width="1"/>
  <g stroke="#e1e0d9" stroke-width="1">
    <line x1="313" y1="115" x2="313" y2="765"/><line x1="521" y1="115" x2="521" y2="765"/>
    <line x1="729" y1="115" x2="729" y2="765"/><line x1="937" y1="115" x2="937" y2="765"/>
    <line x1="105" y1="245" x2="1145" y2="245"/><line x1="105" y1="375" x2="1145" y2="375"/>
    <line x1="105" y1="505" x2="1145" y2="505"/><line x1="105" y1="635" x2="1145" y2="635"/>
  </g>
  <g font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#898781">
    <text x="100" y="781">0</text><text x="303" y="781">20</text><text x="511" y="781">40</text><text x="719" y="781">60</text><text x="927" y="781">80</text><text x="1130" y="781">100</text>
    <text x="75" y="770">0</text><text x="70" y="640">20</text><text x="70" y="510">40</text><text x="70" y="380">60</text><text x="70" y="250">80</text><text x="65" y="125">100</text>
  </g>
  <line x1="105" y1="765" x2="1145" y2="765" stroke="#898781" stroke-width="1.5"/>
  <line x1="105" y1="115" x2="105" y2="765" stroke="#898781" stroke-width="1.5"/>
  <text x="625" y="822" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="600" fill="#0b0b0b">行业垂直度 →</text>
  <text x="30" y="440" transform="rotate(-90 30 440)" text-anchor="middle" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" font-weight="600" fill="#0b0b0b">技术自研深度 →</text>
  <text x="130" y="145" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#898781">通用 / 模型中心</text>
  <text x="1015" y="745" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#898781">行业 / 交付中心</text>

  <!-- recommended landing zone -->
  <rect x="850" y="300" width="230" height="155" rx="12" fill="url(#targetHatch)" stroke="#eb6834" stroke-width="2" stroke-dasharray="7 5"/>
  <text x="865" y="325" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="700" fill="#eb6834">建议落点（不是巨头全栈）</text>
  <text x="865" y="350" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#0b0b0b">行业级 AI 生产</text>
  <text x="865" y="371" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" font-weight="700" fill="#0b0b0b">控制平面</text>
  <text x="865" y="397" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#52514e">国产多芯 / 多云</text>
  <text x="865" y="416" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#52514e">Agent 运行时 / 调度 / 治理</text>

  <!-- arrow from current to target -->
  <path d="M906 557 C930 510, 950 445, 965 415" fill="none" stroke="#eb6834" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="925" y="520" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#eb6834">12个月迁移方向</text>

  <!-- players: clouds squares -->
  <g fill="#2a78d6" stroke="#ffffff" stroke-width="3">
    <rect x="915" y="198" width="18" height="18" rx="3"/><rect x="977" y="250" width="18" height="18" rx="3"/>
    <rect x="884" y="289" width="18" height="18" rx="3"/><rect x="832" y="328" width="18" height="18" rx="3"/>
  </g>
  <g font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#0b0b0b">
    <text x="941" y="210">阿里灵骏</text><text x="1003" y="263">华为昇思 / ModelArts</text>
    <text x="910" y="302">百度千帆</text><text x="858" y="341">火山方舟</text>
  </g>

  <!-- frontier labs: circles -->
  <g fill="#4a3aa7" stroke="#ffffff" stroke-width="3">
    <circle cx="334" cy="206" r="10"/><circle cx="427" cy="232" r="10"/>
  </g>
  <g font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#0b0b0b">
    <text x="352" y="211">OpenAI</text><text x="445" y="237">Anthropic</text>
  </g>

  <!-- independent infra: triangles -->
  <g fill="#1baf7a" stroke="#ffffff" stroke-width="3">
    <path d="M364 546 l11 19 h-22 z"/><path d="M437 572 l11 19 h-22 z"/><path d="M499 598 l11 19 h-22 z"/>
    <path d="M582 507 l11 19 h-22 z"/>
  </g>
  <g font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#0b0b0b">
    <text x="382" y="559">潞晨</text><text x="455" y="585">SiliconFlow</text><text x="517" y="611">Lepton（已停止独立运营）</text><text x="600" y="519">九章云极</text>
  </g>

  <!-- industry platforms -->
  <g fill="#eb6834" stroke="#ffffff" stroke-width="3">
    <path d="M895 546 l11 -8 l11 8 l-4 14 h-14 z"/>
    <path d="M749 449 l11 -8 l11 8 l-4 14 h-14 z"/>
  </g>
  <g font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="14" fill="#0b0b0b">
    <text x="925" y="558" font-weight="700">谐云当前位置</text><text x="779" y="461">达观数据</text>
  </g>
  <text x="925" y="579" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#52514e">行业垂直 + 平台层 + 复用 K8s</text>

  <!-- target marker -->
  <circle cx="976" cy="366" r="15" fill="#ffffff" stroke="#eb6834" stroke-width="4"/>
  <circle cx="976" cy="366" r="5" fill="#eb6834"/>

  <!-- legend -->
  <rect x="1175" y="115" width="200" height="650" rx="10" fill="#f9f9f7" stroke="#e1e0d9"/>
  <text x="1195" y="148" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" font-weight="700" fill="#0b0b0b">图例</text>
  <rect x="1197" y="173" width="16" height="16" rx="3" fill="#2a78d6"/><text x="1225" y="186" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#52514e">云厂 / 全栈平台</text>
  <circle cx="1205" cy="220" r="9" fill="#4a3aa7"/><text x="1225" y="224" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#52514e">模型公司 / 自研全栈</text>
  <path d="M1205 251 l10 18 h-20 z" fill="#1baf7a"/><text x="1225" y="264" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#52514e">独立 AI Infra</text>
  <path d="M1195 303 l10 -8 l10 8 l-4 14 h-12 z" fill="#eb6834"/><text x="1225" y="314" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#52514e">行业型平台</text>
  <circle cx="1205" cy="360" r="12" fill="#ffffff" stroke="#eb6834" stroke-width="3"/><circle cx="1205" cy="360" r="4" fill="#eb6834"/><text x="1225" y="364" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#52514e">建议落点</text>
  <line x1="1195" y1="400" x2="1355" y2="400" stroke="#e1e0d9"/>
  <text x="1195" y="430" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="13" font-weight="700" fill="#0b0b0b">读图结论</text>
  <text x="1195" y="456" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#52514e">巨头占据“通用全栈”；</text>
  <text x="1195" y="478" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#52514e">独立厂商占据“效率单点”；</text>
  <text x="1195" y="500" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#52514e">谐云应上移为“行业</text>
  <text x="1195" y="522" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="12" fill="#52514e">生产控制平面”。</text>
  <text x="1195" y="570" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#898781">注：Lepton 2025 年被</text>
  <text x="1195" y="588" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#898781">英伟达收购后停止原平台</text>
  <text x="1195" y="606" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#898781">独立运营，作为供应与</text>
  <text x="1195" y="624" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#898781">资本依赖的反例。</text>
  <text x="1195" y="714" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#898781">来源：公开产品资料；</text>
  <text x="1195" y="732" font-family="system-ui, -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="#898781">坐标为战略分析判断。</text>
</svg>
