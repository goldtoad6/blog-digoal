<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 720" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', Arial, sans-serif">
  <!-- Background -->
  <rect width="1080" height="720" fill="#fafafa"/>

  <!-- Title -->
  <text x="540" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1a1a1a">阿里巴巴业务竞争力矩阵（FY2026 Q4 / 2026年7月）</text>
  <text x="540" y="62" text-anchor="middle" font-size="13" fill="#666">横轴：增长动能（%）  纵轴：竞争地位（市占率）  气泡：相对业务体量</text>

  <!-- Axes -->
  <line x1="100" y1="640" x2="1000" y2="640" stroke="#333" stroke-width="1.5"/>
  <line x1="100" y1="640" x2="100" y2="120" stroke="#333" stroke-width="1.5"/>

  <!-- Grid lines -->
  <line x1="350" y1="640" x2="350" y2="120" stroke="#ddd" stroke-dasharray="3,3"/>
  <line x1="550" y1="640" x2="550" y2="120" stroke="#ddd" stroke-dasharray="3,3"/>
  <line x1="750" y1="640" x2="750" y2="120" stroke="#ddd" stroke-dasharray="3,3"/>
  <line x1="100" y1="200" x2="1000" y2="200" stroke="#ddd" stroke-dasharray="3,3"/>
  <line x1="100" y1="350" x2="1000" y2="350" stroke="#ddd" stroke-dasharray="3,3"/>
  <line x1="100" y1="490" x2="1000" y2="490" stroke="#ddd" stroke-dasharray="3,3"/>

  <!-- Quadrant labels -->
  <text x="930" y="145" text-anchor="end" font-size="12" fill="#888" font-style="italic">高占位 · 高增长（护城河区）</text>
  <text x="170" y="145" text-anchor="start" font-size="12" fill="#888" font-style="italic">高占位 · 低增长（现金奶牛）</text>
  <text x="930" y="620" text-anchor="end" font-size="12" fill="#888" font-style="italic">低占位 · 高增长（突围区）</text>
  <text x="170" y="620" text-anchor="start" font-size="12" fill="#888" font-style="italic">低占位 · 低增长（防御区）</text>

  <!-- Axis ticks -->
  <text x="100" y="660" text-anchor="middle" font-size="11" fill="#555">0%</text>
  <text x="350" y="660" text-anchor="middle" font-size="11" fill="#555">15%</text>
  <text x="550" y="660" text-anchor="middle" font-size="11" fill="#555">30%</text>
  <text x="750" y="660" text-anchor="middle" font-size="11" fill="#555">45%</text>
  <text x="1000" y="660" text-anchor="middle" font-size="11" fill="#555">60%+</text>
  <text x="80" y="640" text-anchor="end" font-size="11" fill="#555">0%</text>
  <text x="80" y="490" text-anchor="end" font-size="11" fill="#555">15%</text>
  <text x="80" y="350" text-anchor="end" font-size="11" fill="#555">30%</text>
  <text x="80" y="200" text-anchor="end" font-size="11" fill="#555">45%</text>

  <!-- Axis titles -->
  <text x="540" y="690" text-anchor="middle" font-size="13" font-weight="600" fill="#222">增速（YoY %）</text>
  <text x="40" y="380" text-anchor="middle" font-size="13" font-weight="600" fill="#222" transform="rotate(-90 40 380)">国内市占率 / 行业地位</text>

  <!-- Bubbles (cx, cy, r for size; coords for x=growth, y=position) -->
  <!-- Mapping: x: 100 = 0%, 1000 = 60%, y: 640 = 0%, 120 = 45%+ -->

  <!-- 淘天电商 (CMR ~+7% same basis, market position ~30-35% but declining) -->
  <circle cx="320" cy="260" r="55" fill="#FF6A00" fill-opacity="0.55" stroke="#FF6A00" stroke-width="2"/>
  <text x="320" y="255" text-anchor="middle" font-size="14" font-weight="700" fill="#222">淘天电商</text>
  <text x="320" y="275" text-anchor="middle" font-size="11" fill="#222">CMR同口径+7%</text>
  <text x="320" y="290" text-anchor="middle" font-size="11" fill="#222">市占率~31%（下滑）</text>
  <text x="320" y="305" text-anchor="middle" font-size="11" font-weight="700" fill="#FF6A00">FY26 EBITA -12%</text>

  <!-- 阿里云 (云收入+38%, IaaS市占率32.8% 第一) -->
  <circle cx="720" cy="225" r="50" fill="#2D8CF0" fill-opacity="0.55" stroke="#2D8CF0" stroke-width="2"/>
  <text x="720" y="220" text-anchor="middle" font-size="14" font-weight="700" fill="#222">阿里云</text>
  <text x="720" y="240" text-anchor="middle" font-size="11" fill="#222">+38%（外部+40%）</text>
  <text x="720" y="255" text-anchor="middle" font-size="11" fill="#222">IaaS 32.8% 第一</text>
  <text x="720" y="270" text-anchor="middle" font-size="11" font-weight="700" fill="#2D8CF0">AI占比30%↑</text>

  <!-- 国际电商AIDC (+9%, 速卖通8%跨境份额) -->
  <circle cx="280" cy="540" r="38" fill="#9C27B0" fill-opacity="0.5" stroke="#9C27B0" stroke-width="2"/>
  <text x="280" y="538" text-anchor="middle" font-size="13" font-weight="700" fill="#222">国际电商</text>
  <text x="280" y="556" text-anchor="middle" font-size="11" fill="#222">+9%（亏损收窄）</text>
  <text x="280" y="571" text-anchor="middle" font-size="11" fill="#222">跨境份额~8%</text>
  <text x="280" y="586" text-anchor="middle" font-size="10" fill="#666">Temu 24% / SHEIN 9%</text>

  <!-- 千问大模型 (开源第一, +企业级32%份额) -->
  <circle cx="800" cy="320" r="40" fill="#19BE6B" fill-opacity="0.55" stroke="#19BE6B" stroke-width="2"/>
  <text x="800" y="318" text-anchor="middle" font-size="14" font-weight="700" fill="#222">通义千问</text>
  <text x="800" y="338" text-anchor="middle" font-size="11" fill="#222">开源衍生20万 / 10亿下载</text>
  <text x="800" y="353" text-anchor="middle" font-size="11" font-weight="700" fill="#19BE6B">企业级调用 32% 第一</text>

  <!-- 平头哥芯片 (10万卡部署, 30+车企) -->
  <circle cx="850" cy="430" r="30" fill="#19BE6B" fill-opacity="0.45" stroke="#19BE6B" stroke-width="2"/>
  <text x="850" y="428" text-anchor="middle" font-size="12" font-weight="700" fill="#222">平头哥芯片</text>
  <text x="850" y="445" text-anchor="middle" font-size="10" fill="#222">真武PPU 10万卡</text>
  <text x="850" y="459" text-anchor="middle" font-size="10" fill="#222">30+车企采用</text>

  <!-- 即时零售 (淘宝闪购 +57%, 笔单价/UE改善) -->
  <circle cx="640" cy="460" r="32" fill="#FF6A00" fill-opacity="0.4" stroke="#FF6A00" stroke-width="1.5"/>
  <text x="640" y="458" text-anchor="middle" font-size="12" font-weight="700" fill="#222">即时零售</text>
  <text x="640" y="475" text-anchor="middle" font-size="10" fill="#222">+57%（烧钱换规模）</text>
  <text x="640" y="488" text-anchor="middle" font-size="10" fill="#222">亏损收窄中</text>

  <!-- 菜鸟（业务并入电商，REITs路径） -->
  <circle cx="200" cy="490" r="25" fill="#888" fill-opacity="0.4" stroke="#888" stroke-width="1.5"/>
  <text x="200" y="488" text-anchor="middle" font-size="11" font-weight="700" fill="#222">菜鸟物流</text>
  <text x="200" y="503" text-anchor="middle" font-size="9" fill="#333">FY25营收1013亿</text>
  <text x="200" y="515" text-anchor="middle" font-size="9" fill="#333">国内业务并入电商</text>

  <!-- Bottom legend / key insight -->
  <rect x="100" y="700" width="900" height="0" fill="none"/>
  <text x="100" y="710" font-size="11" fill="#444">口径说明：电商市占率取GMV；云计算市占率取IDC/Gartner IaaS口径；"增速"为最新季度可比口径同比。</text>

  <!-- Right side commentary box -->
  <rect x="660" y="555" width="320" height="80" fill="#fff" stroke="#ddd" stroke-width="1" rx="6"/>
  <text x="672" y="575" font-size="11" font-weight="700" fill="#222">核心判断：</text>
  <text x="672" y="592" font-size="10" fill="#444">• 电商基本盘：守势未崩，但市占率逐年下滑</text>
  <text x="672" y="606" font-size="10" fill="#444">• 阿里云 + 千问：国内AI云/开源大模型双第一，</text>
  <text x="672" y="620" font-size="10" fill="#444">  是目前最确定的"反低估"逻辑</text>
</svg>