<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">物理复制延迟分解</title>
  <desc id="desc">主库产生 WAL，walsender 发送，备库 walreceiver 写入并 flush，startup 进程 replay；每段都有独立瓶颈。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
    <style>
      .title{font:700 24px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#111827}.label{font:600 15px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#111827}.small{font:13px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#374151}.muted{font:12px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#6b7280}.server{fill:#f8fafc;stroke:#334155;stroke-width:1.4;rx:16}.proc{fill:#dbeafe;stroke:#2563eb;stroke-width:1.3;rx:12}.wal{fill:#fff7ed;stroke:#f97316;stroke-width:1.3;rx:10}.disk{fill:#f1f5f9;stroke:#64748b;stroke-width:1.2;rx:10}.arrow{stroke:#334155;stroke-width:1.8;fill:none;marker-end:url(#arrow)}.lag{fill:#fee2e2;stroke:#ef4444;stroke-width:1.2;rx:10}.feedback{stroke:#16a34a;stroke-width:2;fill:none;stroke-dasharray:6 5;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="960" height="520" fill="#fff"/>
  <text x="40" y="44" class="title">STANDBY 延迟：send、flush、replay 是三段不同问题</text>

  <rect x="50" y="92" width="350" height="272" class="server"/>
  <text x="76" y="126" class="label">Primary</text>
  <rect x="82" y="158" width="116" height="62" class="proc"/>
  <text x="104" y="194" class="small">backend</text>
  <rect x="232" y="158" width="116" height="62" class="wal"/>
  <text x="256" y="185" class="small">WAL buffer</text>
  <text x="258" y="205" class="muted">insert LSN</text>
  <path d="M198 189 L232 189" class="arrow"/>
  <rect x="82" y="264" width="116" height="62" class="disk"/>
  <text x="114" y="300" class="small">pg_wal</text>
  <rect x="232" y="264" width="116" height="62" class="proc"/>
  <text x="258" y="300" class="small">walsender</text>
  <path d="M290 220 L290 264" class="arrow"/>
  <path d="M232 295 L198 295" class="arrow"/>

  <rect x="560" y="92" width="350" height="272" class="server"/>
  <text x="586" y="126" class="label">Standby</text>
  <rect x="592" y="158" width="116" height="62" class="proc"/>
  <text x="614" y="194" class="small">walreceiver</text>
  <rect x="742" y="158" width="116" height="62" class="disk"/>
  <text x="776" y="185" class="small">pg_wal</text>
  <text x="770" y="205" class="muted">write / flush</text>
  <path d="M708 189 L742 189" class="arrow"/>
  <rect x="592" y="264" width="116" height="62" class="proc"/>
  <text x="624" y="291" class="small">startup</text>
  <text x="618" y="311" class="muted">redo apply</text>
  <rect x="742" y="264" width="116" height="62" class="disk"/>
  <text x="764" y="291" class="small">data files</text>
  <text x="770" y="311" class="muted">replay LSN</text>
  <path d="M800 220 L650 264" class="arrow"/>
  <path d="M708 295 L742 295" class="arrow"/>

  <path d="M348 295 C430 295,478 190,592 190" class="arrow"/>
  <text x="430" y="176" class="label">网络 / wal_sender</text>
  <text x="452" y="200" class="muted">sent_lsn - write_lsn</text>

  <rect x="80" y="398" width="220" height="70" class="lag"/>
  <text x="104" y="428" class="label">send 慢</text>
  <text x="104" y="450" class="small">WAL 产生速率 &gt; 网络/发送速率</text>
  <rect x="370" y="398" width="220" height="70" class="lag"/>
  <text x="394" y="428" class="label">flush 慢</text>
  <text x="394" y="450" class="small">备库 pg_wal fsync 跟不上</text>
  <rect x="660" y="398" width="220" height="70" class="lag"/>
  <text x="684" y="428" class="label">replay 慢</text>
  <text x="684" y="450" class="small">redo/冲突/备机 IO 跟不上</text>

  <path d="M650 158 C610 64,326 62,292 158" class="feedback"/>
  <text x="388" y="82" class="small" fill="#166534">hot_standby_feedback：把 standby xmin 反馈给 primary</text>
</svg>
