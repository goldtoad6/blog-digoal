<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'PingFang SC','Helvetica Neue',Arial,sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafcff"/>
      <stop offset="100%" stop-color="#eef2f8"/>
    </linearGradient>
  </defs>

  <rect width="900" height="620" fill="url(#bg3)"/>

  <!-- 标题 -->
  <text x="450" y="38" text-anchor="middle" font-size="22" font-weight="700" fill="#1f2a44">认知功能的年龄曲线</text>
  <text x="450" y="62" text-anchor="middle" font-size="13" fill="#56627a">基于 Salthouse 系列研究的概念示意 —— 流体智力 25–30 岁达峰，之后≈1%/年下降；晶体智力可维持或上升</text>

  <!-- ========================= 绘图区 ========================= -->
  <!-- 绘图区：X 轴 [80, 820]（对应 20–90 岁），Y 轴 [120, 470]（对应 100%–0%） -->

  <!-- Y 轴 -->
  <line x1="80" y1="120" x2="80" y2="470" stroke="#9aa6bc" stroke-width="1.2"/>
  <!-- X 轴 -->
  <line x1="80" y1="470" x2="820" y2="470" stroke="#9aa6bc" stroke-width="1.2"/>

  <!-- 横向网格（每 20%） -->
  <line x1="80" y1="190" x2="820" y2="190" stroke="#dde3ec" stroke-dasharray="4,4"/>
  <line x1="80" y1="260" x2="820" y2="260" stroke="#dde3ec" stroke-dasharray="4,4"/>
  <line x1="80" y1="330" x2="820" y2="330" stroke="#dde3ec" stroke-dasharray="4,4"/>
  <line x1="80" y1="400" x2="820" y2="400" stroke="#dde3ec" stroke-dasharray="4,4"/>

  <!-- Y 轴刻度标签 -->
  <g font-size="11" fill="#56627a" text-anchor="end">
    <text x="72" y="124">100%</text>
    <text x="72" y="194">80%</text>
    <text x="72" y="264">60%</text>
    <text x="72" y="334">40%</text>
    <text x="72" y="404">20%</text>
    <text x="72" y="474">0%</text>
  </g>

  <!-- X 轴刻度标签（每隔 10 岁） -->
  <g font-size="11" fill="#56627a" text-anchor="middle">
    <text x="80"  y="490">20</text>
    <text x="133" y="490">25</text>
    <text x="186" y="490">30</text>
    <text x="291" y="490">40</text>
    <text x="397" y="490">50</text>
    <text x="502" y="490">60</text>
    <text x="608" y="490">70</text>
    <text x="714" y="490">80</text>
    <text x="820" y="490">90</text>
  </g>

  <!-- X 轴标题 -->
  <text x="450" y="515" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2a44">年龄（岁）</text>
  <!-- Y 轴标题（旋转） -->
  <text x="30" y="295" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2a44" transform="rotate(-90 30 295)">相对峰值水平</text>

  <!-- ========================= 数据曲线 ========================= -->
  <!-- 年龄 → X：  20→80, 25→133, 30→186, 40→291, 50→397, 60→502, 70→608, 80→714, 90→820
       百分比 → Y：100→120, 80→190, 60→260, 40→330, 20→400, 0→470
       公式：x = 80 + (age-20)*10.57；y = 120 + (1-pct)*350 -->

  <!-- 曲线 1：流体智力（处理速度 + 工作记忆）：25 岁达峰，其后 ≈ −1%/年 -->
  <path d="M 80,120 Q 100,118 133,120 L 820,347.5"
        fill="none" stroke="#3b6fd6" stroke-width="3" stroke-linecap="round"/>
  <circle cx="133" cy="120" r="5" fill="#3b6fd6"/>
  <circle cx="820" cy="347.5" r="4" fill="#3b6fd6"/>
  <text x="145" y="106" font-size="13" font-weight="700" fill="#3b6fd6">流体智力</text>
  <text x="145" y="124" font-size="11" fill="#3b6fd6">处理速度 / 工作记忆</text>

  <!-- 曲线 2：晶体智力（词汇、知识）：缓慢上升 → 平台 → 轻微下降 -->
  <path d="M 80,190 Q 130,170 186,155 Q 290,142 397,137.5 Q 500,140 608,148 Q 710,160 820,172.5"
        fill="none" stroke="#1f9d6c" stroke-width="3" stroke-linecap="round"/>
  <text x="180" y="148" font-size="13" font-weight="700" fill="#1f9d6c">晶体智力</text>
  <text x="180" y="166" font-size="11" fill="#1f9d6c">词汇 / 知识，受经验缓冲</text>

  <!-- 曲线 3：前额叶执行功能：晚熟早衰，虚线 -->
  <path d="M 80,210 Q 100,160 133,120 Q 160,128 186,140 Q 290,180 397,210 Q 500,255 608,295 Q 720,345 820,375"
        fill="none" stroke="#e07f12" stroke-width="3" stroke-linecap="round" stroke-dasharray="6,3"/>
  <text x="240" y="222" font-size="13" font-weight="700" fill="#e07f12">前额叶执行功能</text>
  <text x="240" y="240" font-size="11" fill="#e07f12">25 岁成熟，最早衰减</text>

  <!-- 25 岁峰值竖虚线 -->
  <line x1="133" y1="120" x2="133" y2="470" stroke="#9aa6bc" stroke-dasharray="2,3" stroke-width="1"/>
  <text x="133" y="115" text-anchor="middle" font-size="11" font-weight="600" fill="#56627a">↑ 25 岁峰值</text>

  <!-- ========================= 备注框 ========================= -->
  <g transform="translate(80,540)">
    <rect width="760" height="60" rx="10" fill="#ffffff" stroke="#cdd5e0"/>
    <text x="20" y="24" font-size="13" font-weight="700" fill="#1f2a44">「不可抗」吗？三条被 RCT/纵向证据支持的干预缝</text>
    <text x="20" y="46" font-size="12" fill="#3a4660">· 有氧运动（Erickson 2011，BDNF / 海马）  · 持续冥想（Hölzel 2011；Kang 2013，PFC 厚度）  · 教育与认知储备（Schaie 2005；Stern 2012）</text>
  </g>

</svg>
