<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="funnelTop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="funnelMid" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="funnelBot" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="funnelEnd" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F87171"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="960" height="720" fill="url(#bg)"/>

  <!-- Title -->
  <text x="480" y="48" text-anchor="middle" fill="#F8FAFC" font-size="22" font-weight="700">SKILL 填满之后,AI Agent 商业落地的六层漏斗</text>
  <text x="480" y="74" text-anchor="middle" fill="#94A3B8" font-size="13">100 个商机 → 续约 / 扩展销售的层层折损</text>

  <!-- Funnel: top (widest) to bottom (narrowest) -->
  <!-- Layer 1: 100 -->
  <polygon points="120,110 840,110 800,170 160,170" fill="url(#funnelTop)"/>
  <text x="480" y="145" text-anchor="middle" fill="#0F172A" font-size="16" font-weight="700">① POC 陷阱 · 100</text>

  <!-- Layer 2: 60 -->
  <polygon points="160,180 800,180 760,240 200,240" fill="url(#funnelMid)"/>
  <text x="480" y="215" text-anchor="middle" fill="#0F172A" font-size="16" font-weight="700">② 系统集成 · 60</text>

  <!-- Layer 3: 40 -->
  <polygon points="200,250 760,250 720,310 240,310" fill="url(#funnelMid)"/>
  <text x="480" y="285" text-anchor="middle" fill="#0F172A" font-size="16" font-weight="700">③ 定价模式 · 40</text>

  <!-- Layer 4: 25 -->
  <polygon points="240,320 720,320 680,380 280,380" fill="url(#funnelBot)"/>
  <text x="480" y="355" text-anchor="middle" fill="#0F172A" font-size="16" font-weight="700">④ 长尾场景 · 25</text>

  <!-- Layer 5: 15 -->
  <polygon points="280,390 680,390 640,450 320,450" fill="url(#funnelBot)"/>
  <text x="480" y="425" text-anchor="middle" fill="#0F172A" font-size="16" font-weight="700">⑤ 价值度量 · 15</text>

  <!-- Layer 6: 8 -->
  <polygon points="320,460 640,460 600,520 360,520" fill="url(#funnelEnd)"/>
  <text x="480" y="495" text-anchor="middle" fill="#0F172A" font-size="16" font-weight="700">⑥ CS 缺位 · 8</text>

  <!-- Bottom outcome -->
  <polygon points="360,530 600,530 560,580 400,580" fill="#7C3AED"/>
  <text x="480" y="562" text-anchor="middle" fill="#FFFFFF" font-size="15" font-weight="700">续约 + 扩展销售</text>

  <!-- Conversion rate annotations (right side) -->
  <g font-size="11" fill="#E2E8F0">
    <text x="860" y="145" text-anchor="end">60%</text>
    <text x="860" y="215" text-anchor="end">67%</text>
    <text x="860" y="285" text-anchor="end">63%</text>
    <text x="860" y="355" text-anchor="end">60%</text>
    <text x="860" y="425" text-anchor="end">53%</text>
    <text x="860" y="495" text-anchor="end">53%</text>
  </g>

  <!-- Left side: pain point labels -->
  <g font-size="11" fill="#94A3B8">
    <text x="100" y="145" text-anchor="start">Demo 惊艳</text>
    <text x="100" y="160" text-anchor="start">生产熄火</text>
    <text x="100" y="215" text-anchor="start">进不了流程</text>
    <text x="100" y="285" text-anchor="start">客户算不清账</text>
    <text x="100" y="355" text-anchor="start">长尾吞噬 ROI</text>
    <text x="100" y="425" text-anchor="start">业务方不信</text>
    <text x="100" y="495" text-anchor="start">用不起来</text>
  </g>

  <!-- Footer takeaway -->
  <rect x="80" y="610" width="800" height="80" rx="10" fill="#1E293B" stroke="#334155" stroke-width="1"/>
  <text x="100" y="640" fill="#F8FAFC" font-size="13" font-weight="700">结论</text>
  <text x="100" y="662" fill="#CBD5E1" font-size="12">SKILL 填满 = 技术问题被解决;但商业化从来不是技术问题。</text>
  <text x="100" y="680" fill="#CBD5E1" font-size="12">下半场不是模型之争,是商业工程之争——产品 + 解决方案架构 + CS + 懂业务的销售。</text>
</svg>