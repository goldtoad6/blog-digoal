<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="cashGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="burnGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f87171"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="burnAreaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="48" y="46" font-size="22" font-weight="700" fill="#e2e8f0">Alphabet · AI Capex Burn vs. Operating Cash Flow</text>
  <text x="48" y="68" font-size="13" fill="#94a3b8">Quarterly OCF (green) vs. Capex (red) — 2024Q1 through 2026Q1, with 2026E full-year projection</text>

  <!-- Y axis baseline (left) -->
  <line x1="80" y1="100" x2="80" y2="440" stroke="#475569" stroke-width="1"/>
  <!-- X axis baseline -->
  <line x1="80" y1="440" x2="920" y2="440" stroke="#475569" stroke-width="1"/>

  <!-- Grid lines -->
  <g stroke="#334155" stroke-width="0.5" stroke-dasharray="3,3">
    <line x1="80" y1="160" x2="920" y2="160"/>
    <line x1="80" y1="220" x2="920" y2="220"/>
    <line x1="80" y1="280" x2="920" y2="280"/>
    <line x1="80" y1="340" x2="920" y2="340"/>
    <line x1="80" y1="400" x2="920" y2="400"/>
  </g>

  <!-- Y-axis labels (Billion USD) -->
  <g font-size="11" fill="#94a3b8" text-anchor="end">
    <text x="74" y="164">$120B</text>
    <text x="74" y="224">$90B</text>
    <text x="74" y="284">$60B</text>
    <text x="74" y="344">$30B</text>
    <text x="74" y="444">$0</text>
  </g>

  <!-- X-axis labels (Quarters) -->
  <g font-size="10" fill="#94a3b8" text-anchor="middle">
    <text x="110" y="460">24Q1</text>
    <text x="170" y="460">24Q2</text>
    <text x="230" y="460">24Q3</text>
    <text x="290" y="460">24Q4</text>
    <text x="350" y="460">25Q1</text>
    <text x="410" y="460">25Q2</text>
    <text x="470" y="460">25Q3</text>
    <text x="530" y="460">25Q4</text>
    <text x="590" y="460">26Q1</text>
    <text x="650" y="460">26Q2E</text>
    <text x="710" y="460">26Q3E</text>
    <text x="770" y="460">26Q4E</text>
    <text x="855" y="460">27E (avg/q)</text>
  </g>

  <!-- OCF area + line (Historical + Projection) -->
  <!-- Historical OCF points: 24Q1~32, 24Q2~29, 24Q3~30, 24Q4~33, 25Q1~36, 25Q2~29.8, 25Q3~30, 25Q4~38, 26Q1~45.79 -->
  <!-- Y scale: $120B -> y160, $90B -> y220, $60B -> y280, $30B -> y340, $0 -> y440. Step per $30B = 60px, step per $1B = 2px -->
  <path d="M110,376 L170,382 L230,380 L290,374 L350,368 L410,380 L470,380 L530,364 L590,348 L650,344 L710,340 L770,336 L855,328 L855,440 L110,440 Z" fill="url(#areaGrad)"/>
  <path d="M110,376 L170,382 L230,380 L290,374 L350,368 L410,380 L470,380 L530,364 L590,348 L650,344 L710,340 L770,336 L855,328"
        fill="none" stroke="#10b981" stroke-width="2.5" filter="url(#soft)"/>
  <path d="M110,376 L170,382 L230,380 L290,374 L350,368 L410,380 L470,380 L530,364 L590,348 L650,344 L710,340 L770,336 L855,328"
        fill="none" stroke="url(#cashGrad)" stroke-width="2.5"/>

  <!-- Capex area + line -->
  <!-- Historical Capex: 24Q1~12, 24Q2~13, 24Q3~13, 24Q4~15, 25Q1~22, 25Q2~35, 25Q3~24, 25Q4~22, 26Q1~$35-40B implied -->
  <!-- 2026 full year capex ~$185B / 4 = ~$46/q avg. 2027 possibly $200B+ -->
  <path d="M110,416 L170,414 L230,414 L290,410 L350,396 L410,370 L470,392 L530,396 L590,372 L650,348 L710,344 L770,340 L855,320 L855,440 L110,440 Z" fill="url(#burnAreaGrad)"/>
  <path d="M110,416 L170,414 L230,414 L290,410 L350,396 L410,370 L470,392 L530,396 L590,372 L650,348 L710,344 L770,340 L855,320"
        fill="none" stroke="#ef4444" stroke-width="2.5" filter="url(#soft)"/>
  <path d="M110,416 L170,414 L230,414 L290,410 L350,396 L410,370 L470,392 L530,396 L590,372 L650,348 L710,344 L770,340 L855,320"
        fill="none" stroke="url(#burnGrad)" stroke-width="2.5"/>

  <!-- Historical/Projection separator -->
  <line x1="608" y1="100" x2="608" y2="440" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,4" opacity="0.6"/>
  <text x="608" y="92" font-size="10" fill="#fbbf24" text-anchor="middle">Projection →</text>

  <!-- Key callouts -->
  <g>
    <circle cx="410" cy="370" r="4" fill="#ef4444" stroke="#fff" stroke-width="1"/>
    <text x="424" y="364" font-size="11" fill="#fca5a5" font-weight="600">25Q2: Capex $35B (jump)</text>
  </g>
  <g>
    <circle cx="590" cy="348" r="4" fill="#10b981" stroke="#fff" stroke-width="1"/>
    <text x="600" y="338" font-size="11" fill="#6ee7b7" font-weight="600">26Q1: OCF $45.8B</text>
  </g>
  <g>
    <rect x="700" y="270" width="200" height="48" rx="6" fill="#1e293b" stroke="#fbbf24" stroke-width="1" opacity="0.95"/>
    <text x="710" y="287" font-size="11" fill="#fde68a" font-weight="700">2026E Capex = $180-190B</text>
    <text x="710" y="302" font-size="10" fill="#fcd34d">≈ 2× 2025 ($85-91B)</text>
    <text x="710" y="314" font-size="10" fill="#fcd34d">仍由 OCF 自然覆盖</text>
  </g>

  <!-- Legend -->
  <g transform="translate(80, 488)">
    <rect width="14" height="14" fill="#10b981" rx="2"/>
    <text x="22" y="12" font-size="12" fill="#cbd5e1">Operating Cash Flow (OCF)</text>
    <rect x="220" y="0" width="14" height="14" fill="#ef4444" rx="2"/>
    <text x="242" y="12" font-size="12" fill="#cbd5e1">Capital Expenditures (Capex)</text>
    <line x1="450" y1="7" x2="470" y2="7" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="3,3"/>
    <text x="476" y="12" font-size="12" fill="#cbd5e1">Guidance / Projection boundary</text>
  </g>

  <!-- Footer source -->
  <text x="48" y="525" font-size="10" fill="#64748b">Sources: Alphabet 10-Q/10-K &amp; 8-K filings, Q1 2026 earnings release, CNBC, Reuters · Data through 2026-07-16</text>
</svg>
