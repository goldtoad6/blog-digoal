<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 700" font-family="Inter, -apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="googleBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4285f4"/>
      <stop offset="100%" stop-color="#1a73e8"/>
    </linearGradient>
    <linearGradient id="openaiBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10a37f"/>
      <stop offset="100%" stop-color="#0d8a6b"/>
    </linearGradient>
    <linearGradient id="anthropicBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
    <linearGradient id="xaiBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1100" height="700" fill="url(#bg)"/>

  <!-- Title -->
  <text x="550" y="42" text-anchor="middle" fill="#f1f5f9" font-size="22" font-weight="700">2026 年前沿 AI 模型 · 集体延期时间线</text>
  <text x="550" y="66" text-anchor="middle" fill="#94a3b8" font-size="13">5 月 19 日 I/O 到 7 月 17 日 · 全行业不是 Google 一家在延期</text>

  <!-- Date axis at top -->
  <g transform="translate(120,110)">
    <line x1="0" y1="0" x2="900" y2="0" stroke="#475569" stroke-width="1"/>
    <!-- Tick marks for key dates -->
    <g fill="#cbd5e1" font-size="11" text-anchor="middle">
      <line x1="0" y1="-6" x2="0" y2="6" stroke="#94a3b8"/>
      <text x="0" y="-12">5/19 I/O</text>
      <line x1="120" y1="-6" x2="120" y2="6" stroke="#94a3b8"/>
      <text x="120" y="-12">5/30</text>
      <line x1="280" y1="-6" x2="280" y2="6" stroke="#94a3b8"/>
      <text x="280" y="-12">6/9</text>
      <line x1="430" y1="-6" x2="430" y2="6" stroke="#94a3b8"/>
      <text x="430" y="-12">6/26</text>
      <line x1="580" y1="-6" x2="580" y2="6" stroke="#94a3b8"/>
      <text x="580" y="-12">7/9</text>
      <line x1="720" y1="-6" x2="720" y2="6" stroke="#94a3b8"/>
      <text x="720" y="-12">7/17</text>
      <line x1="900" y1="-6" x2="900" y2="6" stroke="#94a3b8"/>
      <text x="900" y="-12">7/18</text>
    </g>
    <!-- Convert dates to x positions: 5/19=0, 5/30=120, 6/9=280, 6/26=430, 7/9=580, 7/17=720, 7/18=900 -->
  </g>

  <!-- Google row -->
  <g transform="translate(120,170)">
    <text x="-110" y="40" fill="#f1f5f9" font-size="14" font-weight="700">Google</text>
    <text x="-110" y="58" fill="#94a3b8" font-size="10">Gemini 3.5 系列</text>
    <!-- 3.5 Flash: 5/19 to ongoing -->
    <rect x="0" y="20" width="900" height="18" rx="3" fill="#1e40af" opacity="0.4"/>
    <rect x="0" y="20" width="120" height="18" rx="3" fill="url(#googleBar)" filter="url(#glow)"/>
    <text x="60" y="33" fill="#fff" font-size="10" font-weight="700">3.5 Flash · 5/20 上线</text>
    <!-- Pro: promised at I/O, finally lands 7/17 -->
    <rect x="0" y="50" width="720" height="18" rx="3" fill="#1e40af" opacity="0.4"/>
    <rect x="0" y="50" width="720" height="18" rx="3" fill="url(#googleBar)" opacity="0.55"/>
    <text x="730" y="63" fill="#bfdbfe" font-size="10">← Pro 延期 8 周（5/19 承诺 → 7/17 才落地）</text>
    <!-- Mark the promised date -->
    <line x1="120" y1="48" x2="120" y2="70" stroke="#f87171" stroke-width="2" stroke-dasharray="3,2"/>
    <text x="124" y="78" fill="#fca5a5" font-size="9">原承诺 6 月</text>
  </g>

  <!-- OpenAI row -->
  <g transform="translate(120,290)">
    <text x="-110" y="40" fill="#f1f5f9" font-size="14" font-weight="700">OpenAI</text>
    <text x="-110" y="58" fill="#94a3b8" font-size="10">GPT-5.6 (Sol/Terra/Luna)</text>
    <!-- Limited Preview 6/26 to 7/9 -->
    <rect x="430" y="20" width="150" height="18" rx="3" fill="url(#openaiBar)" opacity="0.85" filter="url(#glow)"/>
    <text x="505" y="33" fill="#fff" font-size="10" font-weight="700" text-anchor="middle">Limited Preview · 6/26 起（仅 20 家机构）</text>
    <!-- Public release 7/9 -->
    <rect x="580" y="20" width="320" height="18" rx="3" fill="url(#openaiBar)"/>
    <text x="740" y="33" fill="#fff" font-size="10" font-weight="700" text-anchor="middle">7/9 公开发布</text>
    <rect x="0" y="50" width="580" height="18" rx="3" fill="#065f46" opacity="0.4"/>
    <text x="20" y="63" fill="#a7f3d0" font-size="10">← 此前被美国 CAISI 预部署审查限制 13 天</text>
  </g>

  <!-- Anthropic row -->
  <g transform="translate(120,410)">
    <text x="-110" y="40" fill="#f1f5f9" font-size="14" font-weight="700">Anthropic</text>
    <text x="-110" y="58" fill="#94a3b8" font-size="10">Claude Mythos 5 / Fable 5</text>
    <!-- Released 6/9 -->
    <rect x="280" y="20" width="40" height="18" rx="3" fill="url(#anthropicBar)" filter="url(#glow)"/>
    <text x="300" y="33" fill="#fff" font-size="10" font-weight="700" text-anchor="middle">6/9</text>
    <!-- Pulled 6/13 -->
    <rect x="320" y="20" width="220" height="18" rx="3" fill="#7f1d1d" opacity="0.7"/>
    <text x="430" y="33" fill="#fecaca" font-size="10" font-weight="700" text-anchor="middle">6/13 被美国商务部强制下架（19 天）</text>
    <!-- Reinstated 7/1 -->
    <rect x="540" y="20" width="360" height="18" rx="3" fill="url(#anthropicBar)" opacity="0.85"/>
    <text x="720" y="33" fill="#fff" font-size="10" font-weight="700" text-anchor="middle">7/1 全面解禁（Mythos 仍限美 100+ 机构）</text>
    <rect x="0" y="50" width="280" height="18" rx="3" fill="#78350f" opacity="0.4"/>
    <text x="20" y="63" fill="#fed7aa" font-size="10">← Mythos 网络安全演示触发监管反应</text>
  </g>

  <!-- xAI row -->
  <g transform="translate(120,530)">
    <text x="-110" y="40" fill="#f1f5f9" font-size="14" font-weight="700">xAI</text>
    <text x="-110" y="58" fill="#94a3b8" font-size="10">Grok 4.5</text>
    <rect x="580" y="20" width="320" height="18" rx="3" fill="url(#xaiBar)" filter="url(#glow)"/>
    <text x="740" y="33" fill="#fff" font-size="10" font-weight="700" text-anchor="middle">7/9 正常发布</text>
    <rect x="0" y="20" width="580" height="18" rx="3" fill="#4c1d95" opacity="0.25"/>
    <text x="20" y="63" fill="#c4b5fd" font-size="10">计划被 Mythos 事件打乱 → 提前宣布 Grok 5 路线图（10T 参数 Colossus 2）</text>
  </g>

  <!-- Bottom summary -->
  <g transform="translate(120,640)">
    <rect x="0" y="0" width="900" height="38" rx="6" fill="#1e293b" stroke="#334155"/>
    <text x="20" y="16" fill="#f1f5f9" font-size="12" font-weight="700">观察：</text>
    <text x="60" y="16" fill="#cbd5e1" font-size="12">Google 延期 8 周，OpenAI 延期 13 天受限，Anthropic 延期 19 天被拔插头。</text>
    <text x="20" y="32" fill="#94a3b8" font-size="11">2026 不是 Google 一家在延期——同期被监管拉走的是 Anthropic，被审查拖慢的是 OpenAI。</text>
  </g>

  <!-- Legend / source -->
  <text x="120" y="694" fill="#64748b" font-size="10">信源：Bloomberg 2026-07-16、The Information 转引、buildfastwithai 2026-07-03、TechTimes 2026-06-29。</text>
</svg>