<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" font-family="-apple-system, 'Segoe UI', 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="layerChip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="layerBaas" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c2d12"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="layerModel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#581c87"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="layerAgent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#064e3b"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="layerApp" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7f1d1d"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <rect width="1200" height="900" fill="url(#bg)"/>
  <text x="600" y="48" text-anchor="middle" font-size="28" font-weight="700" fill="#f8fafc">AI Agent 生产链：价值密度与可防御性分布</text>
  <text x="600" y="78" text-anchor="middle" font-size="14" fill="#94a3b8">Value Density × Defensibility × Gross Margin across the Stack（数据截至 2026 Q2）</text>

  <!-- Y axis: value density, X axis: defensibility -->
  <line x1="120" y1="780" x2="1100" y2="780" stroke="#475569" stroke-width="1.5"/>
  <line x1="120" y1="130" x2="120" y2="780" stroke="#475569" stroke-width="1.5"/>
  <text x="600" y="820" text-anchor="middle" font-size="13" fill="#94a3b8">可防御性（开源替代难度 + 切换成本）→</text>
  <text x="60" y="450" text-anchor="middle" font-size="13" fill="#94a3b8" transform="rotate(-90 60 450)">价值密度 / 单客户 ARR →</text>

  <!-- Quadrant lines -->
  <line x1="610" y1="130" x2="610" y2="780" stroke="#334155" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="120" y1="450" x2="1100" y2="450" stroke="#334155" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Quadrant labels -->
  <text x="380" y="155" text-anchor="middle" font-size="12" fill="#64748b" font-style="italic">价值低 防御低</text>
  <text x="850" y="155" text-anchor="middle" font-size="12" fill="#94a3b8" font-style="italic">价值高 防御低（容易卷）</text>
  <text x="380" y="755" text-anchor="middle" font-size="12" fill="#64748b" font-style="italic">价值低 防御高（被锁住的小生意）</text>
  <text x="870" y="755" text-anchor="middle" font-size="14" fill="#fbbf24" font-weight="700" font-style="italic">SWEET SPOT：价值高 防御高</text>

  <!-- Layer: 算力/芯片 -->
  <g filter="url(#shadow)">
    <rect x="180" y="540" width="160" height="64" rx="10" fill="url(#layerChip)" opacity="0.95"/>
    <text x="260" y="566" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">算力 / 芯片</text>
    <text x="260" y="586" text-anchor="middle" font-size="11" fill="#cbd5e1">NVIDIA / TPU / 昇腾</text>
    <text x="260" y="600" text-anchor="middle" font-size="11" fill="#cbd5e1">毛利 ~75% / CapEx 极重</text>
  </g>

  <!-- Layer: 云基础设施 -->
  <g filter="url(#shadow)">
    <rect x="380" y="500" width="160" height="64" rx="10" fill="url(#layerChip)" opacity="0.85"/>
    <text x="460" y="526" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">云基础设施 (IaaS)</text>
    <text x="460" y="546" text-anchor="middle" font-size="11" fill="#cbd5e1">AWS 38% / Azure 69% / GCP 21%</text>
    <text x="460" y="560" text-anchor="middle" font-size="11" fill="#cbd5e1">三巨头拿走 68% 份额</text>
  </g>

  <!-- Layer: 数据平台 / BaaS - HIGHLIGHTED -->
  <g filter="url(#shadow)">
    <rect x="800" y="320" width="220" height="100" rx="12" fill="url(#layerBaas)" stroke="#fbbf24" stroke-width="3"/>
    <text x="910" y="350" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">数据平台 / BaaS ← higobase</text>
    <text x="910" y="372" text-anchor="middle" font-size="11" fill="#fde68a">Supabase 估值 14 个月 5× → 1050 亿美元</text>
    <text x="910" y="388" text-anchor="middle" font-size="11" fill="#fde68a">ARR 14 个月 250% 增长 · Databricks 10 亿美元收 Neon</text>
    <text x="910" y="404" text-anchor="middle" font-size="11" fill="#fde68a">向量库 2025→2034 CAGR 24% · BaaS 市场 1067 亿美元</text>
    <text x="910" y="416" text-anchor="middle" font-size="11" font-weight="700" fill="#fbbf24">★ 全栈最容易卡位的甜蜜点</text>
  </g>

  <!-- Layer: 基础模型 -->
  <g filter="url(#shadow)">
    <rect x="560" y="560" width="180" height="64" rx="10" fill="url(#layerModel)" opacity="0.9"/>
    <text x="650" y="586" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">基础模型 (LLM)</text>
    <text x="650" y="606" text-anchor="middle" font-size="11" fill="#e9d5ff">OpenAI 毛利 33–52%（爬坡中）</text>
    <text x="650" y="620" text-anchor="middle" font-size="11" fill="#e9d5ff">Anthropic 60% / API 80%+</text>
  </g>

  <!-- Layer: 编排/中间件 -->
  <g filter="url(#shadow)">
    <rect x="780" y="540" width="160" height="64" rx="10" fill="url(#layerAgent)" opacity="0.7"/>
    <text x="860" y="566" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">编排 / Agent 框架</text>
    <text x="860" y="586" text-anchor="middle" font-size="11" fill="#d1fae5">LangChain ARR 仅 1600 万美元</text>
    <text x="860" y="600" text-anchor="middle" font-size="11" fill="#d1fae5">估值 12.5 亿，开源为主</text>
  </g>

  <!-- Layer: 应用层 -->
  <g filter="url(#shadow)">
    <rect x="950" y="620" width="160" height="64" rx="10" fill="url(#layerApp)" opacity="0.85"/>
    <text x="1030" y="646" text-anchor="middle" font-size="14" font-weight="700" fill="#fff">应用层 (Agent App)</text>
    <text x="1030" y="666" text-anchor="middle" font-size="11" fill="#fecaca">Gartner: 2026 年 40% 企业应用</text>
    <text x="1030" y="680" text-anchor="middle" font-size="11" fill="#fecaca">嵌入 Agent · 但护城河最浅</text>
  </g>

  <!-- Layer: AI Coding / 端到端 harness -->
  <g filter="url(#shadow)">
    <rect x="780" y="700" width="160" height="60" rx="10" fill="url(#layerApp)" opacity="0.7"/>
    <text x="860" y="724" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">AI Coding / Harness</text>
    <text x="860" y="742" text-anchor="middle" font-size="11" fill="#fecaca">Cursor / Lovable / Bolt</text>
    <text x="860" y="754" text-anchor="middle" font-size="11" fill="#fecaca">分发强 · 但成本曲线与模型绑定</text>
  </g>

  <!-- Key insight box -->
  <g>
    <rect x="120" y="838" width="980" height="50" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
    <text x="140" y="860" font-size="13" fill="#fbbf24" font-weight="700">核心结论</text>
    <text x="140" y="880" font-size="12" fill="#e2e8f0">BaaS（数据/后端层）位于"高价值密度 + 高防御性"象限：客户一旦把向量库、Postgres、Auth、Realtime 沉淀进去，</text>
    <text x="140" y="894" font-size="12" fill="#e2e8f0">迁移成本极高；同时它捕获 AI Coding 与 Agent Runtime 的"必经过路费"——这是芯片和模型之外，唯一同时具备规模、毛利和粘性的层。</text>
  </g>

  <!-- Annotations: arrows -->
  <path d="M 920 320 Q 880 250 700 200" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5 5" opacity="0.6"/>
  <text x="730" y="190" font-size="11" fill="#fbbf24">模型 API 收入暴涨 → BaaS 同步放量</text>

  <path d="M 920 320 Q 1000 230 1100 320" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="5 5" opacity="0.6"/>
  <text x="985" y="220" font-size="11" fill="#10b981">Agent 应用层扩张 → 反向喂数据给 BaaS</text>

</svg>