<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fafbfc"/>
      <stop offset="100%" stop-color="#eef1f5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.15"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d93025"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1a73e8"/>
    </marker>
    <marker id="arrowGray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5f6368"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="700" fill="url(#bgGrad)"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#202124">Google AI 组织架构与文化张力（2024–2026）</text>
  <text x="450" y="62" text-anchor="middle" font-size="13" fill="#5f6368">从 Brain+DeepMind 合并到 Gemini 3.5 Pro 难产</text>

  <!-- ===== Top: Alphabet CEO ===== -->
  <g filter="url(#shadow)">
    <rect x="370" y="90" width="160" height="50" rx="8" fill="#202124"/>
    <text x="450" y="112" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Sundar Pichai</text>
    <text x="450" y="128" text-anchor="middle" font-size="10" fill="#9aa0a6">CEO, Alphabet &amp; Google</text>
  </g>

  <!-- ===== Jeff Dean ===== -->
  <g filter="url(#shadow)">
    <rect x="120" y="200" width="180" height="60" rx="8" fill="#ffffff" stroke="#1a73e8" stroke-width="2"/>
    <text x="210" y="222" text-anchor="middle" font-size="13" font-weight="600" fill="#202124">Jeff Dean</text>
    <text x="210" y="238" text-anchor="middle" font-size="10" fill="#5f6368">Chief Scientist (Alphabet)</text>
    <text x="210" y="252" text-anchor="middle" font-size="9" fill="#1a73e8" font-style="italic">前 Google Brain 联合创始人</text>
  </g>

  <!-- ===== Demis Hassabis ===== -->
  <g filter="url(#shadow)">
    <rect x="600" y="200" width="180" height="60" rx="8" fill="#ffffff" stroke="#d93025" stroke-width="2"/>
    <text x="690" y="222" text-anchor="middle" font-size="13" font-weight="600" fill="#202124">Demis Hassabis</text>
    <text x="690" y="238" text-anchor="middle" font-size="10" fill="#5f6368">CEO, Google DeepMind</text>
    <text x="690" y="252" text-anchor="middle" font-size="9" fill="#d93025" font-style="italic">DeepMind 创始人，AGI 派</text>
  </g>

  <!-- Arrows from Pichai -->
  <line x1="450" y1="140" x2="210" y2="200" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <line x1="450" y1="140" x2="690" y2="200" stroke="#5f6368" stroke-width="1.5" marker-end="url(#arrowGray)"/>
  <text x="280" y="170" font-size="10" fill="#5f6368" font-style="italic">AI 战略</text>
  <text x="620" y="170" font-size="10" fill="#5f6368" font-style="italic">运营责任</text>

  <!-- ===== Google DeepMind container ===== -->
  <rect x="80" y="300" width="740" height="240" rx="12" fill="#fff4e5" stroke="#f9ab00" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="450" y="320" text-anchor="middle" font-size="14" font-weight="700" fill="#b06000">Google DeepMind （2023-04 合并，融合未完成）</text>

  <!-- Brain side -->
  <g filter="url(#shadow)">
    <rect x="110" y="345" width="200" height="80" rx="6" fill="#e8f0fe" stroke="#1a73e8" stroke-width="1.5"/>
    <text x="210" y="368" text-anchor="middle" font-size="12" font-weight="600" fill="#1a73e8">Google Brain 文化</text>
    <text x="210" y="386" text-anchor="middle" font-size="10" fill="#202124">开放研究 · 工程化思维</text>
    <text x="210" y="402" text-anchor="middle" font-size="10" fill="#202124">Transformer 来源</text>
    <text x="210" y="418" text-anchor="middle" font-size="9" fill="#5f6368" font-style="italic">代表：Transformer 8 人组</text>
  </g>

  <!-- DeepMind side -->
  <g filter="url(#shadow)">
    <rect x="590" y="345" width="200" height="80" rx="6" fill="#fce8e6" stroke="#d93025" stroke-width="1.5"/>
    <text x="690" y="368" text-anchor="middle" font-size="12" font-weight="600" fill="#d93025">DeepMind 文化</text>
    <text x="690" y="386" text-anchor="middle" font-size="10" fill="#202124">英式学术 · 长周期 · 神经科学启发</text>
    <text x="690" y="402" text-anchor="middle" font-size="10" fill="#202124">AlphaFold、Gemini 1 来源</text>
    <text x="690" y="418" text-anchor="middle" font-size="9" fill="#5f6368" font-style="italic">代表：Hassabis、Legg、Suleyman</text>
  </g>

  <!-- Conflict arrow between cultures -->
  <path d="M 310 385 Q 450 360 590 385" stroke="#d93025" stroke-width="2" fill="none" marker-end="url(#arrowRed)" stroke-dasharray="6,3"/>
  <text x="450" y="350" text-anchor="middle" font-size="11" font-weight="600" fill="#d93025">持续文化张力</text>

  <!-- ===== Gemini Team (the casualty) ===== -->
  <g filter="url(#shadow)">
    <rect x="350" y="470" width="200" height="60" rx="8" fill="#fff" stroke="#5f6368" stroke-width="2"/>
    <text x="450" y="492" text-anchor="middle" font-size="13" font-weight="700" fill="#202124">Gemini 3.5 Pro 团队</text>
    <text x="450" y="510" text-anchor="middle" font-size="10" fill="#d93025">内代号: "Cappuccino"</text>
    <text x="450" y="524" text-anchor="middle" font-size="9" fill="#5f6368" font-style="italic">原定 5 月发布 → 延期至 7-17</text>
  </g>

  <!-- Arrows from Brain and DeepMind to Gemini -->
  <line x1="260" y1="425" x2="380" y2="470" stroke="#1a73e8" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="640" y1="425" x2="520" y2="470" stroke="#d93025" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <!-- ===== Side panels: external pressures ===== -->

  <!-- Left: TPU team -->
  <g filter="url(#shadow)">
    <rect x="40" y="600" width="170" height="80" rx="6" fill="#ffffff" stroke="#34a853" stroke-width="1.5"/>
    <text x="125" y="620" text-anchor="middle" font-size="11" font-weight="700" fill="#34a853">TPU 团队</text>
    <text x="125" y="638" text-anchor="middle" font-size="9" fill="#202124">Norm Jouppi 等</text>
    <text x="125" y="652" text-anchor="middle" font-size="9" fill="#5f6368">路线图耦合</text>
    <text x="125" y="666" text-anchor="middle" font-size="9" fill="#d93025" font-style="italic">→ "等芯片、等编译器"</text>
  </g>

  <!-- Center: Wall Street -->
  <g filter="url(#shadow)">
    <rect x="225" y="600" width="170" height="80" rx="6" fill="#ffffff" stroke="#fbbc04" stroke-width="1.5"/>
    <text x="310" y="620" text-anchor="middle" font-size="11" font-weight="700" fill="#b06000">华尔街（上市公司）</text>
    <text x="310" y="638" text-anchor="middle" font-size="9" fill="#202124">季度财报压力</text>
    <text x="310" y="652" text-anchor="middle" font-size="9" fill="#5f6368">既不能取消也不能轻易发</text>
    <text x="310" y="666" text-anchor="middle" font-size="9" fill="#d93025" font-style="italic">→ "挤牙膏式发布"</text>
  </g>

  <!-- Right: Responsible AI -->
  <g filter="url(#shadow)">
    <rect x="410" y="600" width="170" height="80" rx="6" fill="#ffffff" stroke="#9334e6" stroke-width="1.5"/>
    <text x="495" y="620" text-anchor="middle" font-size="11" font-weight="700" fill="#9334e6">Responsible AI</text>
    <text x="495" y="638" text-anchor="middle" font-size="9" fill="#202124">2024 萎缩 → 2025 重建</text>
    <text x="495" y="652" text-anchor="middle" font-size="9" fill="#5f6368">自我审查红线升高</text>
    <text x="495" y="666" text-anchor="middle" font-size="9" fill="#d93025" font-style="italic">→ "宁可不发"</text>
  </g>

  <!-- Far right: Year of Efficiency -->
  <g filter="url(#shadow)">
    <rect x="595" y="600" width="220" height="80" rx="6" fill="#ffffff" stroke="#ea4335" stroke-width="1.5"/>
    <text x="705" y="620" text-anchor="middle" font-size="11" font-weight="700" fill="#ea4335">"Year of Efficiency"（2023-24）</text>
    <text x="705" y="638" text-anchor="middle" font-size="9" fill="#202124">Pichai 推动，裁员 12,000+</text>
    <text x="705" y="652" text-anchor="middle" font-size="9" fill="#5f6368">长周期配套资源收缩</text>
    <text x="705" y="666" text-anchor="middle" font-size="9" fill="#d93025" font-style="italic">→ 3 年押注被砍</text>
  </g>

  <!-- Bottom warning -->
  <rect x="100" y="555" width="700" height="30" rx="4" fill="#fff4e5" stroke="#f9ab00" stroke-width="1"/>
  <text x="450" y="575" text-anchor="middle" font-size="11" font-weight="600" fill="#b06000">↑ 七层组织压力同时施压 Gemini 3.5 Pro — 任何一层单独都不致命，但七刀下在同一器官</text>

  <!-- Legend -->
  <g transform="translate(40, 660)">
    <text x="0" y="0" font-size="9" fill="#5f6368">图例：</text>
    <line x1="35" y1="-3" x2="55" y2="-3" stroke="#1a73e8" stroke-width="2"/>
    <text x="60" y="0" font-size="9" fill="#202124">Brain 派</text>
    <line x1="110" y1="-3" x2="130" y2="-3" stroke="#d93025" stroke-width="2"/>
    <text x="135" y="0" font-size="9" fill="#202124">DeepMind 派</text>
    <line x1="195" y1="-3" x2="215" y2="-3" stroke="#5f6368" stroke-width="2" stroke-dasharray="4,3"/>
    <text x="220" y="0" font-size="9" fill="#202124">汇报线</text>
  </g>
</svg>