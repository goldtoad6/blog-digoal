<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280" font-family="sans-serif">
  <text x="380" y="24" text-anchor="middle" font-size="16" font-weight="bold">典型锁等待链(SELECT FOR UPDATE 抢同一行)</text>

  <!-- 节点 -->
  <rect x="40" y="80" width="100" height="50" rx="8" fill="#f9c" stroke="#900"/>
  <text x="90" y="110" text-anchor="middle" font-weight="bold">事务 A</text>

  <rect x="220" y="80" width="100" height="50" rx="8" fill="#fdb" stroke="#900"/>
  <text x="270" y="110" text-anchor="middle" font-weight="bold">事务 B</text>

  <rect x="400" y="80" width="100" height="50" rx="8" fill="#fdb" stroke="#900"/>
  <text x="450" y="110" text-anchor="middle" font-weight="bold">事务 C</text>

  <rect x="580" y="80" width="100" height="50" rx="8" fill="#fdb" stroke="#900"/>
  <text x="630" y="110" text-anchor="middle" font-weight="bold">事务 D</text>

  <!-- 中心:目标行 -->
  <rect x="350" y="200" width="140" height="50" rx="8" fill="#cde" stroke="#06c"/>
  <text x="420" y="232" text-anchor="middle" font-weight="bold">热点行 id=42</text>

  <!-- 箭头 -->
  <path d="M 90 130 L 90 200" stroke="#900" stroke-width="2" marker-end="url(#arr)" fill="none"/>
  <text x="98" y="172" font-size="11" fill="#900">持锁</text>

  <path d="M 270 130 L 350 200" stroke="#900" stroke-width="2" marker-end="url(#arr)" fill="none"/>
  <text x="278" y="172" font-size="11" fill="#900">持锁</text>

  <path d="M 450 130 L 380 200" stroke="#c00" stroke-width="2" stroke-dasharray="4" marker-end="url(#arr)" fill="none"/>
  <text x="420" y="172" font-size="11" fill="#c00">等待</text>

  <path d="M 630 130 L 480 200" stroke="#c00" stroke-width="2" stroke-dasharray="4" marker-end="url(#arr)" fill="none"/>
  <text x="590" y="172" font-size="11" fill="#c00">等待</text>

  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 z" fill="#900"/>
    </marker>
  </defs>
</svg>