<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 480" font-family="-apple-system, 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="hottest" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#7f1d1d"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="hot" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="mid" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#a16207"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
    <linearGradient id="cool" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="480" fill="#fafafa"/>

  <text x="500" y="36" font-size="20" font-weight="700" text-anchor="middle" fill="#111">AI Agent 生产链价值分布与利润厚度</text>
  <text x="500" y="58" font-size="12" text-anchor="middle" fill="#555">高度示意：估值热度 / 利润厚度（柱越粗代表产业链上利润份额越高）</text>

  <!-- 应用层 -->
  <rect x="40" y="120" width="170" height="60" rx="8" fill="url(#cool)"/>
  <text x="125" y="148" font-size="13" font-weight="600" text-anchor="middle" fill="#fff">应用层</text>
  <text x="125" y="168" font-size="10" text-anchor="middle" fill="#fff">Lovable / Bolt / 垂类 Agent</text>

  <!-- 编排 / 中间件 -->
  <rect x="225" y="120" width="170" height="60" rx="8" fill="url(#mid)"/>
  <text x="310" y="148" font-size="13" font-weight="600" text-anchor="middle" fill="#fff">Agent 框架 / 编排</text>
  <text x="310" y="168" font-size="10" text-anchor="middle" fill="#fff">LangChain / CrewAI / AutoGen</text>

  <!-- BaaS / 数据基础设施 (higobase) -->
  <rect x="410" y="120" width="180" height="60" rx="8" fill="url(#hot)"/>
  <text x="500" y="148" font-size="13" font-weight="600" text-anchor="middle" fill="#fff">BaaS / 数据层 ★</text>
  <text x="500" y="168" font-size="10" text-anchor="middle" fill="#fff">higobase / Supabase / Pinecone</text>

  <!-- 基础模型层 -->
  <rect x="605" y="120" width="170" height="60" rx="8" fill="url(#hottest)"/>
  <text x="690" y="148" font-size="13" font-weight="600" text-anchor="middle" fill="#fff">基础模型层</text>
  <text x="690" y="168" font-size="10" text-anchor="middle" fill="#fff">OpenAI / Anthropic / Google</text>

  <!-- 算力 / 云 -->
  <rect x="790" y="120" width="170" height="60" rx="8" fill="url(#hottest)"/>
  <text x="875" y="148" font-size="13" font-weight="600" text-anchor="middle" fill="#fff">算力 / 云</text>
  <text x="875" y="168" font-size="10" text-anchor="middle" fill="#fff">NVIDIA / AWS / Azure</text>

  <!-- 利润柱状示意（height 表示价值厚度）-->
  <g transform="translate(0,0)">
    <!-- 应用 -->
    <rect x="100" y="210" width="50" height="50" fill="#60a5fa" opacity="0.85"/>
    <text x="125" y="280" font-size="11" text-anchor="middle" fill="#1e40af">毛利率 60-80%</text>
    <text x="125" y="294" font-size="10" text-anchor="middle" fill="#1e40af">但客单价受限</text>

    <!-- 框架 -->
    <rect x="285" y="210" width="50" height="50" fill="#facc15" opacity="0.85"/>
    <text x="310" y="280" font-size="11" text-anchor="middle" fill="#854d0e">估值 5-30 亿</text>
    <text x="310" y="294" font-size="10" text-anchor="middle" fill="#854d0e">开源为主变现弱</text>

    <!-- BaaS -->
    <rect x="470" y="180" width="60" height="80" fill="#f59e0b" opacity="0.9"/>
    <text x="500" y="280" font-size="11" text-anchor="middle" font-weight="700" fill="#7c2d12">估值 20-50 亿+</text>
    <text x="500" y="294" font-size="10" text-anchor="middle" font-weight="700" fill="#7c2d12">Supabase $5B / Neon $1B</text>
    <text x="500" y="308" font-size="10" text-anchor="middle" font-weight="700" fill="#7c2d12">ARR 70M，增速 100%+</text>

    <!-- 基础模型 -->
    <rect x="660" y="100" width="60" height="160" fill="#dc2626" opacity="0.9"/>
    <text x="690" y="280" font-size="11" text-anchor="middle" font-weight="700" fill="#7f1d1d">OpenAI $500B+</text>
    <text x="690" y="294" font-size="10" text-anchor="middle" font-weight="700" fill="#7f1d1d">Anthropic $183B</text>
    <text x="690" y="308" font-size="10" text-anchor="middle" font-weight="700" fill="#7f1d1d">估值 / 利润双爆</text>

    <!-- 算力 -->
    <rect x="850" y="80" width="60" height="180" fill="#7f1d1d" opacity="0.95"/>
    <text x="880" y="280" font-size="11" text-anchor="middle" font-weight="700" fill="#fff">NVIDIA $4T+</text>
    <text x="880" y="294" font-size="10" text-anchor="middle" font-weight="700" fill="#fff">AWS / Azure 千亿</text>
    <text x="880" y="308" font-size="10" text-anchor="middle" font-weight="700" fill="#fff">$利润绝对值最大</text>
  </g>

  <!-- 中间注释 -->
  <line x1="500" y1="200" x2="500" y2="120" stroke="#7c2d12" stroke-width="1.5" stroke-dasharray="4 3"/>

  <rect x="40" y="340" width="920" height="110" rx="10" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5"/>
  <text x="60" y="365" font-size="13" font-weight="700" fill="#9a3412">核心结论：</text>
  <text x="60" y="386" font-size="12" fill="#7c2d12">• BaaS 是"次厚利层"，远不及算力与基础模型的利润绝对值，但比 Agent 框架和应用层有更强变现能力；</text>
  <text x="60" y="405" font-size="12" fill="#7c2d12">• BaaS 的优势在于：用"使用量计费"卡住应用层现金流，比框架层更容易规模商业化；</text>
  <text x="60" y="424" font-size="12" fill="#7c2d12">• 风险在于：上面模型厂商自带 memory/tools、下面云厂商自带数据服务 → 中间层必须快速建立"不可替代"</text>
  <text x="60" y="443" font-size="12" fill="#7c2d12">  的差异化（混合检索语义、统一 agent runtime、自托管、合规、本地化），否则面临 Heroku 化。</text>
</svg>