  <!-- Footer -->
  <text x="700" y="788" font-size="10" fill="#475569" text-anchor="middle">数据：港交所 18C 政策 / Omdia / 投资界 / 蓝鲸新闻 / 智东西 / 央广网 ｜ Generated 2026-07-16</text>
