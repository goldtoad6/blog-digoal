    <text x="160" y="15" font-size="11" fill="#94a3b8">2026.5</text>
    <text x="320" y="15" font-size="11" fill="#fbbf24" font-weight="600">首轮 700 亿 / 估值 500 亿美元</text>
    <text x="600" y="15" font-size="11" fill="#64748b">国内 AI Infra 估值锚</text>
