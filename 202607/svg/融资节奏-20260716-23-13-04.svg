    <text x="20" y="25" font-size="13" font-weight="700" fill="#fca5a5">⚠ 红线 / 黑天鹅</text>

    <text x="20" y="55" font-size="11" fill="#fecaca">① 美股 AI 板块单季回撤 &gt; 30% → 融资窗口关闭，立即切回"现金为王"</text>
    <text x="20" y="75" font-size="11" fill="#fecaca">② 阿里明确要求谐云放弃港股 / 同业竞争冲突 → 启动股权重组</text>
    <text x="20" y="95" font-size="11" fill="#fecaca">③ 18C 已上市公司首日破发率 57%（云迹教训）→ 估值预期调降至 8×PS 以下</text>
    <text x="20" y="115" font-size="11" fill="#fecaca">④ Q1 2027 老业务 ARR 续约率 &lt; 80% → 立刻冻结新业务招聘</text>
