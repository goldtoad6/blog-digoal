  <text x="320" y="170" font-size="11" fill="#64748b" text-anchor="middle">2026 Q4</text>
  <text x="540" y="170" font-size="11" fill="#64748b" text-anchor="middle">2027 Q1</text>
  <text x="760" y="170" font-size="11" fill="#64748b" text-anchor="middle">2027 Q2</text>
  <text x="980" y="170" font-size="11" fill="#64748b" text-anchor="middle">2027 Q3</text>
  <text x="1200" y="170" font-size="11" fill="#64748b" text-anchor="middle">2028 Q3</text>

