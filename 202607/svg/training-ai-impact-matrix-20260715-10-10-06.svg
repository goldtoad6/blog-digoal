<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="-apple-system, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f9fc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="highRisk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#ee5253"/>
    </linearGradient>
    <linearGradient id="medRisk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#feca57"/>
      <stop offset="100%" stop-color="#ff9f43"/>
    </linearGradient>
    <linearGradient id="lowRisk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#48dbfb"/>
      <stop offset="100%" stop-color="#0abde3"/>
    </linearGradient>
    <linearGradient id="growth" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1dd1a1"/>
      <stop offset="100%" stop-color="#10ac84"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- Title -->
  <text x="600" y="44" text-anchor="middle" font-size="24" font-weight="700" fill="#1a202c">培训行业细分赛道 × AI 冲击程度矩阵</text>
  <text x="600" y="70" text-anchor="middle" font-size="13" fill="#4a5568">Y 轴：信息可编码程度（信息→认证/服务/结果）　X 轴：交付线上化程度</text>

  <!-- Axis frame -->
  <line x1="120" y1="120" x2="120" y2="700" stroke="#a0aec0" stroke-width="1.5"/>
  <line x1="120" y1="700" x2="1100" y2="700" stroke="#a0aec0" stroke-width="1.5"/>
  <text x="60" y="410" text-anchor="middle" font-size="13" fill="#4a5568" transform="rotate(-90 60 410)">信息/知识密度（越高越可被 AI 替代）</text>
  <text x="600" y="740" text-anchor="middle" font-size="13" fill="#4a5568">交付线上化程度（越右越容易 AI 切入）</text>

  <!-- Quadrant labels -->
  <text x="610" y="170" text-anchor="middle" font-size="14" font-weight="600" fill="#e53e3e" opacity="0.55">高信息密度 + 高线上化 = AI 重灾区</text>
  <text x="610" y="650" text-anchor="middle" font-size="14" font-weight="600" fill="#0abde3" opacity="0.7">高信息密度 + 重线下 = AI 难啃</text>
  <text x="280" y="170" text-anchor="middle" font-size="14" font-weight="600" fill="#10ac84" opacity="0.6">低信息密度 + 高线上化 = AI 新增量</text>
  <text x="280" y="650" text-anchor="middle" font-size="14" font-weight="600" fill="#d69e2e" opacity="0.6">低信息密度 + 重线下 = 政策/品牌护城河</text>

  <!-- Quadrant background dividers -->
  <line x1="120" y1="410" x2="1100" y2="410" stroke="#cbd5e0" stroke-width="1" stroke-dasharray="4 4"/>
  <line x1="610" y1="120" x2="610" y2="700" stroke="#cbd5e0" stroke-width="1" stroke-dasharray="4 4"/>

  <!-- Bubbles. Position by (x=1100 left->right, y=700 top->bottom which is high information) -->
  <!-- Sizing reflects approximate 2024 China market size -->

  <!-- 高冲击 (red) - top right: high info density, high online -->
  <g filter="url(#shadow)">
    <circle cx="950" cy="195" r="78" fill="url(#highRisk)"/>
    <text x="950" y="190" text-anchor="middle" font-size="14" font-weight="700" fill="white">通用语言培训</text>
    <text x="950" y="210" text-anchor="middle" font-size="11" fill="white">Duolingo 年增 40.8%</text>
    <text x="950" y="225" text-anchor="middle" font-size="11" fill="white">Max 订阅 7% 渗透</text>
  </g>

  <g filter="url(#shadow)">
    <circle cx="1020" cy="340" r="62" fill="url(#highRisk)"/>
    <text x="1020" y="335" text-anchor="middle" font-size="13" font-weight="700" fill="white">少儿编程</text>
    <text x="1020" y="352" text-anchor="middle" font-size="10" fill="white">童程童美 2025.1 爆雷</text>
    <text x="1020" y="365" text-anchor="middle" font-size="10" fill="white">Cursor 替代基础层</text>
  </g>

  <g filter="url(#shadow)">
    <circle cx="820" cy="270" r="60" fill="url(#highRisk)"/>
    <text x="820" y="265" text-anchor="middle" font-size="13" font-weight="700" fill="white">K12 学科辅导</text>
    <text x="820" y="282" text-anchor="middle" font-size="10" fill="white">受双减直接压制</text>
    <text x="820" y="295" text-anchor="middle" font-size="10" fill="white">学习机模式：硬件+AI</text>
  </g>

  <!-- 中冲击 (yellow) -->
  <g filter="url(#shadow)">
    <circle cx="900" cy="450" r="62" fill="url(#medRisk)"/>
    <text x="900" y="445" text-anchor="middle" font-size="13" font-weight="700" fill="white">企业培训 / E-learning</text>
    <text x="900" y="462" text-anchor="middle" font-size="10" fill="white">Coursera+Udemy 合并</text>
    <text x="900" y="475" text-anchor="middle" font-size="10" fill="white">AI 工具替代讲师</text>
  </g>

  <g filter="url(#shadow)">
    <circle cx="780" cy="430" r="48" fill="url(#medRisk)"/>
    <text x="780" y="427" text-anchor="middle" font-size="12" font-weight="700" fill="white">职业资格考证</text>
    <text x="780" y="442" text-anchor="middle" font-size="10" fill="white">CPA/法考/一建</text>
    <text x="780" y="455" text-anchor="middle" font-size="10" fill="white">粉笔系统班提价 31%</text>
  </g>

  <g filter="url(#shadow)">
    <circle cx="970" cy="510" r="42" fill="url(#medRisk)"/>
    <text x="970" y="507" text-anchor="middle" font-size="12" font-weight="700" fill="white">公考 / 事业编</text>
    <text x="970" y="522" text-anchor="middle" font-size="10" fill="white">国考过审 303 万人</text>
    <text x="970" y="535" text-anchor="middle" font-size="10" fill="white">招录比 77:1</text>
  </g>

  <!-- 低冲击 (blue) - high info density but heavy offline: high credential/results oriented -->
  <g filter="url(#shadow)">
    <circle cx="320" cy="370" r="42" fill="url(#lowRisk)"/>
    <text x="320" y="367" text-anchor="middle" font-size="12" font-weight="700" fill="white">线下素质教育</text>
    <text x="320" y="382" text-anchor="middle" font-size="10" fill="white">书法/美术/体育</text>
    <text x="320" y="395" text-anchor="middle" font-size="10" fill="white">体验型，AI 难替代</text>
  </g>

  <g filter="url(#shadow)">
    <circle cx="450" cy="560" r="45" fill="url(#lowRisk)"/>
    <text x="450" y="555" text-anchor="middle" font-size="12" font-weight="700" fill="white">考研 / 留学考试</text>
    <text x="450" y="572" text-anchor="middle" font-size="10" fill="white">新东方出国考试 +18.8%</text>
    <text x="450" y="585" text-anchor="middle" font-size="10" fill="white">国内备考 +30.4%</text>
  </g>

  <!-- 新增量 (green) - low info density, high online: AI 推动的新增赛道 -->
  <g filter="url(#shadow)">
    <circle cx="280" cy="210" r="42" fill="url(#growth)"/>
    <text x="280" y="207" text-anchor="middle" font-size="12" font-weight="700" fill="white">AI 伴学 / 自适应</text>
    <text x="280" y="222" text-anchor="middle" font-size="10" fill="white">有道 AI 订阅 2 亿+</text>
    <text x="280" y="235" text-anchor="middle" font-size="10" fill="white">学而思九章 + DeepSeek</text>
  </g>

  <g filter="url(#shadow)">
    <circle cx="200" cy="320" r="35" fill="url(#growth)"/>
    <text x="200" y="317" text-anchor="middle" font-size="11" font-weight="700" fill="white">教育智能硬件</text>
    <text x="200" y="330" text-anchor="middle" font-size="9" fill="white">2024 破千亿</text>
    <text x="200" y="342" text-anchor="middle" font-size="9" fill="white">学而思学习机销冠</text>
  </g>

  <!-- Legend -->
  <g transform="translate(140, 760)">
    <rect x="0" y="-12" width="20" height="14" fill="url(#highRisk)"/>
    <text x="26" y="0" font-size="12" fill="#2d3748">高冲击（被 AI 显著改写）</text>
    <rect x="240" y="-12" width="20" height="14" fill="url(#medRisk)"/>
    <text x="266" y="0" font-size="12" fill="#2d3748">中冲击（被 AI 提效+局部挤压）</text>
    <rect x="510" y="-12" width="20" height="14" fill="url(#lowRisk)"/>
    <text x="536" y="0" font-size="12" fill="#2d3748">低冲击（线下/认证护城河）</text>
    <rect x="760" y="-12" width="20" height="14" fill="url(#growth)"/>
    <text x="786" y="0" font-size="12" fill="#2d3748">新增量（AI 直接创造）</text>
  </g>

  <!-- Footer note -->
  <text x="600" y="788" text-anchor="middle" font-size="11" fill="#718096">气泡大小大致对应 2024 年中国市场体量；数据来源：网经社、中研普华、各公司财报</text>
</svg>
