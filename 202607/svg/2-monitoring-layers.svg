<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 720" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2f7"/>
    </linearGradient>
    <linearGradient id="l1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <linearGradient id="l2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cffafe"/>
      <stop offset="100%" stop-color="#a5f3fc"/>
    </linearGradient>
    <linearGradient id="l3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="l4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fee2e2"/>
      <stop offset="100%" stop-color="#fecaca"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)"/>

  <!-- Title -->
  <text x="460" y="42" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">PostgreSQL 监控分层架构</text>
  <text x="460" y="66" text-anchor="middle" font-size="13" fill="#475569">从「擒贼擒王」的 SQL 层起步，按需下钻；报警来时按漏斗反推</text>

  <!-- L1 -->
  <rect x="60" y="100" width="800" height="110" rx="12" fill="url(#l1)" stroke="#6366f1" stroke-width="1.5"/>
  <text x="80" y="128" font-size="15" font-weight="700" fill="#312e81">L1 · 操作系统 / 硬件层</text>
  <text x="80" y="148" font-size="12" fill="#3730a3">CPU / Load · 内存 / Swap · 磁盘 IOPS / util / await · 网卡带宽 / 丢包 · dirty page</text>
  <text x="80" y="168" font-size="12" fill="#3730a3">取证工具: <tspan font-family="Menlo, monospace" fill="#1e1b4b">iostat -x 1 · vmstat 1 · dmesg · netstat -s · sar -n DEV</tspan></text>
  <text x="80" y="190" font-size="11" fill="#4338ca" font-style="italic">"CPU 跑满 / 磁盘 await &gt; 10ms / 网卡丢包" — 物理资源是天花板</text>

  <!-- L2 -->
  <rect x="60" y="230" width="800" height="110" rx="12" fill="url(#l2)" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="80" y="258" font-size="15" font-weight="700" fill="#155e75">L2 · PostgreSQL 实例层</text>
  <text x="80" y="278" font-size="12" fill="#0e7490">连接数 · 锁 / LWLock · 等待事件分布 · WAL 产出 · checkpoint · autovacuum · 流复制延迟</text>
  <text x="80" y="298" font-size="12" fill="#0e7490">取证工具: <tspan font-family="Menlo, monospace" fill="#164e63">pg_stat_activity · pg_stat_database · pg_stat_replication · pg_stat_bgwriter</tspan></text>
  <text x="80" y="320" font-size="11" fill="#155e75" font-style="italic">wait_event 告诉你"这一刻为什么不在跑" — 6 大类决定下一步动作</text>

  <!-- L3 -->
  <rect x="60" y="360" width="800" height="110" rx="12" fill="url(#l3)" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="80" y="388" font-size="15" font-weight="700" fill="#78350f">L3 · 对象层（表 / 索引 / 元数据）</text>
  <text x="80" y="408" font-size="12" fill="#92400e">表膨胀 / dead_tuple · 索引使用率 idx_scan · 长事务 / 2PC · vacuum / freeze 进度 · relfrozenxid</text>
  <text x="80" y="428" font-size="12" fill="#92400e">取证工具: <tspan font-family="Menlo, monospace" fill="#78350f">pg_stat_user_tables · pg_stat_user_indexes · pg_stat_progress_vacuum</tspan></text>
  <text x="80" y="450" font-size="11" fill="#92400e" font-style="italic">"n_dead_tup / n_live_tup &gt; 20%" 是慢的真正来源,不是 SQL 本身</text>

  <!-- L4 -->
  <rect x="60" y="490" width="800" height="120" rx="12" fill="url(#l4)" stroke="#ef4444" stroke-width="1.8"/>
  <text x="80" y="518" font-size="15" font-weight="700" fill="#7f1d1d">L4 · SQL 层 — 擒贼先擒王的起点</text>
  <text x="80" y="538" font-size="12" fill="#991b1b">TOP SQL 总耗时 / 调用次数 · 慢 SQL 计划 · 响应时间抖动 · 缓存命中率趋势</text>
  <text x="80" y="558" font-size="12" fill="#991b1b">取证工具: <tspan font-family="Menlo, monospace" fill="#7f1d1d">pg_stat_statements · auto_explain · pg_stat_statements_snapshot()</tspan></text>
  <text x="80" y="580" font-size="11" fill="#991b1b" font-style="italic">"先按 total_time desc 取 TOP 5, 解决最大头那条 SQL, 80% 场景就此消失"</text>
  <text x="80" y="600" font-size="11" fill="#7f1d1d" font-style="italic">社区共识: PostgreSQL 官方 wiki 第一句即 "First, find the slow queries"</text>

  <!-- Arrows: 漏斗方向 -->
  <line x1="460" y1="210" x2="460" y2="226" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="460" y1="340" x2="460" y2="356" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="460" y1="470" x2="460" y2="486" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 报警侧漏斗 -->
  <g transform="translate(60, 640)">
    <rect x="0" y="0" width="800" height="60" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
    <text x="20" y="22" font-size="13" font-weight="700" fill="#7f1d1d">报警响应漏斗（顺序不可乱）</text>
    <text x="20" y="42" font-size="11.5" fill="#7f1d1d">OS → 网络 → PG 存活 → 锁 / 长事务 → 表 / 索引 → SQL。最后才是 SQL —— 切勿一上来就 EXPLAIN。</text>
    <text x="500" y="42" font-size="11.5" fill="#7f1d1d" font-style="italic">证伪: 全查完没毛病 → 锅在 APP 层（连接池 / ORM N+1 / GC）</text>
  </g>

  <!-- Right side note -->
  <g transform="translate(460, 250)" opacity="0.0"/>
</svg>