<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" font-family="-apple-system, 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arrowDown" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L5,10 L10,0 z" fill="#dc2626"/>
    </marker>
    <marker id="arrowUp" viewBox="0 0 10 10" refX="5" refY="1" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,10 L5,0 L10,10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowSide" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#7c3aed"/>
    </marker>
    <linearGradient id="topBg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fef2f2"/>
      <stop offset="100%" stop-color="#fee2e2"/>
    </linearGradient>
    <linearGradient id="midBg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f5f3ff"/>
      <stop offset="100%" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="botBg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="720" fill="#fafafa"/>

  <text x="500" y="36" font-size="22" font-weight="700" text-anchor="middle" fill="#111">AI Agent 生产链上的 BaaS：双向挤压下的位置博弈</text>
  <text x="500" y="58" font-size="13" text-anchor="middle" fill="#555">云厂商自上而下挤压 &amp; 基础模型厂商自下而上挤压，中间层（higobase 类 BaaS）的生存空间</text>

  <!-- 上层：应用层 -->
  <rect x="60" y="80" width="880" height="80" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="500" y="108" font-size="15" font-weight="600" text-anchor="middle" fill="#1e293b">应用层 (Agent 应用 / SaaS)</text>
  <text x="500" y="132" font-size="12" text-anchor="middle" fill="#475569">Lovable / Bolt / v0 / 垂类 Agent / 企业 Copilot</text>
  <text x="500" y="150" font-size="11" text-anchor="middle" fill="#64748b" font-style="italic">开发者关心：开箱即用、跑得快、别让我管后端</text>

  <!-- 自上而下挤压箭头 -->
  <line x1="500" y1="160" x2="500" y2="218" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrowDown)" stroke-dasharray="6 4"/>
  <rect x="600" y="170" width="335" height="36" rx="6" fill="#fee2e2" stroke="#dc2626"/>
  <text x="767" y="192" font-size="12" font-weight="600" text-anchor="middle" fill="#991b1b">云厂商自上而下挤压</text>
  <text x="767" y="206" font-size="10.5" text-anchor="middle" fill="#7f1d1d">AWS Bedrock AgentCore / Azure AI Foundry / Firebase Studio</text>

  <!-- 中间层：higobase BaaS -->
  <rect x="60" y="220" width="880" height="200" rx="12" fill="url(#midBg)" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="500" y="248" font-size="17" font-weight="700" text-anchor="middle" fill="#5b21b6">★ BaaS / 智能体数据基础设施层 ★</text>
  <text x="500" y="268" font-size="12" text-anchor="middle" fill="#6d28d9">higobase / Supabase / Weaviate / Neon / MongoDB Atlas / Pinecone 等</text>

  <rect x="90" y="290" width="250" height="100" rx="8" fill="#fff" stroke="#7c3aed" stroke-width="1"/>
  <text x="215" y="312" font-size="13" font-weight="600" text-anchor="middle" fill="#5b21b6">HigoDB</text>
  <text x="215" y="332" font-size="11" text-anchor="middle" fill="#4c1d95">统一数据引擎</text>
  <text x="215" y="350" font-size="10" text-anchor="middle" fill="#6b21a8">向量 + 图 + SQL 混合检索</text>
  <text x="215" y="368" font-size="10" text-anchor="middle" fill="#6b21a8">agent 记忆 / RAG / 知识图谱</text>

  <rect x="375" y="290" width="250" height="100" rx="8" fill="#fff" stroke="#7c3aed" stroke-width="1"/>
  <text x="500" y="312" font-size="13" font-weight="600" text-anchor="middle" fill="#5b21b6">HigoBoost</text>
  <text x="500" y="332" font-size="11" text-anchor="middle" fill="#4c1d95">开发者体验平台</text>
  <text x="500" y="350" font-size="10" text-anchor="middle" fill="#6b21a8">SDK / 调试 / 评测 / 一键部署</text>
  <text x="500" y="368" font-size="10" text-anchor="middle" fill="#6b21a8">"Agent 的 Vercel"</text>

  <rect x="660" y="290" width="250" height="100" rx="8" fill="#fff" stroke="#7c3aed" stroke-width="1"/>
  <text x="785" y="312" font-size="13" font-weight="600" text-anchor="middle" fill="#5b21b6">HigoPilot</text>
  <text x="785" y="332" font-size="11" text-anchor="middle" fill="#4c1d95">Agent 全生命周期管理</text>
  <text x="785" y="350" font-size="10" text-anchor="middle" fill="#6b21a8">编排 / 监控 / 安全 / 成本治理</text>
  <text x="785" y="368" font-size="10" text-anchor="middle" fill="#6b21a8">"Agent 的 Datadog"</text>

  <!-- 自下而上挤压箭头 -->
  <line x1="500" y1="438" x2="500" y2="498" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrowUp)" stroke-dasharray="6 4"/>
  <rect x="60" y="450" width="335" height="36" rx="6" fill="#dbeafe" stroke="#2563eb"/>
  <text x="227" y="472" font-size="12" font-weight="600" text-anchor="middle" fill="#1e3a8a">基础模型厂商自下而上挤压</text>
  <text x="227" y="486" font-size="10.5" text-anchor="middle" fill="#1e40af">OpenAI AgentKit / Anthropic Agent SDK / Memory / Tools</text>

  <!-- 下层：基础模型层 -->
  <rect x="60" y="500" width="880" height="80" rx="10" fill="url(#botBg)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="500" y="528" font-size="15" font-weight="600" text-anchor="middle" fill="#1e40af">基础模型层 + 通用 AI 平台</text>
  <text x="500" y="552" font-size="12" text-anchor="middle" fill="#1d4ed8">OpenAI / Anthropic / Google DeepMind / Meta Llama / Mistral</text>
  <text x="500" y="570" font-size="11" text-anchor="middle" fill="#2563eb" font-style="italic">自带 Memory、Tools、向量检索、Agent 框架，把 BaaS 能力吞进 SDK</text>

  <!-- 底层：算力 / 云基础设施 -->
  <rect x="60" y="600" width="880" height="80" rx="10" fill="url(#topBg)" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="500" y="628" font-size="15" font-weight="600" text-anchor="middle" fill="#7f1d1d">算力 / 云基础设施层</text>
  <text x="500" y="652" font-size="12" text-anchor="middle" fill="#991b1b">NVIDIA / AMD / AWS / Azure / GCP / 阿里云 / 腾讯云</text>
  <text x="500" y="670" font-size="11" text-anchor="middle" fill="#b91c1c" font-style="italic">最上游：芯片 + IaaS，议价能力最强、利润最厚</text>

  <text x="500" y="705" font-size="11" text-anchor="middle" fill="#475569">→ 中间层面对"上有云、下有模型"的双向剪刀差，要么建护城河变成"必备层"，要么沦为价值链上被过路费化的环节</text>
</svg>