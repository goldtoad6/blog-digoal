<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 760" font-family="-apple-system, 'SF Pro Display', sans-serif">
  <defs>
    <marker id="rdArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <linearGradient id="local3b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#30d158;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#1f8a3a;stop-opacity:0.95"/>
    </linearGradient>
    <linearGradient id="local20b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#ffd60a;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#b88a00;stop-opacity:0.95"/>
    </linearGradient>
    <linearGradient id="pcc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#0a84ff;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#0050b3;stop-opacity:0.95"/>
    </linearGradient>
    <linearGradient id="external" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" style="stop-color:#bf5af2;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#8944ab;stop-opacity:0.95"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="490" y="35" text-anchor="middle" font-size="22" font-weight="700" fill="#1d1d1f">Apple Intelligence 请求路由决策图</text>
  <text x="490" y="58" text-anchor="middle" font-size="13" fill="#666">四段式 fallback · 端侧 3B → 端侧 20B（2026 新增）→ PCC → 第三方</text>

  <!-- Start -->
  <rect x="380" y="85" width="220" height="50" rx="25" fill="#1d1d1f"/>
  <text x="490" y="116" text-anchor="middle" font-size="14" font-weight="600" fill="white">用户请求（任意系统入口）</text>

  <!-- Arrow down to decision 1 -->
  <line x1="490" y1="135" x2="490" y2="170" stroke="#333" stroke-width="2" marker-end="url(#rdArrow)"/>

  <!-- Decision 1: 3B enough? -->
  <polygon points="490,170 660,235 490,300 320,235" fill="url(#local3b)" stroke="#1f8a3a" stroke-width="2"/>
  <text x="490" y="228" text-anchor="middle" font-size="13" font-weight="700" fill="white">3B 端侧能搞定？</text>
  <text x="490" y="250" text-anchor="middle" font-size="11" fill="white" opacity="0.95">AFM 3B · 2-bit QAT · 摘要/改写/分类</text>
  <text x="490" y="268" text-anchor="middle" font-size="11" fill="white" opacity="0.95">约 80% 高频场景</text>

  <!-- Yes → 端侧 3B 完成 -->
  <line x1="320" y1="235" x2="170" y2="235" stroke="#333" stroke-width="2" marker-end="url(#rdArrow)"/>
  <text x="245" y="225" text-anchor="middle" font-size="11" font-weight="600" fill="#1f8a3a">Yes</text>
  <rect x="40" y="208" width="130" height="56" rx="8" fill="#30d158"/>
  <text x="105" y="230" text-anchor="middle" font-size="12" font-weight="700" fill="white">端侧 3B 完成</text>
  <text x="105" y="248" text-anchor="middle" font-size="10" fill="white">数据不出设备</text>

  <!-- No → Decision 2: 20B 够吗 -->
  <line x1="490" y1="300" x2="490" y2="335" stroke="#333" stroke-width="2" marker-end="url(#rdArrow)"/>
  <text x="505" y="325" font-size="11" font-weight="600" fill="#b88a00">No →</text>

  <polygon points="490,335 660,400 490,465 320,400" fill="url(#local20b)" stroke="#b88a00" stroke-width="2"/>
  <text x="490" y="392" text-anchor="middle" font-size="13" font-weight="700" fill="#1d1d1f">需要 20B 端侧？</text>
  <text x="490" y="414" text-anchor="middle" font-size="11" fill="#1d1d1f" opacity="0.95">AFM 3 Core Advanced · 20B 稀疏 MoE</text>
  <text x="490" y="432" text-anchor="middle" font-size="11" fill="#1d1d1f" opacity="0.95">新 Siri / 听写 / TTS / 图像理解</text>

  <!-- Yes → 端侧 20B -->
  <line x1="320" y1="400" x2="170" y2="400" stroke="#333" stroke-width="2" marker-end="url(#rdArrow)"/>
  <text x="245" y="390" text-anchor="middle" font-size="11" font-weight="600" fill="#b88a00">Yes</text>
  <rect x="40" y="373" width="130" height="56" rx="8" fill="#ffd60a"/>
  <text x="105" y="395" text-anchor="middle" font-size="12" font-weight="700" fill="#1d1d1f">端侧 20B 完成</text>
  <text x="105" y="413" text-anchor="middle" font-size="10" fill="#1d1d1f">M2+ · 仍在设备内</text>

  <!-- No → PCC -->
  <line x1="490" y1="465" x2="490" y2="500" stroke="#333" stroke-width="2" marker-end="url(#rdArrow)"/>
  <text x="505" y="490" font-size="11" font-weight="600" fill="#0050b3">No →</text>

  <rect x="280" y="500" width="420" height="80" rx="10" fill="url(#pcc)"/>
  <text x="490" y="525" text-anchor="middle" font-size="14" font-weight="700" fill="white">Private Cloud Compute（兜底）</text>
  <text x="490" y="545" text-anchor="middle" font-size="10" fill="white" opacity="0.95">加密上行 · 不可持久化 · Apple Silicon 服务器</text>
  <text x="490" y="562" text-anchor="middle" font-size="10" fill="white" opacity="0.95">公开 VRE + 源代码 · 漏洞悬赏 $1M · 静默触发 · Apple Intelligence Report 可事后审计</text>

  <!-- Arrow to decision 4 -->
  <line x1="490" y1="580" x2="490" y2="610" stroke="#333" stroke-width="2" marker-end="url(#rdArrow)"/>
  <text x="505" y="600" font-size="11" font-weight="600" fill="#8944ab">仍不足 →</text>

  <!-- Decision 4: ExternalProvider -->
  <polygon points="490,610 660,665 490,710 320,665" fill="url(#external)" stroke="#8944ab" stroke-width="2"/>
  <text x="490" y="657" text-anchor="middle" font-size="13" font-weight="700" fill="white">需要 ChatGPT / Claude？</text>
  <text x="490" y="678" text-anchor="middle" font-size="11" fill="white" opacity="0.95">ExternalProvider 抽象 · 用户显式同意</text>

  <!-- Note box on the right -->
  <rect x="710" y="195" width="240" height="320" rx="10" fill="#f5f5f7" stroke="#d2d2d7"/>
  <text x="830" y="220" text-anchor="middle" font-size="13" font-weight="700" fill="#1d1d1f">关键边界</text>
  <text x="725" y="245" font-size="11" fill="#1d1d1f">· 端侧优先是默认，非选项</text>
  <text x="725" y="265" font-size="11" fill="#1d1d1f">· 上行 PCC 触发是静默的</text>
  <text x="725" y="285" font-size="11" fill="#1d1d1f">  （事后 Apple Intelligence Report 审计）</text>
  <text x="725" y="305" font-size="11" fill="#1d1d1f">· ChatGPT 兜底走弹窗或首次授权</text>
  <text x="725" y="325" font-size="11" fill="#1d1d1f">· 20B 端侧仅 M2+ 且 iOS 27+/macOS 27+</text>

  <text x="725" y="360" font-size="12" font-weight="700" fill="#1d1d1f">证伪 / 证明手段</text>
  <text x="725" y="380" font-size="11" fill="#1d1d1f">· 1000 条请求 A/B（强制 PCC vs 端侧）</text>
  <text x="725" y="398" font-size="11" fill="#1d1d1f">· mitmproxy 分析 PCC 流量模式</text>
  <text x="725" y="416" font-size="11" fill="#1d1d1f">· 导出 Apple Intelligence Report 验证路径</text>

  <text x="725" y="450" font-size="12" font-weight="700" fill="#1d1d1f">顺带提醒</text>
  <text x="725" y="470" font-size="11" fill="#1d1d1f">· 「PCC 触发静默」与「分层可见性</text>
  <text x="725" y="488" font-size="11" fill="#1d1d1f">  契约」的叙事有距离</text>
  <text x="725" y="506" font-size="11" fill="#1d1d1f">· 20B 端侧让 80%/15%/5% 比例需重写</text>

  <!-- Sources -->
  <text x="490" y="745" text-anchor="middle" font-size="10" fill="#666" font-style="italic">来源：Apple Security Research Blog 2024-10 · WWDC 26 Session 241 / 334 · arXiv 2507.13575</text>
</svg>