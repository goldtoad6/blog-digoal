<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 420" font-family="-apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="960" height="420" fill="#fafbfc"/>

  <text x="480" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">SSD 4K 对齐：一次 PG 写入触发的 IO</text>
  <text x="480" y="60" text-anchor="middle" font-size="13" fill="#475569">PG block = 8K · SSD physical page = 4K · 边界完全对齐，直接写入，无需 Read-Modify-Write</text>

  <rect x="40" y="80" width="880" height="320" rx="10" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="56" y="106" font-size="16" font-weight="700" fill="#166534">✓ 对齐：PG block 起点正好对齐 4K 边界</text>

  <!-- 左侧结构图 -->
  <text x="56" y="136" font-size="13" font-weight="600" fill="#475569">▎PG block 与 SSD 物理页的对应关系</text>

  <!-- 上层：PG block（8K） -->
  <text x="56" y="160" font-size="12" fill="#475569">上层：PG block（8KB），起点与 page 边界完全对齐</text>
  <g>
    <rect x="56"  y="170" width="128" height="36" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.2" rx="2"/>
    <text x="120" y="195" text-anchor="middle" font-size="12" font-weight="600" fill="#14532d">8KB PG block 1</text>

    <rect x="184" y="170" width="128" height="36" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.2" rx="2"/>
    <text x="248" y="195" text-anchor="middle" font-size="12" font-weight="600" fill="#14532d">8KB PG block 2</text>

    <rect x="312" y="170" width="128" height="36" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.2" rx="2"/>
    <text x="376" y="195" text-anchor="middle" font-size="12" font-weight="600" fill="#14532d">8KB PG block 3</text>

    <rect x="440" y="170" width="128" height="36" fill="#bbf7d0" stroke="#16a34a" stroke-width="1.2" rx="2"/>
    <text x="504" y="195" text-anchor="middle" font-size="12" font-weight="600" fill="#14532d">8KB PG block 4</text>
  </g>

  <!-- 下层：SSD 物理页（4K） -->
  <text x="56" y="248" font-size="12" fill="#475569">下层：SSD 物理 page（4KB） — 与 PG block 边界完全对齐</text>
  <g>
    <rect x="56"  y="258" width="64" height="32" fill="#fef3c7" stroke="#a16207" stroke-width="1" rx="2"/>
    <text x="88" y="278" text-anchor="middle" font-size="10" fill="#78350f">page 0</text>

    <rect x="120" y="258" width="64" height="32" fill="#fef3c7" stroke="#a16207" stroke-width="1" rx="2"/>
    <text x="152" y="278" text-anchor="middle" font-size="10" fill="#78350f">page 1</text>

    <rect x="184" y="258" width="64" height="32" fill="#fef3c7" stroke="#a16207" stroke-width="1" rx="2"/>
    <text x="216" y="278" text-anchor="middle" font-size="10" fill="#78350f">page 2</text>

    <rect x="248" y="258" width="64" height="32" fill="#fef3c7" stroke="#a16207" stroke-width="1" rx="2"/>
    <text x="280" y="278" text-anchor="middle" font-size="10" fill="#78350f">page 3</text>

    <rect x="312" y="258" width="64" height="32" fill="#fef3c7" stroke="#a16207" stroke-width="1" rx="2"/>
    <text x="344" y="278" text-anchor="middle" font-size="10" fill="#78350f">page 4</text>

    <rect x="376" y="258" width="64" height="32" fill="#fef3c7" stroke="#a16207" stroke-width="1" rx="2"/>
    <text x="408" y="278" text-anchor="middle" font-size="10" fill="#78350f">page 5</text>

    <rect x="440" y="258" width="64" height="32" fill="#fef3c7" stroke="#a16207" stroke-width="1" rx="2"/>
    <text x="472" y="278" text-anchor="middle" font-size="10" fill="#78350f">page 6</text>

    <rect x="504" y="258" width="64" height="32" fill="#fef3c7" stroke="#a16207" stroke-width="1" rx="2"/>
    <text x="536" y="278" text-anchor="middle" font-size="10" fill="#78350f">page 7</text>
  </g>

  <!-- 虚线指示对齐 -->
  <g stroke="#16a34a" stroke-width="1" stroke-dasharray="4,3" opacity="0.6">
    <line x1="56" y1="208" x2="56" y2="256"/>
    <line x1="184" y1="208" x2="184" y2="256"/>
    <line x1="312" y1="208" x2="312" y2="256"/>
    <line x1="440" y1="208" x2="440" y2="256"/>
  </g>

  <!-- 高亮 block 1 对应的 2 个 page -->
  <rect x="56"  y="258" width="64" height="32" fill="none" stroke="#16a34a" stroke-width="2" rx="2"/>
  <rect x="120" y="258" width="64" height="32" fill="none" stroke="#16a34a" stroke-width="2" rx="2"/>

  <!-- 右侧 IO 操作 -->
  <text x="460" y="136" font-size="13" font-weight="600" fill="#475569">▎写入过程（直接写入）</text>

  <g transform="translate(460, 160)">
    <text x="0" y="0" font-size="12" font-weight="700" fill="#14532d">一次 8K 写入 → 2 次 IO</text>

    <rect x="0" y="14" width="440" height="36" rx="4" fill="#bbf7d0" stroke="#16a34a"/>
    <text x="220" y="38" text-anchor="middle" font-size="12" fill="#14532d">① 直接写 page 0（4K）—— PG block 1 的前半段</text>

    <rect x="0" y="54" width="440" height="36" rx="4" fill="#bbf7d0" stroke="#16a34a"/>
    <text x="220" y="78" text-anchor="middle" font-size="12" fill="#14532d">② 直接写 page 1（4K）—— PG block 1 的后半段</text>

    <text x="220" y="120" text-anchor="middle" font-size="12" fill="#14532d" font-weight="600">无需 Read-Modify-Write</text>
    <text x="220" y="140" text-anchor="middle" font-size="11" fill="#166534">对齐写入 = PG 内一次 fsync 即可完成</text>
  </g>

  <!-- 底部结论 -->
  <rect x="56" y="310" width="848" height="40" rx="6" fill="#bbf7d0" stroke="#16a34a" stroke-width="1"/>
  <text x="480" y="336" text-anchor="middle" font-size="13" font-weight="600" fill="#166534">结论：对齐写入仅需 2 次 IO（直接写 2 个 page），无额外读操作和 CPU 合并开销，性能最优</text>
</svg>