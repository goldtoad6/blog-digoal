<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 640" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff"/>

  <text x="490" y="36" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">pg_stat_statements 快照与趋势分析</text>
  <text x="490" y="58" text-anchor="middle" font-size="13" fill="#475569">无快照 = 无回溯 = 事故后无法复盘 — 间隔 1min / 5min / 1h 落盘三套</text>

  <!-- Left: pipeline -->
  <g transform="translate(40, 90)">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#0f172a">数据采集管线</text>

    <rect x="0" y="20" width="180" height="48" rx="8" fill="url(#header)"/>
    <text x="90" y="42" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">PostgreSQL 进程</text>
    <text x="90" y="58" text-anchor="middle" font-size="10.5" fill="#cbd5e1">每条 SQL 进入</text>

    <line x1="90" y1="68" x2="90" y2="88" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="0" y="90" width="180" height="48" rx="8" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="90" y="112" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a8a">共享内存哈希表</text>
    <text x="90" y="128" text-anchor="middle" font-size="10.5" fill="#1e40af">queryid → 累计统计</text>

    <line x1="90" y1="138" x2="90" y2="158" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="0" y="160" width="180" height="48" rx="8" fill="#fee2e2" stroke="#ef4444"/>
    <text x="90" y="182" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">pg_stat_statements</text>
    <text x="90" y="198" text-anchor="middle" font-size="10.5" fill="#991b1b">视图（只读、累计）</text>

    <line x1="90" y1="208" x2="90" y2="228" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="0" y="230" width="180" height="48" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="90" y="252" text-anchor="middle" font-size="12" font-weight="700" fill="#78350f">pg_stat_statements</text>
    <text x="90" y="268" text-anchor="middle" font-size="10.5" fill="#92400e">_snapshot() 触发</text>

    <line x1="90" y1="278" x2="90" y2="298" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="0" y="300" width="180" height="48" rx="8" fill="#ecfdf5" stroke="#16a34a"/>
    <text x="90" y="322" text-anchor="middle" font-size="12" font-weight="700" fill="#14532d">外部表 + 时序库</text>
    <text x="90" y="338" text-anchor="middle" font-size="10.5" fill="#166534">Prometheus / TimescaleDB</text>

    <line x1="90" y1="348" x2="90" y2="368" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

    <rect x="0" y="370" width="180" height="48" rx="8" fill="#ede9fe" stroke="#8b5cf6"/>
    <text x="90" y="392" text-anchor="middle" font-size="12" font-weight="700" fill="#4c1d95">Grafana 仪表盘</text>
    <text x="90" y="408" text-anchor="middle" font-size="10.5" fill="#5b21b6">TOP SQL 趋势 / 异常告警</text>
  </g>

  <!-- Middle: snapshot mechanic -->
  <g transform="translate(290, 90)">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#0f172a">三套快照策略</text>

    <rect x="0" y="20" width="200" height="120" rx="8" fill="#fff1f2" stroke="#fb7185"/>
    <text x="100" y="42" text-anchor="middle" font-size="12" font-weight="700" fill="#9f1239">① 1 分钟高频</text>
    <text x="100" y="60" text-anchor="middle" font-size="10.5" fill="#9f1239" font-family="Menlo, monospace">perf insight 实时面板</text>
    <text x="100" y="76" text-anchor="middle" font-size="10" fill="#9f1239">捕获瞬时抖动、连接池突发</text>
    <text x="100" y="92" text-anchor="middle" font-size="10" fill="#9f1239">保留 7 天 / 10080 行</text>
    <text x="100" y="108" text-anchor="middle" font-size="10" fill="#9f1239">存 Timescale hypertable</text>
    <text x="100" y="124" text-anchor="middle" font-size="10" fill="#9f1239">自动压缩策略 7d→chunk</text>

    <rect x="0" y="150" width="200" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="100" y="172" text-anchor="middle" font-size="12" font-weight="700" fill="#78350f">② 5 分钟中频</text>
    <text x="100" y="190" text-anchor="middle" font-size="10.5" fill="#92400e" font-family="Menlo, monospace">业务趋势基准</text>
    <text x="100" y="206" text-anchor="middle" font-size="10" fill="#92400e">TOP SQL 7 日 / 30 日排名</text>
    <text x="100" y="222" text-anchor="middle" font-size="10" fill="#92400e">保留 90 天</text>
    <text x="100" y="238" text-anchor="middle" font-size="10" fill="#92400e">配合 pgwatch2 / PoWA</text>
    <text x="100" y="254" text-anchor="middle" font-size="10" fill="#92400e">也是容量规划主输入</text>

    <rect x="0" y="280" width="200" height="120" rx="8" fill="#ede9fe" stroke="#8b5cf6"/>
    <text x="100" y="302" text-anchor="middle" font-size="12" font-weight="700" fill="#4c1d95">③ 1 小时低频</text>
    <text x="100" y="320" text-anchor="middle" font-size="10.5" fill="#5b21b6" font-family="Menlo, monospace">长期归档 + 合规</text>
    <text x="100" y="336" text-anchor="middle" font-size="10" fill="#5b21b6">保留 1 年</text>
    <text x="100" y="352" text-anchor="middle" font-size="10" fill="#5b21b6">每月导出 parquet 归档</text>
    <text x="100" y="368" text-anchor="middle" font-size="10" fill="#5b21b6">用 perf insight 慢盘归档</text>
    <text x="100" y="384" text-anchor="middle" font-size="10" fill="#5b21b6">事故回溯唯一数据源</text>
  </g>

  <!-- Right: trend analysis SQL -->
  <g transform="translate(540, 90)">
    <text x="0" y="0" font-size="14" font-weight="700" fill="#0f172a">趋势分析常用查询</text>

    <rect x="0" y="20" width="400" height="180" rx="8" fill="#0f172a"/>
    <text x="14" y="44" font-size="11" font-weight="700" fill="#a7f3d0">▍ 7 天慢 SQL 排名变化（Δ 视角）</text>
    <text x="14" y="62" font-size="9.5" fill="#fca5a5" font-family="Menlo, monospace">SELECT queryid, query,</text>
    <text x="14" y="76" font-size="9.5" fill="#fca5a5" font-family="Menlo, monospace">       sum(total_exec_time) AS s,</text>
    <text x="14" y="90" font-size="9.5" fill="#fca5a5" font-family="Menlo, monospace">       sum(calls) AS c,</text>
    <text x="14" y="104" font-size="9.5" fill="#fca5a5" font-family="Menlo, monospace">       s/NULLIF(c,0) AS avg_ms</text>
    <text x="14" y="118" font-size="9.5" fill="#fca5a5" font-family="Menlo, monospace">  FROM pg_stat_statements_history</text>
    <text x="14" y="132" font-size="9.5" fill="#fca5a5" font-family="Menlo, monospace"> WHERE snapshot_at BETWEEN now()-interval '7d' AND now()</text>
    <text x="14" y="146" font-size="9.5" fill="#fca5a5" font-family="Menlo, monospace"> GROUP BY queryid, query</text>
    <text x="14" y="160" font-size="9.5" fill="#fca5a5" font-family="Menlo, monospace"> ORDER BY s DESC LIMIT 20;</text>

    <rect x="0" y="210" width="400" height="180" rx="8" fill="#0f172a"/>
    <text x="14" y="234" font-size="11" font-weight="700" fill="#a7f3d0">▍ 退化检测：今 vs 昨同比</text>
    <text x="14" y="252" font-size="9.5" fill="#fca5a5" font-family="Menlo, monospace">WITH today AS (</text>
    <text x="14" y="266" font-size="9.5" fill="#fca5a5" font-family="Menlo, monospace">  SELECT queryid, sum(total_exec_time) t</text>
    <text x="14" y="280" font-size="9.5" fill="#fca5a5" font-family="Menlo, monospace">    FROM pg_stat_statements_history</text>
    <text x="14" y="294" font-size="9.5" fill="#fca5a5" font-family="Menlo, monospace">   WHERE snapshot_at &gt; current_date GROUP BY 1),</text>
    <text x="14" y="308" font-size="9.5" fill="#fca5a5" font-family="Menlo, monospace">yesterday AS (... same shape ...)</text>
    <text x="14" y="322" font-size="9.5" fill="#fca5a5" font-family="Menlo, monospace">SELECT t.queryid,</text>
    <text x="14" y="336" font-size="9.5" fill="#fca5a5" font-family="Menlo, monospace">       t.t / NULLIF(y.t, 0) AS ratio</text>
    <text x="14" y="350" font-size="9.5" fill="#fca5a5" font-family="Menlo, monospace">  FROM today t JOIN yesterday y USING(queryid)</text>
    <text x="14" y="364" font-size="9.5" fill="#fca5a5" font-family="Menlo, monospace"> WHERE ratio &gt; 2 ORDER BY ratio DESC LIMIT 20;</text>
  </g>

  <!-- Bottom: caveats -->
  <g transform="translate(40, 510)">
    <rect x="0" y="0" width="900" height="100" rx="10" fill="#fef9c3" stroke="#ca8a04"/>
    <text x="20" y="26" font-size="13" font-weight="700" fill="#713f12">易踩的坑</text>
    <text x="20" y="50" font-size="11.5" fill="#713f12">1. max 设置过小（默认 5000）→ 高频 SQL 把低频挤出统计；按 calls * 平均长度估算，建议 ≥ 10000，大库 20000+。</text>
    <text x="20" y="68" font-size="11.5" fill="#713f12">2. 每次 pg_stat_statements_reset() 会清零全部 → 立刻丢历史趋势；生产严禁单独 reset。</text>
    <text x="20" y="86" font-size="11.5" fill="#713f12">3. compute_query_id = off 时 pg_stat_activity.query_id 全 NULL → 与 pg_stat_statements 失去关联桥梁（PG 13+ 默认 on）。</text>
  </g>
</svg>