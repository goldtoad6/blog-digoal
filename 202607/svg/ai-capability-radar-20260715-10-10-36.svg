<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 720" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#fafbfd"/>
      <stop offset="100%" stop-color="#eef1f6"/>
    </radialGradient>
    <linearGradient id="aiFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.20"/>
    </linearGradient>
  </defs>

  <rect width="760" height="720" fill="url(#bg)"/>

  <text x="380" y="48" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">AI 在"培训"各能力维度上的成熟度</text>
  <text x="380" y="72" text-anchor="middle" font-size="13" fill="#475569">能力维度 × AI 替代成熟度（0–10 分制，半径越长 = 越接近替代真人培训）</text>

  <!-- Radar grid: 5 concentric rings -->
  <g transform="translate(380,400)" stroke="#cbd5e1" fill="none" stroke-width="1">
    <polygon points="0,-260 225.2,-130 225.2,130 0,260 -225.2,130 -225.2,-130" stroke="#cbd5e1"/>
    <polygon points="0,-208 180.2,-104 180.2,104 0,208 -180.2,104 -180.2,-104" stroke="#cbd5e1"/>
    <polygon points="0,-156 135.1,-78 135.1,78 0,156 -135.1,78 -135.1,-78" stroke="#cbd5e1"/>
    <polygon points="0,-104 90.0,-52 90.0,52 0,104 -90.0,52 -90.0,-52" stroke="#cbd5e1"/>
    <polygon points="0,-52 45.0,-26 45.0,26 0,52 -45.0,26 -45.0,-26" stroke="#cbd5e1"/>
    <line x1="0" y1="0" x2="0" y2="-260"/>
    <line x1="0" y1="0" x2="225.2" y2="-130"/>
    <line x1="0" y1="0" x2="225.2" y2="130"/>
    <line x1="0" y1="0" x2="0" y2="260"/>
    <line x1="0" y1="0" x2="-225.2" y2="130"/>
    <line x1="0" y1="0" x2="-225.2" y2="-130"/>
  </g>

  <!-- Ring labels -->
  <g font-size="10" fill="#94a3b8" text-anchor="end">
    <text x="378" y="146">10</text>
    <text x="378" y="198">8</text>
    <text x="378" y="250">6</text>
    <text x="378" y="302">4</text>
    <text x="378" y="354">2</text>
  </g>

  <!-- AI polygon (scores: 8,6,8,7,6,3,2,5,1) -->
  <!-- axis angles every 60deg; ring10=260 -->
  <!-- K_nowledge 8 -> 0,-208 -->
  <!-- Q_A 6 -> 135.1,-78 -->
  <!-- G_rading 8 -> 135.1, 78 -->
  <!-- P_ractice 7 -> 0, 182 -->
  <!-- P_ersonalization 6 -> -135.1,78 -->
  <!-- M_otivation 3 -> -90.0,52 -->
  <!-- E_motion 2 -> -90.0,-52 -->
  <!-- S_upervision 5 -> -180.2,-104 -->
  <!-- C_ertification 1 -> -45.0,-26 -->

  <g transform="translate(380,400)">
    <polygon points="0,-208 135.1,-78 135.1,78 0,182 -135.1,78 -90.0,52 -90.0,-52 -180.2,-104 -45.0,-26"
             fill="url(#aiFill)" stroke="#3b82f6" stroke-width="2.5" stroke-linejoin="round"/>
    <!-- dots -->
    <g fill="#3b82f6" stroke="#ffffff" stroke-width="2">
      <circle cx="0" cy="-208" r="5"/>
      <circle cx="135.1" cy="-78" r="5"/>
      <circle cx="135.1" cy="78" r="5"/>
      <circle cx="0" cy="182" r="5"/>
      <circle cx="-135.1" cy="78" r="5"/>
      <circle cx="-90.0" cy="52" r="5"/>
      <circle cx="-90.0" cy="-52" r="5"/>
      <circle cx="-180.2" cy="-104" r="5"/>
      <circle cx="-45.0" cy="-26" r="5"/>
    </g>
    <!-- score labels next to dots -->
    <g font-size="11" font-weight="700" fill="#1d4ed8" text-anchor="middle">
      <text x="14" y="-208">8</text>
      <text x="155" y="-78">6</text>
      <text x="155" y="84">8</text>
      <text x="14" y="190">7</text>
      <text x="-155" y="84">6</text>
      <text x="-108" y="58">3</text>
      <text x="-108" y="-48">2</text>
      <text x="-200" y="-100">5</text>
      <text x="-60" y="-22">1</text>
    </g>
  </g>

  <!-- Axis labels -->
  <g font-size="13" fill="#0f172a" font-weight="600">
    <text x="380" y="120" text-anchor="middle">知识讲解</text>
    <text x="640" y="252" text-anchor="start">答疑 / 解题</text>
    <text x="640" y="468" text-anchor="start">作业批改</text>
    <text x="380" y="608" text-anchor="middle">陪练 / 口语对话</text>
    <text x="120" y="468" text-anchor="end">个性化路径</text>
    <text x="120" y="320" text-anchor="end">动机管理</text>
    <text x="120" y="200" text-anchor="end">情感陪伴</text>
    <text x="120" y="252" text-anchor="start">监督约束</text>
    <text x="380" y="180" text-anchor="middle">认证背书</text>
  </g>

  <!-- Legend -->
  <g transform="translate(60,640)" font-size="12" fill="#334155">
    <rect x="0" y="0" width="14" height="14" fill="url(#aiFill)" stroke="#3b82f6" stroke-width="2"/>
    <text x="22" y="12">AI 当前成熟度</text>
    <text x="170" y="12" fill="#64748b">高分 = 工具已较成熟；低分 = 短期内难替代真人</text>
  </g>

  <!-- Footer data source -->
  <g transform="translate(380,690)" font-size="11" fill="#64748b" text-anchor="middle">
    <text>数据综合自 Khan Academy 2026 官方博客、可汗学院 CLO DiCerbo 2026 公开评估、</text>
    <text>Duolingo 2026Q1 业绩会、国信证券 2026/6 报告、南都 10 款 AI 测评（2025/6）</text>
  </g>
</svg>
