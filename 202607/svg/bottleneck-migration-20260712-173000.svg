<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 820" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eaf2f8"/>
      <stop offset="100%" stop-color="#c9def0"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a8cce6"/>
      <stop offset="100%" stop-color="#3a5a7a"/>
    </linearGradient>
    <linearGradient id="deep" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2f47"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="820" fill="url(#sky)"/>

  <!-- Title -->
  <text x="540" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#0a1628">SKILL 填满之后：瓶颈迁移全景图</text>
  <text x="540" y="64" text-anchor="middle" font-size="13" fill="#475569">能力封装的板补上了，另外四块板同时暴露</text>

  <!-- ============================================ -->
  <!-- 第一层：SKILL 库 — 在水面之上              -->
  <!-- ============================================ -->
  <g filter="url(#softShadow)">
    <rect x="380" y="90" width="320" height="68" rx="10" fill="#bbf7d0" stroke="#16a34a" stroke-width="2"/>
    <text x="540" y="118" text-anchor="middle" font-size="16" font-weight="700" fill="#14532d">SKILL 库（能力封装）</text>
    <text x="540" y="142" text-anchor="middle" font-size="11" fill="#15803d">领域 × 角色 × 场景 × 模块</text>
  </g>

  <!-- ============================================ -->
  <!-- 水面线 + 标注 — 紧贴在 SKILL 库下方       -->
  <!-- ============================================ -->
  <line x1="60" y1="178" x2="1020" y2="178" stroke="#3a5a7a" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="540" y="172" text-anchor="middle" font-size="13" font-weight="600" fill="#1a2f47">↑ 水面之上：已填平的显性短板 — SKILL 库</text>

  <!-- ============================================ -->
  <!-- 水面之下：四层瓶颈（全部在水面线下方）     -->
  <!-- ============================================ -->

  <!-- Layer 1: AI Engineering -->
  <g filter="url(#softShadow)">
    <rect x="80" y="200" width="920" height="110" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
    <rect x="80" y="200" width="120" height="110" rx="10" fill="#fef08a" stroke="#ca8a04" stroke-width="2"/>
    <text x="140" y="238" text-anchor="middle" font-size="20" font-weight="800" fill="#713f12">①</text>
    <text x="140" y="263" text-anchor="middle" font-size="12" font-weight="700" fill="#713f12">工程化层</text>
    <text x="140" y="280" text-anchor="middle" font-size="10" fill="#713f12">AI 视角</text>

    <text x="220" y="224" font-size="13" font-weight="700" fill="#713f12">Harness Engineering 是新战场</text>
    <text x="220" y="246" font-size="11" fill="#713f12">· 评估难（74% 仍靠人工评测）</text>
    <text x="220" y="264" font-size="11" fill="#713f12">· 调试难（多步 + 工具 + 状态）</text>
    <text x="220" y="282" font-size="11" fill="#713f12">· 长程一致性 · 可观测性 · 数据闭环</text>
    <text x="220" y="302" font-size="11" font-style="italic" fill="#854d0e">→ OpenAI / Anthropic / Google 2026 集体押注 Harness</text>
  </g>

  <!-- Layer 2: Organization -->
  <g filter="url(#softShadow)">
    <rect x="80" y="325" width="920" height="110" rx="10" fill="#fce7f3" stroke="#be185d" stroke-width="2"/>
    <rect x="80" y="325" width="120" height="110" rx="10" fill="#fbcfe8" stroke="#be185d" stroke-width="2"/>
    <text x="140" y="363" text-anchor="middle" font-size="20" font-weight="800" fill="#831843">②</text>
    <text x="140" y="388" text-anchor="middle" font-size="12" font-weight="700" fill="#831843">组织层</text>
    <text x="140" y="405" text-anchor="middle" font-size="10" fill="#831843">HR / 法务</text>

    <text x="220" y="349" font-size="13" font-weight="700" fill="#831843">五件组织摩擦相互放大</text>
    <text x="220" y="371" font-size="11" fill="#831843">· 信任 · 责任（Air Canada 案）· 岗位重构</text>
    <text x="220" y="389" font-size="11" fill="#831843">· 流程再造 · 决策权让渡（治理问题）</text>
    <text x="220" y="407" font-size="11" fill="#831843">· 88% 在用 AI / 仅 39% 见价值（麦肯锡 2025）</text>
    <text x="220" y="427" font-size="11" font-style="italic" fill="#9f1239">→ 五摩擦任意一件失守会反向恶化其他四件</text>
  </g>

  <!-- Layer 3: SRE / Reliability -->
  <g filter="url(#softShadow)">
    <rect x="80" y="450" width="920" height="110" rx="10" fill="#e0f2fe" stroke="#0369a1" stroke-width="2"/>
    <rect x="80" y="450" width="120" height="110" rx="10" fill="#bae6fd" stroke="#0369a1" stroke-width="2"/>
    <text x="140" y="488" text-anchor="middle" font-size="20" font-weight="800" fill="#0c4a6e">③</text>
    <text x="140" y="513" text-anchor="middle" font-size="12" font-weight="700" fill="#0c4a6e">可靠性层</text>
    <text x="140" y="530" text-anchor="middle" font-size="10" fill="#0c4a6e">SRE 视角</text>

    <text x="220" y="474" font-size="13" font-weight="700" fill="#0c4a6e">不是整体失灵，需要扩展和补充</text>
    <text x="220" y="496" font-size="11" fill="#0c4a6e">· 成本失控（单任务 = 普通 5-30×）· 99.9% 没意义</text>
    <text x="220" y="514" font-size="11" fill="#0c4a6e">· 决策不可重放 · Blast Radius 模糊</text>
    <text x="220" y="532" font-size="11" fill="#0c4a6e">· Prompt Injection = 代码执行（EchoLeak / CVE-2025-32711）</text>
    <text x="220" y="552" font-size="11" font-style="italic" fill="#075985">→ 最小权限 + 三层限流 + CAPO + 六维 SLI</text>
  </g>

  <!-- Layer 4: Commercial -->
  <g filter="url(#softShadow)">
    <rect x="80" y="575" width="920" height="110" rx="10" fill="#ede9fe" stroke="#6d28d9" stroke-width="2"/>
    <rect x="80" y="575" width="120" height="110" rx="10" fill="#ddd6fe" stroke="#6d28d9" stroke-width="2"/>
    <text x="140" y="613" text-anchor="middle" font-size="20" font-weight="800" fill="#4c1d95">④</text>
    <text x="140" y="638" text-anchor="middle" font-size="12" font-weight="700" fill="#4c1d95">商业工程层</text>
    <text x="140" y="655" text-anchor="middle" font-size="10" fill="#4c1d95">PM / CS</text>

    <text x="220" y="599" font-size="13" font-weight="700" fill="#4c1d95">六层漏斗逐级折损，不是技术问题</text>
    <text x="220" y="621" font-size="11" fill="#4c1d95">· POC 陷阱（Demo 天使、生产恶魔）</text>
    <text x="220" y="639" font-size="11" fill="#4c1d95">· 系统集成 · 定价模式 · 长尾吞噬 ROI</text>
    <text x="220" y="657" font-size="11" fill="#4c1d95">· 价值度量 · CS 缺位</text>
    <text x="220" y="677" font-size="11" font-style="italic" fill="#5b21b6">→ 95% 未产生 P&amp;L 回报（MIT NANDA 2025）— 半数来自归因，不是技术</text>
  </g>

  <!-- ============================================ -->
  <!-- 底部深色区域：总结                          -->
  <!-- ============================================ -->
  <rect x="0" y="705" width="1080" height="115" fill="url(#deep)"/>
  <text x="540" y="735" text-anchor="middle" font-size="16" font-weight="700" fill="#f1f5f9">失败模式迁移：从"做不了" → "做不稳 → 做不查 → 做不回 → 卖不动 → 用不起来"</text>
  <text x="540" y="760" text-anchor="middle" font-size="12" fill="#cbd5e1">解决四件事的难度，远高于堆砌 SKILL；老板必须亲自站台、亲自担责</text>
  <text x="540" y="790" text-anchor="middle" font-size="11" fill="#94a3b8" font-style="italic">数据： MIT NANDA 2025 · 麦肯锡 2025 · Gartner 2024/2025 · Anthropic · 伯克利 MAP ICML 2026 · OWASP 2025</text>
  <text x="540" y="810" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">水面之下四层瓶颈，每一层都会比上一层更难攻克</text>
</svg>