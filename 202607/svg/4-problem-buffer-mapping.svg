<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">BufferTag 到 shared buffer 的映射</title>
  <desc id="desc">PostgreSQL 用 BufferTag 哈希定位 shared buffer 描述符；高并发访问热点页或过大的缓冲池可能放大 buffer_mapping LWLock 争用。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#334155"/></marker>
    <style>
      .title{font:700 24px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#111827}.label{font:600 15px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#111827}.small{font:13px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#374151}.muted{font:12px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#6b7280}.tag{fill:#dbeafe;stroke:#2563eb;stroke-width:1.3;rx:12}.hash{fill:#ffedd5;stroke:#f97316;stroke-width:1.3;rx:12}.part{fill:#f8fafc;stroke:#334155;stroke-width:1.2;rx:10}.buf{fill:#dcfce7;stroke:#16a34a;stroke-width:1.2;rx:8}.bad{fill:#fee2e2;stroke:#ef4444;stroke-width:1.2;rx:10}.arrow{stroke:#334155;stroke-width:1.8;fill:none;marker-end:url(#arrow)}.dash{stroke:#64748b;stroke-width:1.5;stroke-dasharray:5 5;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="960" height="520" fill="#fff"/>
  <text x="40" y="44" class="title">shared_buffers 不是越大越好：先要穿过 Buffer Mapping</text>

  <rect x="62" y="98" width="210" height="110" class="tag"/>
  <text x="92" y="130" class="label">BufferTag</text>
  <text x="92" y="156" class="small">relfilenode</text>
  <text x="92" y="176" class="small">forknum + blocknum</text>
  <text x="92" y="196" class="muted">一个数据块的全局身份</text>

  <rect x="336" y="112" width="170" height="82" class="hash"/>
  <text x="372" y="144" class="label">Hash table</text>
  <text x="366" y="168" class="small">BufTableHashCode(tag)</text>
  <path d="M272 153 L336 153" class="arrow"/>

  <rect x="584" y="76" width="286" height="250" class="part"/>
  <text x="612" y="108" class="label">分区锁 + buffer descriptor</text>
  <rect x="620" y="132" width="104" height="44" class="part"/><text x="642" y="160" class="small">partition 0</text>
  <rect x="740" y="132" width="94" height="44" class="buf"/><text x="764" y="160" class="small">buf #18</text>
  <rect x="620" y="192" width="104" height="44" class="part"/><text x="642" y="220" class="small">partition 1</text>
  <rect x="740" y="192" width="94" height="44" class="buf"/><text x="764" y="220" class="small">buf #91</text>
  <rect x="620" y="252" width="104" height="44" class="part"/><text x="642" y="280" class="small">partition n</text>
  <rect x="740" y="252" width="94" height="44" class="buf"/><text x="764" y="280" class="small">buf #7</text>
  <path d="M506 153 L620 153" class="arrow"/>

  <rect x="110" y="306" width="230" height="96" class="bad"/>
  <text x="136" y="338" class="label">争用从哪里来</text>
  <text x="136" y="362" class="small">热点 page / 高连接数</text>
  <text x="136" y="382" class="small">同一 hash partition 上锁竞争</text>

  <rect x="396" y="306" width="230" height="96" class="bad"/>
  <text x="422" y="338" class="label">太大的副作用</text>
  <text x="422" y="362" class="small">OS page cache 被挤压</text>
  <text x="422" y="382" class="small">checkpoint 脏页集合变大</text>

  <rect x="682" y="360" width="190" height="70" class="part"/>
  <text x="706" y="392" class="label">观测信号</text>
  <text x="706" y="416" class="small">LWLock:buffer_mapping</text>

  <path d="M225 306 C274 258,380 230,421 194" class="dash"/>
  <path d="M511 306 C580 260,612 210,620 153" class="dash"/>
</svg>
