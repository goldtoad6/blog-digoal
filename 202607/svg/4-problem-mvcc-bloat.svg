<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520" role="img" aria-labelledby="title desc">
  <title id="title">MVCC 版本链与膨胀形成机制</title>
  <desc id="desc">UPDATE 生成新元组版本，旧版本只有在所有快照都看不见后才能被 vacuum 回收。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
    <style>
      .bg{fill:#fff}.title{font:700 24px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#111827}.label{font:600 15px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#111827}.small{font:13px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#374151}.muted{font:12px -apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#6b7280}.box{fill:#f8fafc;stroke:#334155;stroke-width:1.4;rx:12}.live{fill:#dcfce7;stroke:#16a34a}.dead{fill:#fee2e2;stroke:#ef4444}.pinned{fill:#ffedd5;stroke:#f97316}.idx{fill:#dbeafe;stroke:#2563eb}.arrow{stroke:#334155;stroke-width:1.8;fill:none;marker-end:url(#arrow)}.dash{stroke:#f97316;stroke-width:2;stroke-dasharray:6 5;fill:none}.page{fill:#f1f5f9;stroke:#64748b;stroke-width:1.2;rx:10}
    </style>
  </defs>
  <rect class="bg" width="960" height="520"/>
  <text x="40" y="44" class="title">MVCC：不原地更新，旧版本等待 OldestXmin</text>

  <rect x="52" y="88" width="184" height="92" class="idx" rx="12"/>
  <text x="76" y="122" class="label">B-Tree 索引项</text>
  <text x="76" y="150" class="small">key = 42</text>
  <text x="76" y="170" class="muted">TID 指向版本链入口</text>

  <rect x="310" y="78" width="590" height="258" class="page"/>
  <text x="332" y="110" class="label">Heap page：同一逻辑行的多个物理版本</text>

  <rect x="346" y="150" width="150" height="108" class="dead" rx="12"/>
  <text x="372" y="180" class="label">v1 旧版本</text>
  <text x="366" y="207" class="small">xmin=100</text>
  <text x="366" y="229" class="small">xmax=120</text>
  <text x="366" y="249" class="muted">对新快照不可见</text>

  <rect x="548" y="150" width="150" height="108" class="pinned" rx="12"/>
  <text x="574" y="180" class="label">v2 旧版本</text>
  <text x="568" y="207" class="small">xmin=120</text>
  <text x="568" y="229" class="small">xmax=180</text>
  <text x="568" y="249" class="muted">被长事务快照钉住</text>

  <rect x="750" y="150" width="120" height="108" class="live" rx="12"/>
  <text x="774" y="180" class="label">v3 当前</text>
  <text x="770" y="207" class="small">xmin=180</text>
  <text x="770" y="229" class="small">xmax=0</text>
  <text x="770" y="249" class="muted">可见版本</text>

  <path d="M236 134 C280 134,288 198,344 198" class="arrow"/>
  <path d="M496 204 L548 204" class="arrow"/>
  <path d="M698 204 L750 204" class="arrow"/>
  <text x="512" y="286" class="muted">t_ctid / HOT 链把旧版本串到新版本</text>

  <line x1="612" y1="70" x2="612" y2="360" class="dash"/>
  <text x="628" y="354" class="small" fill="#f97316">OldestXmin = 150</text>

  <rect x="72" y="382" width="248" height="82" class="box"/>
  <text x="94" y="414" class="label">VACUUM 能做什么</text>
  <text x="94" y="438" class="small">v1：所有快照都看不见 → 可清理/复用</text>
  <text x="94" y="458" class="small">v2：仍可能被旧快照看见 → 不能动</text>

  <rect x="356" y="382" width="250" height="82" class="box"/>
  <text x="378" y="414" class="label">膨胀何时出现</text>
  <text x="378" y="438" class="small">UPDATE/DELETE 速度 &gt; vacuum 清理速度</text>
  <text x="378" y="458" class="small">长事务/slot/2PC 把 horizon 推旧</text>

  <rect x="642" y="382" width="250" height="82" class="box"/>
  <text x="664" y="414" class="label">为什么文件不立刻变小</text>
  <text x="664" y="438" class="small">空洞先进入 FSM 给后续写入复用</text>
  <text x="664" y="458" class="small">只有尾部全空或重写/重建才还给 OS</text>
</svg>
