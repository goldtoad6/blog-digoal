<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#13203a"/>
    </linearGradient>
    <linearGradient id="haveGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3fb27f"/>
      <stop offset="100%" stop-color="#1f8a5c"/>
    </linearGradient>
    <linearGradient id="adaptGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0b955"/>
      <stop offset="100%" stop-color="#c98a1f"/>
    </linearGradient>
    <linearGradient id="rebuildGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e2685b"/>
      <stop offset="100%" stop-color="#a83d31"/>
    </linearGradient>
    <linearGradient id="newGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5aa5e6"/>
      <stop offset="100%" stop-color="#2c6cae"/>
    </linearGradient>
    <marker id="arrowHave" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3fb27f"/>
    </marker>
    <marker id="arrowAdapt" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#f0b955"/>
    </marker>
    <marker id="arrowNew" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#5aa5e6"/>
    </marker>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1400" height="900" fill="url(#bgGrad)"/>

  <!-- 标题区 -->
  <text x="700" y="40" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="700">谐云云原生能力 → AI Infra 技术外溢路径图</text>
  <text x="700" y="64" text-anchor="middle" fill="#94a3b8" font-size="13">从 K8s / Service Mesh / 可观测性 到 LLM 推理 / Agent 算力 / GPU 调度的能力映射与缺口</text>

  <!-- 图例 -->
  <g transform="translate(40, 90)" font-size="12" fill="#e2e8f0">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="url(#haveGrad)"/>
    <text x="22" y="11">已具备（直接复用 ≥70%）</text>
    <rect x="260" y="0" width="14" height="14" rx="3" fill="url(#adaptGrad)"/>
    <text x="282" y="11">需适配（30–60%）</text>
    <rect x="520" y="0" width="14" height="14" rx="3" fill="url(#rebuildGrad)"/>
    <text x="542" y="11">需重建（基本重做）</text>
    <rect x="780" y="0" width="14" height="14" rx="3" fill="url(#newGrad)"/>
    <text x="802" y="11">新机会（差异化战场）</text>
  </g>

  <!-- ==================== 左侧：谐云现有能力 ==================== -->
  <g transform="translate(40, 140)" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif">
    <text x="0" y="0" fill="#94a3b8" font-size="14" font-weight="600">谐云现有能力（左）</text>
    <text x="0" y="18" fill="#64748b" font-size="11">源自公开资料：harmonycloud.cn / k8smeetup / CNCF</text>

    <g transform="translate(0, 36)">
      <rect x="0" y="0" width="280" height="78" rx="10" fill="#1e293b" stroke="#3fb27f" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="14" y="24" fill="#ffffff" font-size="14" font-weight="600">容器云 PaaS / K8s 发行版</text>
      <text x="14" y="42" fill="#94a3b8" font-size="11">单集群千台规模、信创适配</text>
      <text x="14" y="60" fill="#3fb27f" font-size="10">CNCF 黄金会员 / Istio 创始成员 / KubeEdge 维护方</text>
    </g>

    <g transform="translate(0, 132)">
      <rect x="0" y="0" width="280" height="78" rx="10" fill="#1e293b" stroke="#3fb27f" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="14" y="24" fill="#ffffff" font-size="14" font-weight="600">Service Mesh / HarmonyMesh</text>
      <text x="14" y="42" fill="#94a3b8" font-size="11">东西向流量治理、灰度、熔断、mTLS</text>
      <text x="14" y="60" fill="#3fb27f" font-size="10">可映射 → 模型路由、A/B、流式切量</text>
    </g>

    <g transform="translate(0, 228)">
      <rect x="0" y="0" width="280" height="78" rx="10" fill="#1e293b" stroke="#3fb27f" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="14" y="24" fill="#ffffff" font-size="14" font-weight="600">可观测性 APM / 智能运维</text>
      <text x="14" y="42" fill="#94a3b8" font-size="11">Metrics / Trace / Log / ITSM 整合</text>
      <text x="14" y="60" fill="#3fb27f" font-size="10">可映射 → Token 级可观测、推理链路追踪</text>
    </g>

    <g transform="translate(0, 324)">
      <rect x="0" y="0" width="280" height="78" rx="10" fill="#1e293b" stroke="#3fb27f" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="14" y="24" fill="#ffffff" font-size="14" font-weight="600">DevOps / CI-CD / 流水线</text>
      <text x="14" y="42" fill="#94a3b8" font-size="11">金融级发布流水线、灰度回滚</text>
      <text x="14" y="60" fill="#3fb27f" font-size="10">可映射 → 模型权重升级、推理服务发布</text>
    </g>

    <g transform="translate(0, 420)">
      <rect x="0" y="0" width="280" height="78" rx="10" fill="#1e293b" stroke="#f0b955" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="14" y="24" fill="#ffffff" font-size="14" font-weight="600">数据库容器化（≈物理机网络性能）</text>
      <text x="14" y="42" fill="#94a3b8" font-size="11">高 IO / 低延迟 / 强存储适配</text>
      <text x="14" y="60" fill="#f0b955" font-size="10">可映射 → RDMA/RoCE/IB 推理网络、KV Cache</text>
    </g>

    <g transform="translate(0, 516)">
      <rect x="0" y="0" width="280" height="78" rx="10" fill="#1e293b" stroke="#f0b955" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="14" y="24" fill="#ffffff" font-size="14" font-weight="600">KubeEdge 边缘计算</text>
      <text x="14" y="42" fill="#94a3b8" font-size="11">云边协同、Sedna 边云 AI 框架、Ianvs</text>
      <text x="14" y="60" fill="#f0b955" font-size="10">可映射 → 边缘大模型协同推理</text>
    </g>

    <g transform="translate(0, 612)">
      <rect x="0" y="0" width="280" height="78" rx="10" fill="#1e293b" stroke="#5aa5e6" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="14" y="24" fill="#ffffff" font-size="14" font-weight="600">行业 know-how：银行/证券/运营商</text>
      <text x="14" y="42" fill="#94a3b8" font-size="11">股份制银行核心系统、合规、信创</text>
      <text x="14" y="60" fill="#5aa5e6" font-size="10">差异化护城河（非技术，而是关系网）</text>
    </g>
  </g>

  <!-- ==================== 中间连线 ==================== -->
  <g fill="none" stroke-width="2">
    <path d="M324,215 L600,215" stroke="#3fb27f" marker-end="url(#arrowHave)"/>
    <path d="M324,311 L600,311" stroke="#3fb27f" marker-end="url(#arrowHave)"/>
    <path d="M324,407 L600,407" stroke="#3fb27f" marker-end="url(#arrowHave)"/>
    <path d="M324,503 L600,503" stroke="#3fb27f" marker-end="url(#arrowHave)"/>
    <path d="M324,599 L600,599" stroke="#f0b955" marker-end="url(#arrowAdapt)"/>
    <path d="M324,695 L600,695" stroke="#f0b955" marker-end="url(#arrowAdapt)"/>
    <path d="M324,791 L600,791" stroke="#5aa5e6" stroke-dasharray="6 4" marker-end="url(#arrowNew)"/>
  </g>

  <!-- ==================== 中栏：AI Infra 所需能力 ==================== -->
  <g transform="translate(610, 140)" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif">
    <text x="0" y="0" fill="#94a3b8" font-size="14" font-weight="600">AI Infra 所需能力</text>
    <text x="0" y="18" fill="#64748b" font-size="11">依据：信通院《大模型推理平台白皮书》(2024) + Gartner/Forrester</text>

    <g transform="translate(0, 36)">
      <rect x="0" y="0" width="280" height="78" rx="10" fill="#1e293b" stroke="#3fb27f" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="14" y="24" fill="#ffffff" font-size="14" font-weight="600">A. 推理服务化 / 模型服务网格</text>
      <text x="14" y="42" fill="#94a3b8" font-size="11">vLLM / TGI / SGLang 内核 + 服务网关</text>
      <text x="14" y="60" fill="#3fb27f" font-size="10">复用度 ≈ 75%（K8s + Mesh 直接对接）</text>
    </g>

    <g transform="translate(0, 132)">
      <rect x="0" y="0" width="280" height="78" rx="10" fill="#1e293b" stroke="#3fb27f" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="14" y="24" fill="#ffffff" font-size="14" font-weight="600">B. 多租户 + 流式流量治理</text>
      <text x="14" y="42" fill="#94a3b8" font-size="11">租户配额、流式 token 计量、A/B</text>
      <text x="14" y="60" fill="#3fb27f" font-size="10">复用度 ≈ 70%（Mesh + APM 直接承接）</text>
    </g>

    <g transform="translate(0, 228)">
      <rect x="0" y="0" width="280" height="78" rx="10" fill="#1e293b" stroke="#3fb27f" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="14" y="24" fill="#ffffff" font-size="14" font-weight="600">C. LLM 推理可观测</text>
      <text x="14" y="42" fill="#94a3b8" font-size="11">TTFT / TPS / Token 成本、幻觉 trace</text>
      <text x="14" y="60" fill="#3fb27f" font-size="10">复用度 ≈ 65%（埋点改造即可）</text>
    </g>

    <g transform="translate(0, 324)">
      <rect x="0" y="0" width="280" height="78" rx="10" fill="#1e293b" stroke="#3fb27f" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="14" y="24" fill="#ffffff" font-size="14" font-weight="600">D. 模型 CI/CD（权重/配置/LoRA）</text>
      <text x="14" y="42" fill="#94a3b8" font-size="11">灰度发布、影子流量、回滚</text>
      <text x="14" y="60" fill="#3fb27f" font-size="10">复用度 ≈ 80%</text>
    </g>

    <g transform="translate(0, 420)">
      <rect x="0" y="0" width="280" height="78" rx="10" fill="#1e293b" stroke="#f0b955" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="14" y="24" fill="#ffffff" font-size="14" font-weight="600">E. GPU/RoCE/IB 拓扑感知调度</text>
      <text x="14" y="42" fill="#94a3b8" font-size="11">HAMi / Volcano / Run:ai 对标</text>
      <text x="14" y="60" fill="#f0b955" font-size="10">需适配（基于 K8s + 存储性能积累）</text>
    </g>

    <g transform="translate(0, 516)">
      <rect x="0" y="0" width="280" height="78" rx="10" fill="#1e293b" stroke="#f0b955" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="14" y="24" fill="#ffffff" font-size="14" font-weight="600">F. 边缘大模型协同（云-边-端）</text>
      <text x="14" y="42" fill="#94a3b8" font-size="11">大小模型协同 / Sedna 升级</text>
      <text x="14" y="60" fill="#f0b955" font-size="10">需适配（KubeEdge 已有基础）</text>
    </g>

    <!-- G + H 合并 -->
    <g transform="translate(0, 612)">
      <rect x="0" y="0" width="280" height="98" rx="10" fill="#1e293b" stroke="#e2685b" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="14" y="24" fill="#ffffff" font-size="14" font-weight="600">G. 推理引擎内核与 Agent 编排</text>
      <text x="14" y="44" fill="#94a3b8" font-size="11">vLLM / TGI / SGLang 内核：PagedAttention / Spec / 量化编译</text>
      <text x="14" y="62" fill="#94a3b8" font-size="11">Agent 编排 / MCP / A2A：工具调用、多模型路由、可观测</text>
      <text x="14" y="80" fill="#e2685b" font-size="10">需重建（推理内核集成开源 + 自研适配层；Agent 协议层集成为主）</text>
    </g>
  </g>

  <!-- ==================== 右侧：三大切入面（列排） ==================== -->
  <g transform="translate(950, 140)" font-family="-apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif">
    <text x="0" y="0" fill="#94a3b8" font-size="14" font-weight="600">谐云 12 个月的三个候选切入面（按推荐度排序）</text>

    <!-- 切入面 A -->
    <g transform="translate(0, 24)">
      <rect x="0" y="0" width="400" height="148" rx="10" fill="#1e293b" stroke="#3fb27f" stroke-width="2" filter="url(#shadow)"/>
      <text x="16" y="26" fill="#ffffff" font-size="14" font-weight="700">切入面 A：金融行业 LLM 推理平台</text>
      <text x="16" y="50" fill="#cbd5e1" font-size="12">谐云金融基本盘 + 信创 GPU 推理栈（昇腾/海光）</text>
      <text x="16" y="72" fill="#94a3b8" font-size="11">客户：宁波/中信/浦发/建行 已私有化部署 DeepSeek</text>
      <text x="16" y="92" fill="#94a3b8" font-size="11">技术：A+B+C+D 复用 + E/G 适配；金融合规壁垒</text>
      <text x="16" y="112" fill="#3fb27f" font-size="11">风险：定价被火山方舟/阿里灵骏等云厂拉低</text>
      <rect x="14" y="124" width="372" height="4" rx="2" fill="#3fb27f" opacity="0.5"/>
      <text x="200" y="142" text-anchor="middle" fill="#3fb27f" font-size="12" font-weight="600">★★★ 首推</text>
    </g>

    <!-- 切入面 B -->
    <g transform="translate(0, 194)">
      <rect x="0" y="0" width="400" height="148" rx="10" fill="#1e293b" stroke="#5aa5e6" stroke-width="2" filter="url(#shadow)"/>
      <text x="16" y="26" fill="#ffffff" font-size="14" font-weight="700">切入面 B：企业级 Agent 算力底座</text>
      <text x="16" y="50" fill="#cbd5e1" font-size="12">多模型路由 + 工具调用 + Agent 可观测（MCP）</text>
      <text x="16" y="72" fill="#94a3b8" font-size="11">对手：阿里云 Agent Infra / 微软 Agent Framework</text>
      <text x="16" y="92" fill="#94a3b8" font-size="11">技术：A+B+C+G；谐云 APM/Mesh 优势可放大</text>
      <text x="16" y="112" fill="#5aa5e6" font-size="11">风险：协议层尚未收敛、巨头抢生态</text>
      <rect x="14" y="124" width="372" height="4" rx="2" fill="#5aa5e6" opacity="0.5"/>
      <text x="200" y="142" text-anchor="middle" fill="#5aa5e6" font-size="12" font-weight="600">★★☆ 次推</text>
    </g>

    <!-- 切入面 C -->
    <g transform="translate(0, 364)">
      <rect x="0" y="0" width="400" height="148" rx="10" fill="#1e293b" stroke="#f0b955" stroke-width="2" filter="url(#shadow)"/>
      <text x="16" y="26" fill="#ffffff" font-size="14" font-weight="700">切入面 C：GPU 多租户调度</text>
      <text x="16" y="50" fill="#cbd5e1" font-size="12">K8s + HAMi/Volcano，对标 Run:ai（NVIDIA 700M$ 收购）</text>
      <text x="16" y="72" fill="#94a3b8" font-size="11">国内玩家：无问芯穹 7 亿+ / 潞晨 / 硅基流动</text>
      <text x="16" y="92" fill="#94a3b8" font-size="11">技术：E 为主、需深啃</text>
      <text x="16" y="112" fill="#f0b955" font-size="11">风险：技术深水区、时间窗 &lt; 12 月</text>
      <rect x="14" y="124" width="372" height="4" rx="2" fill="#f0b955" opacity="0.5"/>
      <text x="200" y="142" text-anchor="middle" fill="#f0b955" font-size="12" font-weight="600">★☆☆ 高风险</text>
    </g>
  </g>

  <!-- 脚注 -->
  <text x="40" y="893" fill="#475569" font-size="10">数据出处：harmonycloud.cn | k8smeetup | CNCF KubeEdge 项目 | 信通院《大模型推理平台白皮书》(2024.12) | Gartner/Forrester Wave 2024-2025 | TechCrunch | Reuters | 36氪 | 新浪财经</text>
</svg>