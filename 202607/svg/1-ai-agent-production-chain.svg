<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" font-family="-apple-system, 'Segoe UI', 'PingFang SC', sans-serif">
  <defs>
    <linearGradient id="layer1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="layer2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#075985"/>
      <stop offset="1" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="layer3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7c2d12"/>
      <stop offset="1" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="layer4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#581c87"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="layer5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#064e3b"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="layer6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7f1d1d"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="1200" height="600" fill="#f8fafc"/>
  <text x="600" y="40" text-anchor="middle" font-size="24" font-weight="700" fill="#0f172a">AI Agent 生产链路：技术架构全景</text>
  <text x="600" y="64" text-anchor="middle" font-size="13" fill="#64748b">从硬件到应用 · higobase 卡位在第 3 层（数据平台 / BaaS）</text>

  <!-- L1: 算力 -->
  <g filter="url(#ds)">
    <rect x="80" y="100" width="1040" height="60" rx="8" fill="url(#layer1)"/>
    <text x="120" y="135" font-size="15" font-weight="700" fill="#fff">L1  算力 / 芯片</text>
    <text x="320" y="135" font-size="12" fill="#dbeafe">NVIDIA H100/B200 · AWS Trainium · Google TPU v5 · 华为昇腾</text>
    <text x="900" y="125" font-size="11" fill="#bfdbfe">毛利 ~75%（英伟达）</text>
    <text x="900" y="143" font-size="11" fill="#bfdbfe">CapEx 重 · 受出口管制</text>
  </g>

  <!-- arrow -->
  <line x1="600" y1="160" x2="600" y2="180" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- L2: 云基础设施 -->
  <g filter="url(#ds)">
    <rect x="80" y="180" width="1040" height="60" rx="8" fill="url(#layer2)"/>
    <text x="120" y="215" font-size="15" font-weight="700" fill="#fff">L2  云基础设施 (IaaS / PaaS)</text>
    <text x="320" y="215" font-size="12" fill="#e0f2fe">AWS 28% 份额 / Azure 21% / GCP 14% · 全球市场 ~3950 亿美元（2025）</text>
    <text x="900" y="205" font-size="11" fill="#bae6fd">AWS 营业利润率 38%</text>
    <text x="900" y="223" font-size="11" fill="#bae6fd">Azure / GCP 仍在 AI CapEx 阵痛期</text>
  </g>

  <line x1="600" y1="240" x2="600" y2="260" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- L3: 数据平台 / BaaS - HIGHLIGHTED -->
  <g filter="url(#ds)">
    <rect x="80" y="260" width="1040" height="100" rx="10" fill="url(#layer3)" stroke="#fbbf24" stroke-width="3"/>
    <text x="120" y="295" font-size="17" font-weight="700" fill="#fff">L3  数据平台 / BaaS  ←  higobase 所在层</text>
    <text x="120" y="320" font-size="12" fill="#fed7aa">统一数据引擎（SQL + 向量 + 图） · Auth / Storage / Realtime / Edge Functions · 自动 API 生成 · 行级安全 RLS · 实时订阅</text>
    <text x="120" y="340" font-size="12" fill="#fed7aa">代表玩家：Supabase / Firebase / Neon / Pinecone / Weaviate / Qdrant / Mem0 / Cognee</text>
    <text x="900" y="320" font-size="11" fill="#fef3c7" font-weight="700">★ 全栈必经过路费</text>
    <text x="900" y="338" font-size="11" fill="#fef3c7">估值 1050 亿美元 · ARR 14 月 ×3.5</text>
    <text x="900" y="354" font-size="11" fill="#fef3c7">向量库 CAGR 24% · BaaS CAGR 18%</text>
  </g>

  <line x1="600" y1="360" x2="600" y2="380" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- L4: 基础模型 -->
  <g filter="url(#ds)">
    <rect x="80" y="380" width="1040" height="60" rx="8" fill="url(#layer4)"/>
    <text x="120" y="415" font-size="15" font-weight="700" fill="#fff">L4  基础模型 (LLM / Foundation Model)</text>
    <text x="320" y="415" font-size="12" fill="#f3e8ff">OpenAI · Anthropic · Google Gemini · DeepSeek · Qwen · Llama</text>
    <text x="900" y="405" font-size="11" fill="#e9d5ff">Anthropic 推理毛利 70%+（优化后）</text>
    <text x="900" y="423" font-size="11" fill="#e9d5ff">OpenAI 毛利 33–52%（仍爬坡）</text>
  </g>

  <line x1="600" y1="440" x2="600" y2="460" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- L5: Agent 编排/中间件 -->
  <g filter="url(#ds)">
    <rect x="80" y="460" width="1040" height="50" rx="8" fill="url(#layer5)"/>
    <text x="120" y="490" font-size="14" font-weight="700" fill="#fff">L5  编排 / Agent 框架 / 中间件</text>
    <text x="320" y="490" font-size="12" fill="#d1fae5">LangChain / LangGraph / Vercel AI SDK / Claude Agent SDK · MCP / A2A 协议</text>
    <text x="900" y="482" font-size="11" fill="#a7f3d0">LangChain ARR 1600 万（2025/06）</text>
    <text x="900" y="498" font-size="11" fill="#a7f3d0">开源为主 · 商业化早期</text>
  </g>

  <line x1="600" y1="510" x2="600" y2="530" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- L6: 应用层 -->
  <g filter="url(#ds)">
    <rect x="80" y="530" width="1040" height="50" rx="8" fill="url(#layer6)"/>
    <text x="120" y="560" font-size="14" font-weight="700" fill="#fff">L6  应用层 (Agent App / AI Coding / Harness)</text>
    <text x="320" y="560" font-size="12" fill="#fecaca">Cursor · Lovable · Bolt · Replit Agent · 垂直 SaaS Agent · 企业内部 Agent</text>
    <text x="900" y="552" font-size="11" fill="#fecaca">分发强 · 但成本结构脆弱</text>
    <text x="900" y="568" font-size="11" fill="#fecaca">Gartner: 40% 企业应用将含 Agent</text>
  </g>

</svg>