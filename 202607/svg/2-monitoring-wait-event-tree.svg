<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <linearGradient id="root" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#334155"/>
    </linearGradient>
  </defs>

  <rect width="100%" height="100%" fill="#fafbfc"/>

  <text x="480" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">wait_event 分类树</text>
  <text x="480" y="62" text-anchor="middle" font-size="13" fill="#475569">PG 9.6 引入 · PG 10 完善 · PG 14+ IO 细分 · PG 16+ buffer_mapping 优化</text>

  <!-- Root -->
  <rect x="380" y="90" width="200" height="52" rx="10" fill="url(#root)"/>
  <text x="480" y="115" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">wait_event_type</text>
  <text x="480" y="132" text-anchor="middle" font-size="11" fill="#cbd5e1">pg_stat_activity · 9 大类</text>

  <!-- Level 1: 9 categories -->
  <!-- Activity -->
  <g>
    <line x1="480" y1="142" x2="120" y2="190" stroke="#94a3b8" stroke-width="1.4"/>
    <rect x="40" y="190" width="160" height="44" rx="8" fill="#e0f2fe" stroke="#0ea5e9"/>
    <text x="120" y="208" text-anchor="middle" font-size="13" font-weight="700" fill="#075985">Activity</text>
    <text x="120" y="225" text-anchor="middle" font-size="11" fill="#0c4a6e">空闲主循环</text>
  </g>
  <!-- BufferPin -->
  <g>
    <line x1="480" y1="142" x2="270" y2="190" stroke="#94a3b8" stroke-width="1.4"/>
    <rect x="190" y="190" width="160" height="44" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="270" y="208" text-anchor="middle" font-size="13" font-weight="700" fill="#78350f">BufferPin</text>
    <text x="270" y="225" text-anchor="middle" font-size="11" fill="#92400e">等 buffer 排他钉</text>
  </g>
  <!-- Client -->
  <g>
    <line x1="480" y1="142" x2="420" y2="190" stroke="#94a3b8" stroke-width="1.4"/>
    <rect x="340" y="190" width="160" height="44" rx="8" fill="#dcfce7" stroke="#16a34a"/>
    <text x="420" y="208" text-anchor="middle" font-size="13" font-weight="700" fill="#14532d">Client</text>
    <text x="420" y="225" text-anchor="middle" font-size="11" fill="#166534">等客户端发/收包</text>
  </g>
  <!-- IO -->
  <g>
    <line x1="480" y1="142" x2="570" y2="190" stroke="#94a3b8" stroke-width="1.8"/>
    <rect x="490" y="190" width="160" height="44" rx="8" fill="#fee2e2" stroke="#ef4444" stroke-width="1.8"/>
    <text x="570" y="208" text-anchor="middle" font-size="13" font-weight="700" fill="#7f1d1d">IO ★</text>
    <text x="570" y="225" text-anchor="middle" font-size="11" fill="#991b1b">磁盘 IO（PG14+ 细分）</text>
  </g>
  <!-- IPC -->
  <g>
    <line x1="480" y1="142" x2="720" y2="190" stroke="#94a3b8" stroke-width="1.4"/>
    <rect x="640" y="190" width="160" height="44" rx="8" fill="#ede9fe" stroke="#8b5cf6"/>
    <text x="720" y="208" text-anchor="middle" font-size="13" font-weight="700" fill="#4c1d95">IPC</text>
    <text x="720" y="225" text-anchor="middle" font-size="11" fill="#5b21b6">子进程 / 并行 worker</text>
  </g>
  <!-- Lock -->
  <g>
    <line x1="480" y1="142" x2="120" y2="290" stroke="#94a3b8" stroke-width="1.4"/>
    <rect x="40" y="290" width="160" height="44" rx="8" fill="#fce7f3" stroke="#db2777"/>
    <text x="120" y="308" text-anchor="middle" font-size="13" font-weight="700" fill="#831843">Lock</text>
    <text x="120" y="325" text-anchor="middle" font-size="11" fill="#9d174d">heavy-weight 锁</text>
  </g>
  <!-- LWLock -->
  <g>
    <line x1="480" y1="142" x2="270" y2="290" stroke="#94a3b8" stroke-width="1.8"/>
    <rect x="190" y="290" width="160" height="44" rx="8" fill="#ffe4e6" stroke="#e11d48" stroke-width="1.8"/>
    <text x="270" y="308" text-anchor="middle" font-size="13" font-weight="700" fill="#881337">LWLock ★</text>
    <text x="270" y="325" text-anchor="middle" font-size="11" fill="#9f1239">shared memory 轻量锁</text>
  </g>
  <!-- Timeout -->
  <g>
    <line x1="480" y1="142" x2="420" y2="290" stroke="#94a3b8" stroke-width="1.4"/>
    <rect x="340" y="290" width="160" height="44" rx="8" fill="#cffafe" stroke="#06b6d4"/>
    <text x="420" y="308" text-anchor="middle" font-size="13" font-weight="700" fill="#155e75">Timeout</text>
    <text x="420" y="325" text-anchor="middle" font-size="11" fill="#0e7490">故意 sleep / 等待</text>
  </g>
  <!-- Extension -->
  <g>
    <line x1="480" y1="142" x2="570" y2="290" stroke="#94a3b8" stroke-width="1.4"/>
    <rect x="490" y="290" width="160" height="44" rx="8" fill="#f1f5f9" stroke="#64748b"/>
    <text x="570" y="308" text-anchor="middle" font-size="13" font-weight="700" fill="#0f172a">Extension</text>
    <text x="570" y="325" text-anchor="middle" font-size="11" fill="#334155">扩展自定义</text>
  </g>

  <!-- IO subtree (most important) -->
  <text x="570" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">IO 类的关键子事件（PG 14+ 必备）</text>
  <g font-size="11">
    <rect x="370" y="380" width="180" height="28" rx="4" fill="#fff1f2" stroke="#fb7185"/>
    <text x="460" y="399" text-anchor="middle" fill="#9f1239" font-family="Menlo, monospace">DataFileRead / Write</text>

    <rect x="560" y="380" width="180" height="28" rx="4" fill="#fff1f2" stroke="#fb7185"/>
    <text x="650" y="399" text-anchor="middle" fill="#9f1239" font-family="Menlo, monospace">WALWrite / WALRead</text>

    <rect x="750" y="380" width="180" height="28" rx="4" fill="#fff1f2" stroke="#fb7185"/>
    <text x="840" y="399" text-anchor="middle" fill="#9f1239" font-family="Menlo, monospace">ControlFileSync</text>

    <rect x="370" y="414" width="180" height="28" rx="4" fill="#fff1f2" stroke="#fb7185"/>
    <text x="460" y="433" text-anchor="middle" fill="#9f1239" font-family="Menlo, monospace">RelationMapRead/Write</text>

    <rect x="560" y="414" width="180" height="28" rx="4" fill="#fff1f2" stroke="#fb7185"/>
    <text x="650" y="433" text-anchor="middle" fill="#9f1239" font-family="Menlo, monospace">XactSync</text>

    <rect x="750" y="414" width="180" height="28" rx="4" fill="#fff1f2" stroke="#fb7185"/>
    <text x="840" y="433" text-anchor="middle" fill="#9f1239" font-family="Menlo, monospace">ReplicationSlotRead/Write</text>
  </g>

  <!-- LWLock subtree -->
  <text x="270" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#881337">LWLock 高频项</text>
  <g font-size="11">
    <rect x="40" y="380" width="170" height="28" rx="4" fill="#ffe4e6" stroke="#e11d48"/>
    <text x="125" y="399" text-anchor="middle" fill="#881337" font-family="Menlo, monospace">buffer_mapping</text>

    <rect x="40" y="414" width="170" height="28" rx="4" fill="#ffe4e6" stroke="#e11d48"/>
    <text x="125" y="433" text-anchor="middle" fill="#881337" font-family="Menlo, monospace">lock_manager</text>

    <rect x="40" y="448" width="170" height="28" rx="4" fill="#ffe4e6" stroke="#e11d48"/>
    <text x="125" y="467" text-anchor="middle" fill="#881337" font-family="Menlo, monospace">wal_insert / ProcArray</text>

    <rect x="40" y="482" width="170" height="28" rx="4" fill="#ffe4e6" stroke="#e11d48"/>
    <text x="125" y="501" text-anchor="middle" fill="#881337" font-family="Menlo, monospace">clog / subtrans</text>
  </g>

  <!-- Lock subtree -->
  <text x="120" y="370" text-anchor="middle" font-size="12" font-weight="700" fill="#831843">Lock 高频项</text>
  <g font-size="11">
    <rect x="240" y="380" width="160" height="28" rx="4" fill="#fce7f3" stroke="#db2777"/>
    <text x="320" y="399" text-anchor="middle" fill="#831843" font-family="Menlo, monospace">transactionid</text>

    <rect x="240" y="414" width="160" height="28" rx="4" fill="#fce7f3" stroke="#db2777"/>
    <text x="320" y="433" text-anchor="middle" fill="#831843" font-family="Menlo, monospace">tuple</text>

    <rect x="240" y="448" width="160" height="28" rx="4" fill="#fce7f3" stroke="#db2777"/>
    <text x="320" y="467" text-anchor="middle" fill="#831843" font-family="Menlo, monospace">relation</text>

    <rect x="240" y="482" width="160" height="28" rx="4" fill="#fce7f3" stroke="#db2777"/>
    <text x="320" y="501" text-anchor="middle" fill="#831843" font-family="Menlo, monospace">extend</text>
  </g>

  <!-- Decision flowchart at bottom -->
  <g transform="translate(40, 530)">
    <rect x="0" y="0" width="880" height="148" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="20" y="24" font-size="13" font-weight="700" fill="#0f172a">由 wait_event 分布反推瓶颈 — 决策树</text>

    <g font-size="11.5">
      <text x="20" y="50" fill="#0f172a" font-weight="600">① IO:DataFileRead 大头</text>
      <text x="20" y="66" fill="#334155">→ <tspan font-family="Menlo, monospace">iostat -x 1</tspan>,看 <tspan font-family="Menlo, monospace">r_await</tspan> &gt; 10ms;预热或换盘</text>

      <text x="20" y="88" fill="#0f172a" font-weight="600">② LWLock:buffer_mapping 大头</text>
      <text x="20" y="104" fill="#334155">→ <tspan font-family="Menlo, monospace">shared_buffers</tspan> 是否 &gt; RAM 25%;调小或升级 PG 16+(已优化)</text>

      <text x="20" y="126" fill="#0f172a" font-weight="600">③ LWLock:lock_manager 大头</text>
      <text x="20" y="142" fill="#334155">→ 单实例连接数 &gt; 500;上 pgbouncer 或升级 PG 16+(锁池优化)</text>

      <text x="470" y="50" fill="#0f172a" font-weight="600">④ IO:WALWrite 大头</text>
      <text x="470" y="66" fill="#334155">→ <tspan font-family="Menlo, monospace">w_await</tspan>;检查主备延迟,降同步复制</text>

      <text x="470" y="88" fill="#0f172a" font-weight="600">⑤ Lock:tuple 大头</text>
      <text x="470" y="104" fill="#334155">→ 热点行竞争;改写为 SKIP LOCKED 或拆批</text>

      <text x="470" y="126" fill="#0f172a" font-weight="600">⑥ active 且 wait_event NULL（PG14+）</text>
      <text x="470" y="142" fill="#334155">→ 在 CPU 上跑(大排序/哈希);<tspan font-family="Menlo, monospace">perf top -p &lt;pid&gt;</tspan></text>
    </g>
  </g>
</svg>