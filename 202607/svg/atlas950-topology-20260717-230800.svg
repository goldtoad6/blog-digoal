        <text x="55" y="50" text-anchor="middle" font-size="11" fill="#495057">64 卡</text>
        <text x="55" y="68" text-anchor="middle" font-size="10" fill="#6c757d">2 TB/s × 64</text>
        <circle cx="20" cy="86" r="3" fill="#3a86ff"/>
