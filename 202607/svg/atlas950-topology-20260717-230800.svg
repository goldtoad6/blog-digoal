    <!-- Aggregate metrics -->
    <g transform="translate(80,450)">
      <rect width="470" height="180" rx="10" fill="#eef5ff" stroke="#3a86ff"/>
      <text x="235" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#0b3d91">单 SuperPoD 聚合指标</text>
      <line x1="20" y1="40" x2="450" y2="40" stroke="#3a86ff" stroke-width="0.5"/>
      <g font-size="12" fill="#212529">
        <text x="20" y="64">NPU 卡数</text><text x="450" y="64" text-anchor="end" font-weight="600">8 192 × Ascend 950DT</text>
        <text x="20" y="88">FP8 算力</text><text x="450" y="88" text-anchor="end" font-weight="600">8 EFLOPS</text>
        <text x="20" y="112">FP4 算力</text><text x="450" y="112" text-anchor="end" font-weight="600">16 EFLOPS</text>
        <text x="20" y="136">总显存</text><text x="450" y="136" text-anchor="end" font-weight="600">1152 TB（HBM 等效）</text>
        <text x="20" y="160">Scale-Up 互联带宽</text><text x="450" y="160" text-anchor="end" font-weight="600">16.3 PB/s（单跳 200 ns）</text>
      </g>
    </g>
