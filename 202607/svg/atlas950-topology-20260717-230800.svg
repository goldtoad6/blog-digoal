        <circle cx="20" cy="86" r="3" fill="#3a86ff"/>
        <circle cx="40" cy="86" r="3" fill="#3a86ff"/>
        <circle cx="60" cy="86" r="3" fill="#3a86ff"/>
        <circle cx="80" cy="86" r="3" fill="#3a86ff"/>
        <circle cx="100" cy="86" r="3" fill="#3a86ff"/>
