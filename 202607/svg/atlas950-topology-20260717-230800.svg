        <circle cx="100" cy="86" r="3" fill="#3a86ff"/>
      </g>
      <g transform="translate(440,310)">
        <rect width="110" height="100" rx="8" fill="#fff" stroke="#3a86ff"/>
        <text x="55" y="30" text-anchor="middle" font-size="12" font-weight="600" fill="#0b3d91">机柜 #8</text>
        <text x="55" y="50" text-anchor="middle" font-size="11" fill="#495057">64 卡</text>
        <text x="55" y="68" text-anchor="middle" font-size="10" fill="#6c757d">2 TB/s × 64</text>
